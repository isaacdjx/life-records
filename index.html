<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>我去过的地方</title>
    <script src="https://webapi.amap.com/maps?v=2.0&key=f66cdc07203c3075a2a2ae1ea67eea8e"></script>
    <style>
        :root {
            --primary-blue: #4A90D9;
            --primary-dark: #357ABD;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #666;
            --text-muted: #999;
            --border: #e5e7eb;
            --border-light: #f0f0f0;
            --radius: 16px;
            --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 20px rgba(0,0,0,0.06);
            --font: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* Header */
        .page-header {
            margin-bottom: 32px;
        }

        .page-header h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text);
            margin-bottom: 8px;
        }

        .page-header p {
            font-size: 15px;
            color: var(--text-muted);
        }

        .stats {
            display: flex;
            gap: 24px;
            margin-top: 16px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, #e8f0fb 0%, #d6e4f5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Map */
        .map-section {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 32px;
        }

        .map-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .map-header span {
            font-size: 15px;
            font-weight: 600;
        }

        #map {
            width: 100%;
            height: 400px;
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .travel-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease);
            cursor: pointer;
        }

        .travel-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
        }

        .card-image {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            position: relative;
        }

        .card-image::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(to top, rgba(0,0,0,0.3), transparent);
        }

        .card-date-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(255,255,255,0.95);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            backdrop-filter: blur(8px);
        }

        .card-body {
            padding: 20px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .card-location {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: var(--primary-blue);
            margin-bottom: 12px;
            font-weight: 500;
        }

        .card-location svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        .card-content {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 16px;
        }

        .card-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .tag {
            padding: 4px 12px;
            background: var(--bg);
            border-radius: 12px;
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            stroke: var(--border);
            margin-bottom: 16px;
        }

        .empty-state p {
            font-size: 15px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 20px 16px; }
            .page-header h1 { font-size: 24px; }
            .stats { gap: 16px; }
            #map { height: 280px; }
            .cards-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="page-header">
            <h1>我去过的地方</h1>
            <p>记录每一次出发，珍藏每一段旅程</p>
            <div class="stats" id="stats"></div>
        </header>

        <section class="map-section">
            <div class="map-header">
                <span>📍</span>
                <span>足迹地图</span>
            </div>
            <div id="map"></div>
        </section>

        <section class="cards-grid" id="cardsGrid"></section>
    </div>

    <script>
    (function() {
        var travels = [];
        var map = null;

        // Gradient backgrounds for cards
        var gradients = [
            'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
            'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
            'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
            'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
            'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
            'linear-gradient(135deg, #30cfd0 0%, #330867 100%)',
            'linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)',
            'linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)'
        ];

        var emojis = ['🏔️', '🌅', '🏖️', '🗼', '🌸', '🏰', '🎭', '🌊'];

        function loadData() {
            fetch('data/travel.json')
                .then(function(r) { return r.ok ? r.json() : []; })
                .then(function(data) {
                    travels = data;
                    render();
                })
                .catch(function() {
                    document.getElementById('cardsGrid').innerHTML =
                        '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg><p>暂无旅行记录</p></div>';
                });
        }

        function formatDate(dateStr) {
            var d = new Date(dateStr);
            var months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
            return d.getFullYear() + '年' + months[d.getMonth()] + d.getDate() + '日';
        }

        function render() {
            // Stats
            var cities = new Set();
            travels.forEach(function(t) {
                if (t.location) {
                    var parts = t.location.split(/[省市县区]/);
                    if (parts[0]) cities.add(parts[0]);
                }
            });

            document.getElementById('stats').innerHTML =
                '<div class="stat-item"><div class="stat-icon">📍</div><div><div class="stat-value">' + travels.length + '</div><div class="stat-label">次旅行</div></div></div>' +
                '<div class="stat-item"><div class="stat-icon">🏙️</div><div><div class="stat-value">' + cities.size + '</div><div class="stat-label">个城市</div></div></div>' +
                '<div class="stat-item"><div class="stat-icon">📸</div><div><div class="stat-value">' + travels.length + '</div><div class="stat-label">段回忆</div></div></div>';

            // Cards
            var grid = document.getElementById('cardsGrid');
            if (travels.length === 0) {
                grid.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg><p>暂无旅行记录</p></div>';
                return;
            }

            grid.innerHTML = travels.map(function(item, i) {
                var gradient = gradients[i % gradients.length];
                var emoji = emojis[i % emojis.length];
                var tags = item.tags ? item.tags.map(function(t) { return '<span class="tag">' + t + '</span>'; }).join('') : '';

                return '<div class="travel-card" data-lat="' + (item.lat || '') + '" data-lng="' + (item.lng || '') + '">' +
                    '<div class="card-image" style="background:' + gradient + '">' +
                        '<span>' + emoji + '</span>' +
                        '<div class="card-date-badge">' + formatDate(item.date) + '</div>' +
                    '</div>' +
                    '<div class="card-body">' +
                        '<h3 class="card-title">' + item.title + '</h3>' +
                        (item.location ? '<div class="card-location"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>' + item.location + '</div>' : '') +
                        (item.content ? '<p class="card-content">' + item.content + '</p>' : '') +
                        (tags ? '<div class="card-tags">' + tags + '</div>' : '') +
                    '</div>' +
                '</div>';
            }).join('');

            // Card click → fly to location on map
            document.querySelectorAll('.travel-card').forEach(function(card) {
                card.addEventListener('click', function() {
                    var lat = parseFloat(card.dataset.lat);
                    var lng = parseFloat(card.dataset.lng);
                    if (lat && lng && map) {
                        map.setZoomAndCenter(12, [lng, lat]);
                        document.querySelector('.map-section').scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
            });

            renderMap();
        }

        function renderMap() {
            var points = travels.filter(function(t) { return t.lat && t.lng; });

            setTimeout(function() {
                if (!map) {
                    map = new AMap.Map('map', {
                        zoom: 4,
                        center: [104.19, 35.86],
                        mapStyle: 'amap://styles/macaron',
                        resizeEnable: true
                    });
                }
                map.clearMap();

                if (points.length > 0) {
                    var markers = [];
                    points.forEach(function(item, i) {
                        var markerContent = document.createElement('div');
                        markerContent.style.cssText = 'background:#4A90D9;width:32px;height:32px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;font-size:14px;cursor:pointer;transition:transform 0.2s;';
                        markerContent.textContent = (i + 1);
                        markerContent.onmouseenter = function() { this.style.transform = 'scale(1.15)'; };
                        markerContent.onmouseleave = function() { this.style.transform = 'scale(1)'; };

                        var marker = new AMap.Marker({
                            position: [item.lng, item.lat],
                            content: markerContent,
                            offset: new AMap.Pixel(-16, -16)
                        });

                        var infoContent = '<div style="padding:10px;max-width:240px">' +
                            '<strong style="font-size:15px">' + item.title + '</strong><br>' +
                            '<small style="color:#4A90D9;font-weight:500">' + formatDate(item.date) + '</small>' +
                            (item.location ? '<p style="margin:6px 0;font-size:13px;color:#666">📍 ' + item.location + '</p>' : '') +
                            (item.content ? '<p style="font-size:13px;color:#999;margin-top:6px">' + item.content + '</p>' : '') +
                            '</div>';

                        var infoWindow = new AMap.InfoWindow({
                            content: infoContent,
                            offset: new AMap.Pixel(0, -16)
                        });

                        marker.on('click', function() {
                            infoWindow.open(map, marker.getPosition());
                        });

                        markers.push(marker);
                    });

                    map.add(markers);
                    map.setFitView(markers, false, [60, 60, 60, 60]);
                }
            }, 200);
        }

        loadData();
    })();
    </script>
</body>
</html>
