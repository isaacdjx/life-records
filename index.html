<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>我去过的地方</title>
    <script src="https://webapi.amap.com/maps?v=2.0&key=f66cdc07203c3075a2a2ae1ea67eea8e"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;900&family=Cinzel:wght@500;600;700&family=Noto+Serif+SC:wght@500;700&display=swap');

        :root {
            --gold: #d4a85a;
            --gold-bright: #f6c977;
            --gold-soft: rgba(212,168,90,0.55);
            --gold-faint: rgba(212,168,90,0.18);
            --purple-glow: rgba(183,148,244,0.55);
            --purple-soft: rgba(183,148,244,0.35);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            height: 100vh;
            overflow: hidden;
            background: #141a2e;
        }

        #map { width: 100%; height: 100%; }

        /* ===== Loading Screen ===== */
        .loading-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #0a0e1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .loading-globe {
            width: 60px; height: 60px;
            border: 3px solid rgba(212, 168, 90, 0.18);
            border-top-color: var(--gold-bright);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* ===== Title Bar ===== */
        .page-title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(20, 26, 46, 0.78);
            backdrop-filter: blur(20px) saturate(1.6);
            -webkit-backdrop-filter: blur(20px) saturate(1.6);
            padding: 12px 32px;
            border-radius: 50px;
            border: 1px solid rgba(212,168,90,0.22);
            box-shadow:
                0 4px 30px rgba(0,0,0,0.4),
                0 0 40px rgba(212,168,90,0.10),
                inset 0 1px 0 rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            gap: 14px;
            opacity: 0;
            animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .title-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--gold-bright);
            box-shadow: 0 0 12px rgba(246, 201, 119, 0.7);
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 12px rgba(246, 201, 119, 0.7); }
            50% { box-shadow: 0 0 20px rgba(246, 201, 119, 1), 0 0 40px rgba(246, 201, 119, 0.35); }
        }

        .title-text {
            font-family: 'Cinzel', 'Noto Serif SC', serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff 0%, var(--gold-bright) 50%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title-divider {
            width: 1px;
            height: 16px;
            background: rgba(212,168,90,0.35);
        }

        .title-stats {
            font-family: 'Cinzel', serif;
            font-size: 12px;
            font-weight: 500;
            color: var(--gold-soft);
            letter-spacing: 1px;
        }

        /* ===== Category Legend ===== */
        .legend {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 10;
            background: rgba(20, 26, 46, 0.72);
            backdrop-filter: blur(20px) saturate(1.6);
            -webkit-backdrop-filter: blur(20px) saturate(1.6);
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid rgba(212,168,90,0.16);
            box-shadow:
                0 4px 30px rgba(0,0,0,0.35),
                inset 0 1px 0 rgba(255,255,255,0.05);
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-width: 340px;
            font-size: 11px;
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.7s forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 10px;
            transition: all 0.3s ease;
            user-select: none;
            color: rgba(255,255,255,0.6);
            border: 1px solid transparent;
        }

        .legend-item:hover {
            background: rgba(212,168,90,0.10);
            color: var(--gold-bright);
            border-color: rgba(212,168,90,0.25);
        }

        .legend-item.active {
            background: linear-gradient(135deg, rgba(212,168,90,0.18), rgba(183,148,244,0.18));
            color: var(--gold-bright);
            font-weight: 600;
            border-color: var(--gold-soft);
            box-shadow: 0 0 12px rgba(212,168,90,0.18);
            text-shadow: 0 0 6px rgba(246,201,119,0.3);
        }

        .legend-item.dimmed {
            opacity: 0.25;
        }

        .legend-icon {
            width: 22px; height: 22px;
            border-radius: 50%;
            border: 1.5px solid rgba(212,168,90,0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            background: rgba(20,26,46,0.6);
        }

        .legend-item:hover .legend-icon {
            border-color: var(--gold-bright);
            box-shadow: 0 0 10px rgba(212,168,90,0.35);
            transform: scale(1.1);
        }
        .legend-item.active .legend-icon {
            border-color: var(--gold-bright);
            background: rgba(212,168,90,0.18);
        }

        /* ===== Popup Overlay (Game Codex Golden/Purple) ===== */
        .popup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(5, 8, 20, 0.72);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .popup-overlay.show { display: flex; opacity: 1; }

        .popup-card {
            background:
                linear-gradient(var(--gold-bright), var(--gold-bright)) top    left  / 24px 2px no-repeat,
                linear-gradient(var(--gold-bright), var(--gold-bright)) top    left  / 2px 24px no-repeat,
                linear-gradient(var(--gold-bright), var(--gold-bright)) top    right / 24px 2px no-repeat,
                linear-gradient(var(--gold-bright), var(--gold-bright)) top    right / 2px 24px no-repeat,
                linear-gradient(var(--gold-bright), var(--gold-bright)) bottom left  / 24px 2px no-repeat,
                linear-gradient(var(--gold-bright), var(--gold-bright)) bottom left  / 2px 24px no-repeat,
                linear-gradient(var(--gold-bright), var(--gold-bright)) bottom right / 24px 2px no-repeat,
                linear-gradient(var(--gold-bright), var(--gold-bright)) bottom right / 2px 24px no-repeat,
                linear-gradient(135deg, rgba(212,168,90,0.06), transparent 40%),
                rgba(20, 26, 46, 0.95);
            backdrop-filter: blur(30px) saturate(1.8);
            -webkit-backdrop-filter: blur(30px) saturate(1.8);
            border-radius: 16px;
            width: 420px;
            max-width: 90vw;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(212,168,90,0.24);
            box-shadow:
                0 25px 80px rgba(0,0,0,0.55),
                0 0 40px rgba(212,168,90,0.12),
                inset 0 1px 0 rgba(255,255,255,0.06);
            transform: translateY(30px) scale(0.92);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .popup-overlay.show .popup-card {
            transform: translateY(0) scale(1);
        }

        .popup-card::-webkit-scrollbar { width: 4px; }
        .popup-card::-webkit-scrollbar-track { background: transparent; }
        .popup-card::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .popup-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 22px 22px 16px;
            border-bottom: 1px solid rgba(212,168,90,0.16);
            position: relative;
        }

        .popup-emoji {
            width: 56px; height: 56px;
            border-radius: 14px;
            background: rgba(212, 168, 90, 0.1);
            border: 1px solid rgba(212, 168, 90, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
            box-shadow: 0 0 20px rgba(212, 168, 90, 0.12);
        }
        .popup-emoji.wanted {
            background: rgba(30, 40, 70, 0.8);
            border-color: rgba(255,255,255,0.25);
            border-style: dashed;
            box-shadow: 0 0 20px rgba(212, 168, 90, 0.08);
        }

        .popup-info { flex: 1; min-width: 0; }

        .popup-title {
            font-family: 'Cinzel', 'Noto Serif SC', serif;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
            letter-spacing: 1px;
            text-shadow: 0 0 12px rgba(212,168,90,0.25);
        }

        .popup-category {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            margin-bottom: 4px;
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: transparent !important;
            border: 1px solid currentColor;
        }

        .popup-status {
            font-family: 'Cinzel', serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .popup-status.visited { color: var(--gold-bright); }
        .popup-status.wanted { color: rgba(255,255,255,0.5); }

        .popup-close {
            width: 34px; height: 34px;
            border-radius: 50%;
            border: 1px solid rgba(212,168,90,0.35);
            background: rgba(13,23,38,0.72);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            color: var(--gold-bright);
            flex-shrink: 0;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(212,168,90,0.2);
        }
        .popup-close:hover {
            background: rgba(212,168,90,0.18);
            color: #fff;
            box-shadow: 0 0 16px rgba(212,168,90,0.4);
        }

        .popup-content { padding: 18px 22px; }

        .popup-text {
            font-size: 13px;
            color: rgba(220,232,248,0.72);
            line-height: 1.75;
            margin-bottom: 14px;
        }

        .popup-loc {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: var(--gold-bright);
            font-weight: 500;
            margin-bottom: 12px;
        }
        .popup-loc svg {
            width: 13px; height: 13px;
            fill: var(--gold-bright);
            flex-shrink: 0;
        }

        .popup-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .popup-tag {
            padding: 4px 12px;
            background: rgba(212,168,90,0.05);
            border: 1px solid rgba(212,168,90,0.14);
            border-radius: 4px;
            font-size: 11px;
            color: rgba(212,168,90,0.8);
            font-weight: 500;
            transition: all 0.2s;
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
        }
        .popup-tag:hover {
            background: rgba(212,168,90,0.12);
            border-color: rgba(212,168,90,0.35);
            color: var(--gold-bright);
        }

        .popup-minimap {
            height: 130px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(212,168,90,0.18);
        }

        /* ===== Marker Pulse Ring ===== */
        @keyframes marker-pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 var(--pulse-color); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px transparent; }
            100% { transform: scale(1); box-shadow: 0 0 0 0 transparent; }
        }

        /* ===== Wanted marker style ===== */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        /* ===== Heritage Link ===== */
        .heritage-link {
            position: fixed; top: 20px; right: 24px; z-index: 50;
            display: flex; align-items: center; gap: 6px;
            padding: 8px 16px; border-radius: 20px;
            background: rgba(20, 26, 46, 0.78);
            backdrop-filter: blur(20px) saturate(1.6);
            border: 1px solid rgba(212,168,90,0.25);
            box-shadow: 0 4px 16px rgba(0,0,0,0.35), 0 0 12px rgba(212,168,90,0.08), inset 0 1px 0 rgba(255,255,255,0.05);
            text-decoration: none; color: var(--gold-soft);
            font-family: 'Cinzel', 'Noto Serif SC', serif;
            font-size: 12px; font-weight: 700; letter-spacing: 1px;
            transition: all 0.3s;
            animation: slideDown 0.5s 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .heritage-link:hover {
            border-color: var(--gold-bright);
            color: var(--gold-bright);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 18px rgba(183,148,244,0.18), inset 0 1px 0 rgba(255,255,255,0.06);
        }
        .heritage-link-icon { font-size: 15px; }

        /* ===== Stats Panel ===== */
        .stats-toggle {
            position: fixed; bottom: 24px; right: 24px; z-index: 50;
            display: flex; align-items: center; gap: 6px;
            padding: 8px 14px; border-radius: 20px;
            background: rgba(20, 26, 46, 0.78);
            backdrop-filter: blur(20px) saturate(1.6);
            border: 1px solid rgba(212,168,90,0.18);
            box-shadow: 0 4px 16px rgba(0,0,0,0.35), 0 0 12px rgba(212,168,90,0.08), inset 0 1px 0 rgba(255,255,255,0.05);
            color: var(--gold-soft); cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 12px; font-weight: 600; letter-spacing: 1px;
            transition: all 0.3s;
            animation: slideUp 0.5s 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .stats-toggle:hover {
            background: rgba(20, 26, 46, 0.9);
            border-color: var(--gold-soft);
            color: var(--gold-bright);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 18px rgba(212,168,90,0.18);
        }
        .stats-panel {
            position: fixed; bottom: 60px; right: 24px; z-index: 49;
            width: 240px; padding: 18px;
            background: rgba(20, 26, 46, 0.88);
            backdrop-filter: blur(20px) saturate(1.6);
            border: 1px solid rgba(212,168,90,0.16);
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.05);
            opacity: 0; visibility: hidden;
            transform: translateY(10px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .stats-panel.show {
            opacity: 1; visibility: visible; transform: translateY(0);
        }
        .stats-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 5px 0; font-size: 12px; color: rgba(220,232,248,0.55);
        }
        .stats-row-label { display: flex; align-items: center; gap: 6px; }
        .stats-row-value { font-weight: 700; color: var(--gold-bright); }
        .stats-bar-row { margin: 3px 0; }
        .stats-bar-label { font-size: 11px; color: rgba(220,232,248,0.4); margin-bottom: 3px;
            display: flex; justify-content: space-between; }
        .stats-bar-track { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
        .stats-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s; }
        .stats-divider { height: 1px; background: rgba(212,168,90,0.15); margin: 8px 0; }

        /* ===== Sub-icon on markers ===== */
        .marker-sub-icon {
            position: absolute; bottom: -2px; right: -2px;
            width: 18px; height: 18px; border-radius: 50%;
            background: rgba(20, 26, 46, 0.95);
            border: 1px solid rgba(212,168,90,0.35);
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; z-index: 2; line-height: 1;
            box-shadow: 0 0 8px rgba(212,168,90,0.25);
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-globe"></div>
        <div class="loading-text">Loading Map</div>
    </div>

    <div class="page-title">
        <span class="title-dot"></span>
        <span class="title-text">我去过的地方</span>
        <span class="title-divider"></span>
        <span class="title-stats" id="titleStats"></span>
    </div>

    <a href="heritage.html" class="heritage-link">
        <span class="heritage-link-icon">🏛️</span>
        <span>遗产册</span>
    </a>

    <div class="legend" id="legend"></div>

    <button class="stats-toggle" id="statsToggle">📊 数据</button>
    <div class="stats-panel" id="statsPanel"></div>

    <div id="map"></div>

    <div class="popup-overlay" id="popupOverlay">
        <div class="popup-card" id="popupCard">
            <div class="popup-header">
                <div class="popup-emoji" id="popupEmoji"></div>
                <div class="popup-info">
                    <div class="popup-title" id="popupTitle"></div>
                    <div class="popup-category" id="popupCategory"></div>
                    <div class="popup-status" id="popupStatus"></div>
                </div>
                <button class="popup-close" id="popupClose">✕</button>
            </div>
            <div class="popup-content" id="popupContent"></div>
        </div>
    </div>

    <script>
    (function() {
        var data = [];
        var map = null;
        var miniMap = null;
        var markers = [];
        var activeCategory = null;

        var categoryConfig = {
            '自然景观': { emoji: '🏔️', color: '#48bb78', glow: 'rgba(72,187,120,0.4)', bg: 'rgba(72,187,120,0.15)', text: '#48bb78' },
            '世界遗产': { emoji: '🏛️', color: '#9f7aea', glow: 'rgba(159,122,234,0.4)', bg: 'rgba(159,122,234,0.15)', text: '#9f7aea' },
            '历史文化': { emoji: '🏯', color: '#ed8936', glow: 'rgba(237,137,54,0.4)', bg: 'rgba(237,137,54,0.15)', text: '#ed8936' },
            '现代都市': { emoji: '🌃', color: '#4299e1', glow: 'rgba(66,153,225,0.4)', bg: 'rgba(66,153,225,0.15)', text: '#4299e1' },
            '美食体验': { emoji: '🍜', color: '#fc8181', glow: 'rgba(252,129,129,0.4)', bg: 'rgba(252,129,129,0.15)', text: '#fc8181' },
            '海岛海滩': { emoji: '🏖️', color: '#38b2ac', glow: 'rgba(56,178,172,0.4)', bg: 'rgba(56,178,172,0.15)', text: '#38b2ac' },
            '主题乐园': { emoji: '🎢', color: '#ed64a6', glow: 'rgba(237,100,166,0.4)', bg: 'rgba(237,100,166,0.15)', text: '#ed64a6' },
            '自驾公路': { emoji: '🚗', color: '#ecc94b', glow: 'rgba(236,201,75,0.4)', bg: 'rgba(236,201,75,0.15)', text: '#ecc94b' },
            '地质奇观': { emoji: '🌋', color: '#a0aec0', glow: 'rgba(160,174,192,0.4)', bg: 'rgba(160,174,192,0.15)', text: '#a0aec0' }
        };

        function load() {
            fetch('data/travel.json')
                .then(function(r) { return r.ok ? r.json() : []; })
                .then(function(d) { data = d; init(); })
                .catch(function() {});
        }

        function init() {
            var allSpots = [];
            data.forEach(function(entry) {
                entry.spots.forEach(function(spot) {
                    allSpots.push({ city: entry.city, visited: entry.visited, spot: spot });
                });
            });

            var visited = allSpots.filter(function(s) { return s.visited; });
            var wanted = allSpots.filter(function(s) { return !s.visited; });

            document.getElementById('titleStats').textContent =
                visited.length + ' 已探索 · ' + wanted.length + ' 待解锁';

            var categories = {};
            allSpots.forEach(function(s) {
                var cat = s.spot.category || '自然景观';
                categories[cat] = (categories[cat] || 0) + 1;
            });

            var legendHtml = '<div class="legend-item active" data-category="全部">' +
                '<div class="legend-icon" style="background:rgba(99,179,237,0.2);border-color:rgba(99,179,237,0.3)">✦</div>' +
                '<span>全部</span></div>';

            legendHtml += Object.keys(categories).map(function(cat) {
                var cfg = categoryConfig[cat] || categoryConfig['自然景观'];
                return '<div class="legend-item" data-category="' + cat + '">' +
                    '<div class="legend-icon" style="background:' + cfg.bg + ';border-color:' + cfg.color + '">' + cfg.emoji + '</div>' +
                    '<span>' + cat + ' ' + categories[cat] + '</span></div>';
            }).join('');

            document.getElementById('legend').innerHTML = legendHtml;

            document.getElementById('legend').addEventListener('click', function(e) {
                var item = e.target.closest('.legend-item');
                if (!item) return;
                var category = item.getAttribute('data-category');

                if (category === activeCategory || category === '全部') {
                    activeCategory = null;
                } else {
                    activeCategory = category;
                }

                document.querySelectorAll('.legend-item').forEach(function(el) {
                    var cat = el.getAttribute('data-category');
                    el.classList.remove('active', 'dimmed');
                    if (activeCategory === null) {
                        if (cat === '全部') el.classList.add('active');
                    } else {
                        if (cat === activeCategory) el.classList.add('active');
                        else if (cat !== '全部') el.classList.add('dimmed');
                    }
                });

                filterMarkers();
            });

            map = new AMap.Map('map', {
                zoom: 4,
                center: [104.19, 35.86],
                mapStyle: 'amap://styles/darkblue',
                resizeEnable: true
            });

            map.on('complete', function() {
                setTimeout(function() {
                    document.getElementById('loadingScreen').classList.add('hidden');
                }, 400);
            });

            renderMarkers(allSpots);
            renderStats(allSpots);

            document.getElementById('statsToggle').addEventListener('click', function() {
                document.getElementById('statsPanel').classList.toggle('show');
            });
        }

        function renderStats(allSpots) {
            var visitedSpots = allSpots.filter(function(s) { return s.visited; });
            var wantedSpots = allSpots.filter(function(s) { return !s.visited; });

            var provinces = {};
            var countries = { '中国': true };
            visitedSpots.forEach(function(s) {
                var loc = s.spot.location || '';
                var m = loc.match(/^([\u4e00-\u9fa5]{2,3}(?:省|自治区|市))/);
                if (m) provinces[m[1]] = true;
                if (loc.indexOf('台湾') !== -1) { provinces['台湾'] = true; countries['台湾'] = true; }
                if (loc.indexOf('日本') !== -1) countries['日本'] = true;
                if (loc.indexOf('越南') !== -1) countries['越南'] = true;
                if (loc.indexOf('冰岛') !== -1) countries['冰岛'] = true;
            });

            var categories = {};
            allSpots.forEach(function(s) {
                var cat = s.spot.category || '自然景观';
                categories[cat] = (categories[cat] || 0) + 1;
            });
            var maxCat = Math.max.apply(null, Object.keys(categories).map(function(k) { return categories[k]; }));

            var html = '<div class="stats-row"><span class="stats-row-label">🗺️ 省份</span><span class="stats-row-value">' + Object.keys(provinces).length + '</span></div>' +
                '<div class="stats-row"><span class="stats-row-label">🌍 国家/地区</span><span class="stats-row-value">' + Object.keys(countries).length + '</span></div>' +
                '<div class="stats-row"><span class="stats-row-label">✦ 已探索</span><span class="stats-row-value">' + visitedSpots.length + '</span></div>' +
                '<div class="stats-row"><span class="stats-row-label">◇ 待解锁</span><span class="stats-row-value">' + wantedSpots.length + '</span></div>' +
                '<div class="stats-divider"></div>';

            Object.keys(categories).forEach(function(cat) {
                var cfg = categoryConfig[cat] || categoryConfig['自然景观'];
                var pct = (categories[cat] / maxCat * 100);
                html += '<div class="stats-bar-row">' +
                    '<div class="stats-bar-label"><span>' + cfg.emoji + ' ' + cat + '</span><span>' + categories[cat] + '</span></div>' +
                    '<div class="stats-bar-track"><div class="stats-bar-fill" style="width:' + pct + '%;background:' + cfg.color + '"></div></div>' +
                '</div>';
            });

            document.getElementById('statsPanel').innerHTML = html;
        }

        function renderMarkers(allSpots) {
            allSpots.forEach(function(item, idx) {
                var spot = item.spot;
                if (!spot.lat || !spot.lng) return;

                var cat = spot.category || '自然景观';
                var cfg = categoryConfig[cat] || categoryConfig['自然景观'];
                var isVisited = item.visited;

                var wrapper = document.createElement('div');
                wrapper.style.cssText = 'position:relative;width:44px;height:44px;display:flex;align-items:center;justify-content:center;';

                if (isVisited) {
                    // Pulse ring
                    var ring = document.createElement('div');
                    ring.style.cssText = 'position:absolute;inset:0;border-radius:50%;' +
                        'animation:marker-pulse 2.5s ease-out infinite;' +
                        'animation-delay:' + (idx * 0.15 % 2.5) + 's;' +
                        '--pulse-color: rgba(212,168,90,0.6);';
                    wrapper.appendChild(ring);
                }

                var el = document.createElement('div');
                var goldBright = '#f6c977', gold = '#d4a85a', purpleGlow = 'rgba(183,148,244,0.55)';
                if (isVisited) {
                    el.style.cssText = 'width:38px;height:38px;border-radius:50%;' +
                        'border:2.5px solid ' + goldBright + ';' +
                        'box-shadow:0 4px 15px rgba(0,0,0,0.45), 0 0 22px ' + purpleGlow + ', 0 0 8px ' + goldBright + ';' +
                        'display:flex;align-items:center;justify-content:center;' +
                        'font-size:18px;cursor:pointer;transition:all 0.3s cubic-bezier(0.16,1,0.3,1);' +
                        'background:linear-gradient(145deg, ' + gold + ', rgba(212,168,90,0.85));' +
                        'color:#1a1206;' +
                        'position:relative;z-index:1;';
                } else {
                    el.style.cssText = 'width:34px;height:34px;border-radius:50%;' +
                        'border:2px dashed ' + gold + ';' +
                        'box-shadow:0 4px 15px rgba(0,0,0,0.35), 0 0 12px rgba(212,168,90,0.15);' +
                        'display:flex;align-items:center;justify-content:center;' +
                        'font-size:16px;cursor:pointer;transition:all 0.3s cubic-bezier(0.16,1,0.3,1);' +
                        'background:rgba(20,26,46,0.85);' +
                        'animation:float 3s ease-in-out infinite;' +
                        'animation-delay:' + (idx * 0.3 % 3) + 's;' +
                        'position:relative;z-index:1;';
                }
                el.textContent = cfg.emoji;

                el.addEventListener('mouseenter', function() {
                    this.style.transform = 'scale(1.28)';
                    this.style.boxShadow = isVisited
                        ? '0 6px 25px rgba(0,0,0,0.55), 0 0 40px ' + purpleGlow + ', 0 0 16px ' + goldBright
                        : '0 6px 25px rgba(0,0,0,0.45), 0 0 25px rgba(212,168,90,0.35)';
                    this.style.borderColor = goldBright;
                });
                el.addEventListener('mouseleave', function() {
                    this.style.transform = 'scale(1)';
                    this.style.boxShadow = isVisited
                        ? '0 4px 15px rgba(0,0,0,0.45), 0 0 22px ' + purpleGlow + ', 0 0 8px ' + goldBright
                        : '0 4px 15px rgba(0,0,0,0.35), 0 0 12px rgba(212,168,90,0.15)';
                    this.style.borderColor = isVisited ? goldBright : gold;
                });

                wrapper.appendChild(el);

                var subIconMap = {
                    '湖泊': '💧', '冰川': '🧊', '雪山': '❄️', '草原': '🌾',
                    '沙漠': '🏜️', '峡谷': '⛰️', '盐湖': '✨', '花海': '🌸',
                    '天池': '💎', '温泉': '♨️', '古城': '🏰', '寺院': '🙏',
                    '夜景': '🌙', '海滩': '🏖️', '日落': '🌅', '红叶': '🍁',
                    '极光': '🌌', '湿地': '🦆', '帕米尔': '⛰️', '边境': '🛂'
                };
                var tags = spot.tags || [];
                for (var t = 0; t < tags.length; t++) {
                    if (subIconMap[tags[t]]) {
                        var subIcon = document.createElement('div');
                        subIcon.className = 'marker-sub-icon';
                        subIcon.textContent = subIconMap[tags[t]];
                        wrapper.appendChild(subIcon);
                        break;
                    }
                }

                var marker = new AMap.Marker({
                    position: [spot.lng, spot.lat],
                    content: wrapper,
                    offset: new AMap.Pixel(-22, -22)
                });

                marker.on('click', function() { showPopup(item); });
                markers.push({ marker: marker, category: cat });
                map.add(marker);
            });

            var allMarkers = map.getAllOverlays('marker');
            if (allMarkers.length) {
                map.setFitView(allMarkers, false, [80, 80, 80, 80]);
            }
        }

        function filterMarkers() {
            markers.forEach(function(item) {
                if (activeCategory === null || item.category === activeCategory) {
                    item.marker.show();
                } else {
                    item.marker.hide();
                }
            });

            var visibleMarkers = markers
                .filter(function(item) { return activeCategory === null || item.category === activeCategory; })
                .map(function(item) { return item.marker; });

            if (visibleMarkers.length > 0) {
                map.setFitView(visibleMarkers, false, [80, 80, 80, 80]);
            }
        }

        function showPopup(item) {
            if (miniMap) { miniMap.destroy(); miniMap = null; }

            var overlay = document.getElementById('popupOverlay');
            var spot = item.spot;
            var cat = spot.category || '自然景观';
            var cfg = categoryConfig[cat] || categoryConfig['自然景观'];
            var isVisited = item.visited;

            document.getElementById('popupEmoji').textContent = cfg.emoji;
            document.getElementById('popupEmoji').className = 'popup-emoji' + (isVisited ? '' : ' wanted');
            document.getElementById('popupTitle').textContent = spot.title;

            var categoryEl = document.getElementById('popupCategory');
            categoryEl.textContent = cat;
            categoryEl.style.background = cfg.bg;
            categoryEl.style.color = cfg.text;
            categoryEl.style.border = '1px solid ' + cfg.color + '33';

            var statusEl = document.getElementById('popupStatus');
            statusEl.textContent = isVisited ? '✦ 已探索' : '◇ 待解锁';
            statusEl.className = 'popup-status ' + (isVisited ? 'visited' : 'wanted');

            var html = '';
            if (spot.content) {
                html += '<div class="popup-text">' + spot.content + '</div>';
            }
            if (spot.location) {
                html += '<div class="popup-loc"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>' + spot.location + '</div>';
            }
            if (spot.tags && spot.tags.length) {
                html += '<div class="popup-tags">' + spot.tags.map(function(t) { return '<span class="popup-tag">' + t + '</span>'; }).join('') + '</div>';
            }
            if (spot.lat && spot.lng) {
                var isOverseasFar = (spot.lng < 0 || spot.lat > 55);
                if (!isOverseasFar) {
                    html += '<div class="popup-minimap" id="popup-minimap"></div>';
                } else {
                    html += '<div class="popup-loc" style="margin-top:8px;opacity:0.6;">坐标: ' + spot.lat + ', ' + spot.lng + '</div>';
                }
            }

            document.getElementById('popupContent').innerHTML = html;

            overlay.style.display = 'flex';
            requestAnimationFrame(function() {
                requestAnimationFrame(function() {
                    overlay.classList.add('show');
                });
            });

            if (spot.lat && spot.lng && !(spot.lng < 0 || spot.lat > 55)) {
                setTimeout(function() {
                    var el = document.getElementById('popup-minimap');
                    if (!el) return;

                    var isRemote = spot.lng < 76 || spot.lng > 135;
                    var miniZoom = isRemote ? 8 : 13;
                    miniMap = new AMap.Map(el, {
                        zoom: miniZoom,
                        center: [spot.lng, spot.lat],
                        mapStyle: isRemote ? 'amap://styles/normal' : 'amap://styles/darkblue',
                        resizeEnable: true,
                        dragEnable: false,
                        zoomEnable: false,
                        scrollWheel: false,
                        doubleClickZoom: false
                    });

                    var dot = document.createElement('div');
                    dot.style.cssText = 'width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.5);' +
                        'box-shadow:0 0 15px ' + cfg.glow + ', 0 2px 6px rgba(0,0,0,0.4);background:' + cfg.color + ';';

                    miniMap.add(new AMap.Marker({
                        position: [spot.lng, spot.lat],
                        content: dot,
                        offset: new AMap.Pixel(-7, -7)
                    }));
                }, 200);
            }
        }

        function closePopup() {
            var overlay = document.getElementById('popupOverlay');
            overlay.classList.remove('show');
            setTimeout(function() {
                overlay.style.display = 'none';
                if (miniMap) { miniMap.destroy(); miniMap = null; }
            }, 400);
        }

        document.getElementById('popupClose').addEventListener('click', closePopup);
        document.getElementById('popupOverlay').addEventListener('click', function(e) {
            if (e.target === this) closePopup();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closePopup();
        });

        load();
    })();
    </script>
</body>
</html>
