<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>世界总览</title>
    <link href="data/fonts/fonts_local.css" rel="stylesheet">
    <script src="https://webapi.amap.com/maps?v=2.0&key=f66cdc07203c3075a2a2ae1ea67eea8e"></script>
    <style>
        :root {
            --dark: #080c18;
            --dark-card: rgba(12, 16, 32, 0.92);
            --dark-card-border: rgba(255,255,255,0.08);
            --text: #e8e6e3;
            --text-dim: rgba(255,255,255,0.45);
            --text-muted: rgba(255,255,255,0.28);
            --accent-travel: #b794f4;
            --accent-mountain: #7cc4f5;
            --accent-park: #22c55e;
            --accent-darksky: #818cf8;
            --accent-diving: #0ea5e9;
            --accent-hotspring: #f59e0b;
            --accent-heritage: #9f7aea;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            height: 100vh;
            overflow: hidden;
            background: var(--dark);
            color: var(--text);
        }

        #map { width: 100%; height: 100%; }

        /* ===== Loading Screen ===== */
        .loading-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .loading-globe-wrap {
            position: relative;
            width: 80px;
            height: 80px;
            margin-bottom: 28px;
        }
        .loading-ring {
            position: absolute;
            inset: 0;
            border: 2px solid rgba(255,255,255,0.06);
            border-radius: 50%;
        }
        .loading-ring-spin {
            position: absolute;
            inset: 0;
            border: 2px solid transparent;
            border-top-color: var(--accent-travel);
            border-right-color: var(--accent-diving);
            border-radius: 50%;
            animation: globeSpin 1.2s linear infinite;
        }
        .loading-ring-spin2 {
            position: absolute;
            inset: 8px;
            border: 2px solid transparent;
            border-bottom-color: var(--accent-park);
            border-left-color: var(--accent-hotspring);
            border-radius: 50%;
            animation: globeSpin 1.8s linear infinite reverse;
        }
        .loading-ring-spin3 {
            position: absolute;
            inset: 16px;
            border: 2px solid transparent;
            border-top-color: var(--accent-heritage);
            border-radius: 50%;
            animation: globeSpin 2.4s linear infinite;
        }
        .loading-globe-icon {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            opacity: 0.7;
        }
        @keyframes globeSpin { to { transform: rotate(360deg); } }
        .loading-text {
            font-family: 'Cinzel', serif;
            font-size: 13px;
            color: var(--text-dim);
            letter-spacing: 6px;
            text-transform: uppercase;
        }
        .loading-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 10px;
            letter-spacing: 2px;
        }

        /* ===== Nav Bar ===== */
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 52px;
            z-index: 100;
            background: rgba(8, 12, 24, 0.82);
            backdrop-filter: blur(24px) saturate(1.5);
            -webkit-backdrop-filter: blur(24px) saturate(1.5);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
        }
        .nav-trigger{position:absolute;right:16px;top:50%;transform:translateY(-50%);
            width:34px;height:34px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);
            background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;
            cursor:pointer;transition:all .25s;z-index:101;}
        .nav-trigger:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.12);}
        .nav-trigger svg{width:18px;height:18px;fill:rgba(255,255,255,0.4);}
        .nav-trigger:hover svg{fill:rgba(255,255,255,0.7);}
        .drawer-overlay{position:fixed;inset:0;z-index:110;background:rgba(0,0,0,0.4);
            opacity:0;pointer-events:none;transition:opacity .3s;}
        .drawer-overlay.open{opacity:1;pointer-events:all;}
        .drawer{position:fixed;top:0;right:0;bottom:0;z-index:115;width:200px;
            background:rgba(10,14,26,0.95);backdrop-filter:blur(24px) saturate(1.6);
            border-left:1px solid rgba(255,255,255,0.06);
            transform:translateX(100%);transition:transform .3s cubic-bezier(0.16,1,0.3,1);
            display:flex;flex-direction:column;padding:64px 16px 24px;overflow-y:auto;}
        .drawer.open{transform:translateX(0);}
        .drawer a{display:flex;align-items:center;gap:10px;
            padding:10px 14px;border-radius:10px;
            text-decoration:none;font-size:13px;font-weight:600;
            transition:all .2s;color:rgba(255,255,255,0.5);}
        .drawer a:hover{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.8);}
        .drawer .d-icon{font-size:16px;width:22px;text-align:center;}
        .drawer .d-sep{height:1px;margin:6px 14px;background:linear-gradient(90deg,rgba(255,255,255,0.04),transparent);}
        .nav-back {
            position: absolute;
            left: 20px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.25s;
        }
        .nav-back:hover { color: var(--text); }
        .nav-back-arrow {
            font-size: 16px;
            transition: transform 0.25s;
        }
        .nav-back:hover .nav-back-arrow { transform: translateX(-3px); }
        .nav-title {
            font-family: 'Cinzel', 'Noto Sans SC', serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #b794f4, #7cc4f5, #22c55e, #f59e0b, #b794f4);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s ease-in-out infinite;
        }
        @keyframes shimmer { 0%,100%{background-position:0% 50%;} 50%{background-position:100% 50%;} }

        /* ===== Layer Toggle Panel ===== */
        .layer-panel {
            position: fixed;
            top: 72px;
            left: 16px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .layer-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px 8px 10px;
            background: var(--dark-card);
            backdrop-filter: blur(16px) saturate(1.4);
            -webkit-backdrop-filter: blur(16px) saturate(1.4);
            border: 1px solid var(--dark-card-border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
            min-width: 120px;
        }
        .layer-btn:hover {
            background: rgba(20, 26, 50, 0.95);
            border-color: rgba(255,255,255,0.14);
        }
        .layer-btn.active {
            border-color: var(--layer-color, rgba(255,255,255,0.2));
            box-shadow: 0 0 12px -2px var(--layer-color, transparent),
                        inset 0 0 16px -8px var(--layer-color, transparent);
        }
        .layer-btn.inactive {
            opacity: 0.4;
        }
        .layer-btn.inactive:hover { opacity: 0.65; }
        .layer-emoji {
            font-size: 16px;
            width: 22px;
            text-align: center;
            flex-shrink: 0;
        }
        .layer-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            flex: 1;
            white-space: nowrap;
        }
        .layer-btn.inactive .layer-label { color: var(--text-dim); }
        .layer-count {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            color: var(--text-dim);
            flex-shrink: 0;
        }
        .layer-btn.active .layer-count {
            background: var(--layer-color, rgba(255,255,255,0.12));
            color: #fff;
        }

        /* ===== Stats Bar ===== */
        .stats-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: var(--dark-card);
            backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
            border: 1px solid var(--dark-card-border);
            border-radius: 24px;
            padding: 10px 28px;
            display: flex;
            align-items: center;
            gap: 28px;
            font-size: 13px;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-dim);
        }
        .stat-val {
            font-weight: 600;
            color: var(--text);
            font-variant-numeric: tabular-nums;
        }
        .stat-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-park);
            animation: statPulse 2s ease-in-out infinite;
        }
        @keyframes statPulse { 0%,100%{opacity:0.5;} 50%{opacity:1;} }

        /* ===== Info Card (click popup) ===== */
        .info-card {
            position: fixed;
            z-index: 200;
            background: rgba(12, 16, 36, 0.96);
            backdrop-filter: blur(20px) saturate(1.5);
            -webkit-backdrop-filter: blur(20px) saturate(1.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 16px 20px;
            min-width: 220px;
            max-width: 300px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
            display: none;
            opacity: 0;
            transform: translateY(6px) scale(0.96);
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        .info-card.show {
            display: block;
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .info-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .info-card-emoji {
            font-size: 22px;
        }
        .info-card-name {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            line-height: 1.3;
        }
        .info-card-type {
            font-size: 11px;
            color: var(--text-dim);
            padding: 2px 8px;
            border-radius: 6px;
            background: rgba(255,255,255,0.06);
            display: inline-block;
            margin-bottom: 8px;
        }
        .info-card-detail {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .info-card-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: var(--accent-travel);
            text-decoration: none;
            transition: color 0.2s;
        }
        .info-card-link:hover { color: #d4b8ff; }

        /* ===== Custom Markers ===== */
        .wm-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            border: 1.5px solid;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }
        .wm-dot:hover {
            transform: scale(1.8);
            z-index: 10;
        }
        .wm-tri {
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 10px solid;
            cursor: pointer;
            transition: transform 0.2s;
            filter: drop-shadow(0 0 3px currentColor);
        }
        .wm-tri:hover {
            transform: scale(1.6);
            z-index: 10;
        }
        .wm-diamond {
            width: 8px;
            height: 8px;
            transform: rotate(45deg);
            border: 1.5px solid;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .wm-diamond:hover {
            transform: rotate(45deg) scale(1.8);
            z-index: 10;
        }
        .wm-sq {
            width: 7px;
            height: 7px;
            border: 1.5px solid;
            border-radius: 1.5px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .wm-sq:hover {
            transform: scale(1.8);
            z-index: 10;
        }

        /* hide amap logo/copyright */
        .amap-logo, .amap-copyright { display: none !important; }
    </style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-screen" id="loadingScreen">
    <div class="loading-globe-wrap">
        <div class="loading-ring"></div>
        <div class="loading-ring-spin"></div>
        <div class="loading-ring-spin2"></div>
        <div class="loading-ring-spin3"></div>
        <div class="loading-globe-icon">🌏</div>
    </div>
    <div class="loading-text">World Overview</div>
    <div class="loading-sub">加载数据中...</div>
</div>

<!-- Nav Bar -->
<div class="nav-bar">
    <div class="nav-title">世 界 总 览</div>
    <div class="nav-trigger" onclick="var d=document.getElementById('drawer'),o=document.getElementById('dOverlay');d.classList.toggle('open');o.classList.toggle('open');">
        <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </div>
</div>
<div class="drawer-overlay" id="dOverlay" onclick="document.getElementById('drawer').classList.remove('open');this.classList.remove('open');"></div>
<div class="drawer" id="drawer">
    <a href="travel_map.html"><span class="d-icon">📍</span>足迹地图</a>
    <a href="heritage.html"><span class="d-icon">🏛️</span>遗产册</a>
    <div class="d-sep"></div>
    <a href="mountains.html"><span class="d-icon">🏔️</span>雪山图鉴</a>
    <a href="mountain_map.html"><span class="d-icon">🗺️</span>雪山地图</a>
    <div class="d-sep"></div>
    <a href="parks.html"><span class="d-icon">🌲</span>国家公园</a>
    <a href="darksky.html"><span class="d-icon">🌌</span>暗夜星空</a>
    <a href="diving.html"><span class="d-icon">🤿</span>潜水图鉴</a>
    <a href="hotspring.html"><span class="d-icon">♨️</span>温泉图鉴</a>
    <div class="d-sep"></div>
    <a href="timeline.html"><span class="d-icon">📅</span>旅行时间线</a>
    <a href="stats.html"><span class="d-icon">📊</span>旅行统计</a>
    <div class="d-sep"></div>
    <a href="config.html"><span class="d-icon">⚙️</span>数据编辑</a>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Layer Panel -->
<div class="layer-panel" id="layerPanel"></div>

<!-- Stats Bar -->
<div class="stats-bar" id="statsBar">
    <div class="stat-item">
        <div class="stat-dot"></div>
        <span>可见标记</span>
        <span class="stat-val" id="statVisible">0</span>
    </div>
    <div class="stat-item">
        <span>活跃图层</span>
        <span class="stat-val" id="statLayers">0</span>
        <span>/ 7</span>
    </div>
</div>

<!-- Info Card -->
<div class="info-card" id="infoCard">
    <div class="info-card-header">
        <span class="info-card-emoji" id="icEmoji"></span>
        <span class="info-card-name" id="icName"></span>
    </div>
    <div class="info-card-type" id="icType"></div>
    <div class="info-card-detail" id="icDetail"></div>
    <a class="info-card-link" id="icLink" href="#" target="_blank">
        查看详情 <span style="font-size:14px">→</span>
    </a>
</div>

<script>
(function() {
    'use strict';

    /* ===== Layer config ===== */
    var LAYERS = [
        { key: 'travel',    emoji: '📍',  label: '足迹', color: '#b794f4' },
        { key: 'mountain',  emoji: '🏔️', label: '雪山', color: '#7cc4f5' },
        { key: 'park',      emoji: '🌲',  label: '公园', color: '#22c55e' },
        { key: 'darksky',   emoji: '🌌',  label: '星空', color: '#818cf8' },
        { key: 'diving',    emoji: '🤿',  label: '潜水', color: '#0ea5e9' },
        { key: 'hotspring', emoji: '♨️',  label: '温泉', color: '#f59e0b' },
        { key: 'heritage',  emoji: '🏛️', label: '遗产', color: '#9f7aea' }
    ];

    var TYPE_LABELS = {
        travel: '足迹',
        mountain: '雪山',
        park: '国家公园',
        darksky: '暗夜星空',
        diving: '潜水',
        hotspring: '温泉',
        heritage: '世界遗产'
    };

    var layerMarkers = {};
    var layerActive = {};
    var layerDataLoaded = {};
    var layerRawData = {};
    LAYERS.forEach(function(l) {
        layerMarkers[l.key] = [];
        layerActive[l.key] = (l.key === 'travel');
        layerDataLoaded[l.key] = false;
    });

    /* ===== Init Map ===== */
    var map = new AMap.Map('map', {
        zoom: 3,
        center: [20, 40],
        mapStyle: 'amap://styles/darkblue',
        viewMode: '3D',
        pitch: 35,
        features: ['bg', 'road', 'building'],
        expandZoomRange: true,
        zooms: [2, 20]
    });

    /* ===== Marker helpers ===== */
    function makeDot(color, size) {
        var s = size || 8;
        var el = document.createElement('div');
        el.className = 'wm-dot';
        el.style.width = s + 'px';
        el.style.height = s + 'px';
        el.style.borderColor = color;
        el.style.background = color;
        el.style.boxShadow = '0 0 6px ' + color;
        return el;
    }

    function makeTriangle(color, elev) {
        var el = document.createElement('div');
        el.className = 'wm-tri';
        el.style.borderBottomColor = color;
        el.style.color = color;
        return el;
    }

    function makeDiamond(color) {
        var el = document.createElement('div');
        el.className = 'wm-diamond';
        el.style.borderColor = color;
        el.style.background = color;
        el.style.boxShadow = '0 0 6px ' + color;
        return el;
    }

    function makeSquare(color) {
        var el = document.createElement('div');
        el.className = 'wm-sq';
        el.style.borderColor = color;
        el.style.background = color;
        el.style.boxShadow = '0 0 5px ' + color;
        return el;
    }

    function elevColor(elev) {
        if (elev >= 8000) return '#ef4444';
        if (elev >= 7000) return '#f97316';
        if (elev >= 6000) return '#eab308';
        if (elev >= 5000) return '#22c55e';
        if (elev >= 4000) return '#38bdf8';
        return '#a78bfa';
    }

    function createMarker(pos, contentEl, extData, layerKey) {
        var mk = new AMap.Marker({
            position: pos,
            content: contentEl,
            offset: new AMap.Pixel(-4, -4),
            extData: extData,
            zIndex: layerKey === 'mountain' ? 12 : 10
        });
        mk.on('click', function(e) {
            showInfoCard(e, mk.getExtData());
        });
        mk.setMap(map);
        layerMarkers[layerKey].push(mk);
    }

    /* ===== Info Card ===== */
    var infoCard = document.getElementById('infoCard');
    var dismissTimer = null;

    function showInfoCard(e, data) {
        if (dismissTimer) { clearTimeout(dismissTimer); dismissTimer = null; }

        var emojiMap = {};
        LAYERS.forEach(function(l) { emojiMap[l.key] = l.emoji; });

        document.getElementById('icEmoji').textContent = emojiMap[data.type] || '';
        document.getElementById('icName').textContent = data.name || '';
        document.getElementById('icType').textContent = TYPE_LABELS[data.type] || data.type;
        document.getElementById('icDetail').textContent = data.detail || '';
        document.getElementById('icLink').href = data.link || '#';

        /* position near click */
        var px = e.pixel || { x: 300, y: 300 };
        var vw = window.innerWidth;
        var vh = window.innerHeight;
        var left = px.x + 16;
        var top = px.y - 40;
        if (left + 300 > vw) left = px.x - 320;
        if (top + 200 > vh) top = vh - 220;
        if (top < 60) top = 60;
        if (left < 10) left = 10;
        infoCard.style.left = left + 'px';
        infoCard.style.top = top + 'px';

        infoCard.classList.add('show');
    }

    function hideInfoCard() {
        infoCard.classList.remove('show');
    }

    map.on('click', function(e) {
        /* only dismiss if not clicking a marker */
        var tgt = e.originEvent && e.originEvent.target;
        if (tgt && (
            tgt.classList.contains('wm-dot') ||
            tgt.classList.contains('wm-tri') ||
            tgt.classList.contains('wm-diamond') ||
            tgt.classList.contains('wm-sq')
        )) return;
        hideInfoCard();
    });

    /* ===== Build layer panel ===== */
    var panelEl = document.getElementById('layerPanel');

    function buildPanel() {
        panelEl.innerHTML = '';
        LAYERS.forEach(function(cfg) {
            var btn = document.createElement('div');
            btn.className = 'layer-btn' + (layerActive[cfg.key] ? ' active' : ' inactive');
            btn.style.setProperty('--layer-color', cfg.color);
            btn.setAttribute('data-layer', cfg.key);

            btn.innerHTML = '<span class="layer-emoji">' + cfg.emoji + '</span>' +
                '<span class="layer-label">' + cfg.label + '</span>' +
                '<span class="layer-count" id="count-' + cfg.key + '">0</span>';

            btn.addEventListener('click', function() {
                toggleLayer(cfg.key, btn);
            });
            panelEl.appendChild(btn);
        });
    }
    buildPanel();

    function toggleLayer(key, btn) {
        layerActive[key] = !layerActive[key];
        if (layerActive[key]) {
            btn.classList.remove('inactive');
            btn.classList.add('active');
            if (!layerDataLoaded[key] && layerRawData[key]) {
                buildLayerMarkers(key, layerRawData[key]);
                layerDataLoaded[key] = true;
                var el = document.getElementById('count-' + key);
                if (el) el.textContent = layerMarkers[key].length;
            }
            layerMarkers[key].forEach(function(m) { m.show(); });
        } else {
            btn.classList.remove('active');
            btn.classList.add('inactive');
            layerMarkers[key].forEach(function(m) { m.hide(); });
            hideInfoCard();
        }
        updateStats();
    }

    /* ===== Stats ===== */
    function updateStats() {
        var visible = 0;
        var active = 0;
        LAYERS.forEach(function(cfg) {
            if (layerActive[cfg.key]) {
                visible += layerMarkers[cfg.key].length;
                active++;
            }
        });
        document.getElementById('statVisible').textContent = visible;
        document.getElementById('statLayers').textContent = active;
    }

    function updateCounts() {
        LAYERS.forEach(function(cfg) {
            var el = document.getElementById('count-' + cfg.key);
            if (!el) return;
            if (layerDataLoaded[cfg.key]) {
                el.textContent = layerMarkers[cfg.key].length;
            } else if (layerRawData[cfg.key]) {
                var d = layerRawData[cfg.key];
                if (cfg.key === 'travel') {
                    var c = 0;
                    d.forEach(function(city) { c += (city.spots || []).length; });
                    el.textContent = c;
                } else {
                    el.textContent = d.length;
                }
            }
        });
    }

    /* ===== Load Data ===== */
    function buildLayerMarkers(key, data) {
        if (key === 'travel') {
            data.forEach(function(city) {
                (city.spots || []).forEach(function(spot) {
                    if (!spot.lat || !spot.lng) return;
                    createMarker([spot.lng, spot.lat], makeDot('#b794f4', 6),
                        { type: 'travel', name: spot.title || '', detail: city.city + (spot.category ? ' · ' + spot.category : ''), link: 'travel_map.html' }, 'travel');
                });
            });
        } else if (key === 'mountain') {
            data.forEach(function(mt) {
                if (!mt.lat || !mt.lng) return;
                var c = elevColor(mt.elevation || 0);
                createMarker([mt.lng, mt.lat], makeTriangle(c),
                    { type: 'mountain', name: mt.name || '', detail: (mt.elevation || 0) + 'm · ' + (mt.range || mt.country || ''), link: 'mountains.html' }, 'mountain');
            });
        } else if (key === 'park') {
            data.forEach(function(pk) {
                if (!pk.lat || !pk.lng) return;
                createMarker([pk.lng, pk.lat], makeDot('#22c55e', 6),
                    { type: 'park', name: pk.name || '', detail: pk.country + (pk.area ? ' · ' + pk.area + 'km²' : ''), link: 'parks.html' }, 'park');
            });
        } else if (key === 'darksky') {
            data.forEach(function(ds) {
                if (!ds.lat || !ds.lng) return;
                createMarker([ds.lng, ds.lat], makeDiamond('#818cf8'),
                    { type: 'darksky', name: ds.name || '', detail: (ds.bortle ? 'Bortle ' + ds.bortle : '') + (ds.country ? ' · ' + ds.country : ''), link: 'darksky.html' }, 'darksky');
            });
        } else if (key === 'diving') {
            data.forEach(function(dv) {
                if (!dv.lat || !dv.lng) return;
                createMarker([dv.lng, dv.lat], makeDot('#0ea5e9', 6),
                    { type: 'diving', name: dv.name || '', detail: (dv.depth ? dv.depth + 'm · ' : '') + (dv.country || ''), link: 'diving.html' }, 'diving');
            });
        } else if (key === 'hotspring') {
            data.forEach(function(hs) {
                if (!hs.lat || !hs.lng) return;
                createMarker([hs.lng, hs.lat], makeDot('#f59e0b', 6),
                    { type: 'hotspring', name: hs.name || '', detail: (hs.temperature ? hs.temperature + '°C · ' : '') + (hs.country || ''), link: 'hotspring.html' }, 'hotspring');
            });
        } else if (key === 'heritage') {
            data.forEach(function(h) {
                if (!h.lat || !h.lng) return;
                createMarker([h.lng, h.lat], makeSquare('#9f7aea'),
                    { type: 'heritage', name: h.name_zh || h.name || h.name_en || '', detail: (h.country || '') + (h.type ? ' · ' + h.type : ''), link: 'heritage.html' }, 'heritage');
            });
        }
    }

    var LAYER_FILES = {
        travel: 'data/travel.json',
        mountain: 'data/mountains_global.json',
        park: 'data/parks_global.json',
        darksky: 'data/darksky_global.json',
        diving: 'data/diving_global.json',
        hotspring: 'data/hotspring_global.json',
        heritage: 'data/heritage_global.json'
    };

    var fileKeys = Object.keys(LAYER_FILES);
    var fileUrls = fileKeys.map(function(k) { return LAYER_FILES[k]; });

    Promise.all(
        fileUrls.map(function(url) { return fetch(url).then(function(r) { return r.json(); }); })
    ).then(function(results) {
        fileKeys.forEach(function(key, i) {
            layerRawData[key] = results[i];
        });

        buildLayerMarkers('travel', layerRawData.travel);
        layerDataLoaded.travel = true;

        updateCounts();
        updateStats();

        setTimeout(function() {
            document.getElementById('loadingScreen').classList.add('hidden');
        }, 600);

    }).catch(function(err) {
        console.error('Data load error:', err);
        document.querySelector('.loading-sub').textContent = '数据加载失败';
    });

})();
</script>
</body>
</html>
