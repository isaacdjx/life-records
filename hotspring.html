<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>温泉图鉴</title>
<link href="data/fonts/fonts_local.css" rel="stylesheet">
<script src="https://webapi.amap.com/maps?v=2.0&key=f66cdc07203c3075a2a2ae1ea67eea8e"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --dark:#080c18;--dark2:#0f1629;--dark3:#161d35;--dark4:#1e2844;
  --amber:#f59e0b;--amber-d:#d97706;--amber-l:#fbbf24;--amber-xl:#fde68a;
  --steam:#e0f2fe;--steam2:#bae6fd;
  --hot-red:#ef4444;--warm:#f97316;--mild:#22d3ee;--cool:#3b82f6;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --card-bg:rgba(15,22,41,0.85);
  --radius:14px;--radius-sm:8px;
}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:'Noto Sans SC','Cinzel',system-ui,sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── Loading ── */
.loading-overlay{position:fixed;inset:0;z-index:9999;background:var(--dark);display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .6s}
.loading-overlay.fade-out{opacity:0;pointer-events:none}
.loading-svg{width:120px;height:120px}
.steam-path{fill:none;stroke:var(--amber);stroke-width:2;stroke-linecap:round;stroke-dasharray:200;stroke-dashoffset:200;animation:steamDraw 2s ease forwards}
.drop-path{fill:none;stroke:var(--steam2);stroke-width:2.5;stroke-linecap:round;stroke-dasharray:120;stroke-dashoffset:120;animation:steamDraw 1.8s .3s ease forwards}
@keyframes steamDraw{to{stroke-dashoffset:0}}
.loading-text{margin-top:16px;color:var(--amber);font-size:14px;letter-spacing:4px;opacity:0;animation:fadeUp .8s .6s ease forwards}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

/* ── Nav ── */
.nav{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(8,12,24,0.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid rgba(245,158,11,0.12);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.nav-back{color:var(--text2);text-decoration:none;font-size:14px;display:flex;align-items:center;gap:4px;transition:color .2s}
.nav-back:hover{color:var(--amber)}
.nav-title{font-family:'Cinzel','Noto Sans SC',serif;font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--amber-l),var(--amber),var(--amber-d));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s ease-in-out infinite}
@keyframes shimmer{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}
.nav-right{width:60px}

/* ── Hero ── */
.hero{margin-top:52px;padding:40px 20px 32px;text-align:center;background:linear-gradient(180deg,rgba(245,158,11,0.06) 0%,transparent 100%)}
.hero-title{font-size:13px;color:var(--amber);letter-spacing:6px;text-transform:uppercase;margin-bottom:20px}
.hero-stats{display:flex;justify-content:center;gap:40px;flex-wrap:wrap}
.hero-stat{text-align:center}
.hero-stat-num{font-family:'Cinzel',serif;font-size:36px;font-weight:700;color:var(--amber-l);line-height:1.1}
.hero-stat-label{font-size:12px;color:var(--text3);margin-top:4px;letter-spacing:1px}

/* ── Filters ── */
.filters{padding:0 16px 16px;display:flex;flex-direction:column;gap:10px;max-width:1200px;margin:0 auto}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid rgba(245,158,11,0.2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;transition:all .25s;font-family:inherit;white-space:nowrap}
.filter-btn:hover{border-color:var(--amber);color:var(--amber)}
.filter-btn.active{background:linear-gradient(135deg,var(--amber-d),var(--amber));color:var(--dark);border-color:var(--amber);font-weight:600}
.filter-label{font-size:11px;color:var(--text3);padding:6px 8px;letter-spacing:2px}

/* ── Grid ── */
.grid-wrap{max-width:1200px;margin:0 auto;padding:8px 16px 60px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.card-count{text-align:center;color:var(--text3);font-size:12px;padding:8px 0 16px;letter-spacing:1px}

/* ── Card ── */
.card{background:var(--card-bg);border-radius:var(--radius);border:1px solid rgba(245,158,11,0.08);overflow:hidden;cursor:pointer;transition:all .3s;position:relative}
.card:hover{transform:translateY(-3px);border-color:rgba(245,158,11,0.25);box-shadow:0 8px 30px rgba(245,158,11,0.1)}
.card-cover{height:120px;position:relative;overflow:hidden}
.card-cover-bg{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.card-steam-svg{opacity:0.25;width:80px;height:80px}
.card-visited{position:absolute;top:10px;right:10px;background:linear-gradient(135deg,var(--amber),var(--amber-d));color:var(--dark);font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px;letter-spacing:1px}
.card-type-tag{position:absolute;bottom:10px;left:10px;background:rgba(8,12,24,0.7);backdrop-filter:blur(6px);color:var(--amber-l);font-size:10px;padding:3px 8px;border-radius:6px;border:1px solid rgba(245,158,11,0.2)}
.card-body{padding:14px}
.card-name{font-size:15px;font-weight:600;color:var(--text);margin-bottom:2px}
.card-name-en{font-family:'Cinzel',serif;font-size:11px;color:var(--text3);margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.card-temp{font-size:13px;font-weight:700;display:flex;align-items:center;gap:3px}
.card-temp-icon{width:14px;height:14px}
.card-country{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:3px}
.card-country::before{content:'';display:inline-block;width:3px;height:3px;background:var(--text3);border-radius:50%}
.card-season{font-size:11px;color:var(--text3)}
.card-altitude{font-size:10px;color:var(--text3);margin-top:6px}

/* ── Modal ── */
.modal-mask{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:20px;opacity:0;transition:opacity .3s}
.modal-mask.show{display:flex;opacity:1}
.modal{background:var(--dark2);border-radius:var(--radius);border:1px solid rgba(245,158,11,0.15);max-width:520px;width:100%;max-height:85vh;overflow-y:auto;position:relative;animation:modalIn .35s ease}
@keyframes modalIn{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-close{position:absolute;top:12px;right:14px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.5);border:none;color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5;transition:all .2s}
.modal-close:hover{background:rgba(245,158,11,0.3);color:var(--amber)}
.modal-cover{height:160px;position:relative;overflow:hidden}
.modal-cover-bg{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.modal-steam-svg{opacity:0.2;width:100px;height:100px}
.modal-visited-badge{position:absolute;top:14px;left:14px;background:linear-gradient(135deg,var(--amber),var(--amber-d));color:var(--dark);font-size:11px;font-weight:700;padding:4px 12px;border-radius:10px;letter-spacing:1px}
.modal-body{padding:20px}
.modal-name{font-size:22px;font-weight:700;color:var(--text);margin-bottom:2px}
.modal-name-en{font-family:'Cinzel',serif;font-size:13px;color:var(--text3);margin-bottom:12px}
.modal-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.modal-tag{padding:3px 10px;border-radius:12px;font-size:11px;border:1px solid rgba(245,158,11,0.2);color:var(--amber-l);background:rgba(245,158,11,0.06)}
.modal-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.modal-info-item{background:rgba(245,158,11,0.04);border-radius:var(--radius-sm);padding:10px 12px;border:1px solid rgba(245,158,11,0.08)}
.modal-info-label{font-size:10px;color:var(--text3);letter-spacing:1px;margin-bottom:4px}
.modal-info-value{font-size:14px;font-weight:600;color:var(--text)}
.modal-desc{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:16px}
.modal-highlights{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.modal-highlight{padding:4px 10px;border-radius:8px;font-size:11px;background:rgba(245,158,11,0.08);color:var(--amber-l);border:1px solid rgba(245,158,11,0.12)}
.modal-map{width:100%;height:200px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid rgba(245,158,11,0.1)}
.modal-wiki-link{display:inline-flex;align-items:center;gap:4px;margin-top:14px;padding:6px 14px;
    border-radius:8px;background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.1);
    color:#f59e0b;font-size:11px;font-weight:600;text-decoration:none;transition:all .2s}
.modal-wiki-link:hover{background:rgba(245,158,11,0.12);border-color:rgba(245,158,11,0.2)}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(245,158,11,0.2);border-radius:3px}

/* ── Responsive ── */
@media(max-width:480px){
  .hero-stats{gap:24px}
  .hero-stat-num{font-size:28px}
  .grid{grid-template-columns:1fr 1fr}
  .card-cover{height:90px}
  .card-body{padding:10px}
  .card-name{font-size:13px}
  .modal{max-height:90vh}
}
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <svg class="loading-svg" viewBox="0 0 100 100">
    <path class="steam-path" d="M30 80 Q30 60 40 50 Q50 40 45 25 Q42 15 50 8"/>
    <path class="steam-path" d="M50 85 Q50 65 55 55 Q60 45 55 30 Q52 20 58 10" style="animation-delay:.2s"/>
    <path class="steam-path" d="M70 80 Q70 60 65 50 Q58 40 63 25 Q66 15 60 8" style="animation-delay:.4s"/>
    <path class="drop-path" d="M50 92 Q42 82 42 76 Q42 68 50 68 Q58 68 58 76 Q58 82 50 92Z"/>
  </svg>
  <div class="loading-text">温 泉 图 鉴</div>
</div>

<!-- Nav -->
<nav class="nav">
  <a href="index.html" class="nav-back">← 首页</a>
  <div class="nav-title">温泉图鉴</div>
  <div class="nav-right"></div>
</nav>

<!-- Hero -->
<section class="hero" id="hero">
  <div class="hero-title">GLOBAL HOT SPRING ATLAS</div>
  <div class="hero-stats">
    <div class="hero-stat">
      <div class="hero-stat-num" id="statTotal">0</div>
      <div class="hero-stat-label">温泉收录</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-num" id="statVisited">0</div>
      <div class="hero-stat-label">已探访</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-num" id="statCountries">0</div>
      <div class="hero-stat-label">国家/地区</div>
    </div>
  </div>
</section>

<!-- Filters -->
<div class="filters" id="filters">
  <div class="filter-row" id="typeFilters">
    <span class="filter-label">类型</span>
    <button class="filter-btn active" data-type="all">全部</button>
  </div>
  <div class="filter-row" id="regionFilters">
    <span class="filter-label">地区</span>
    <button class="filter-btn active" data-region="all">全部</button>
  </div>
</div>

<!-- Grid -->
<div class="grid-wrap">
  <div class="card-count" id="cardCount"></div>
  <div class="grid" id="grid"></div>
</div>

<!-- Modal -->
<div class="modal-mask" id="modalMask">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">&times;</button>
    <div class="modal-cover" id="modalCover">
      <div class="modal-cover-bg" id="modalCoverBg">
        <svg class="modal-steam-svg" viewBox="0 0 100 100">
          <path d="M30 80 Q30 60 40 50 Q50 40 45 25" fill="none" stroke="rgba(251,191,36,0.3)" stroke-width="2"/>
          <path d="M50 85 Q50 65 55 55 Q60 45 55 30" fill="none" stroke="rgba(251,191,36,0.2)" stroke-width="2"/>
          <path d="M70 80 Q70 60 65 50 Q58 40 63 25" fill="none" stroke="rgba(251,191,36,0.3)" stroke-width="2"/>
        </svg>
      </div>
      <div class="modal-visited-badge" id="modalVisited" style="display:none">已探访</div>
    </div>
    <div class="modal-body">
      <div class="modal-name" id="modalName"></div>
      <div class="modal-name-en" id="modalNameEn"></div>
      <div class="modal-tags" id="modalTags"></div>
      <div class="modal-info-grid" id="modalInfo"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-highlights" id="modalHighlights"></div>
      <a class="modal-wiki-link" id="modalWiki" href="#" target="_blank" rel="noopener">📖 Wikipedia</a>
      <div class="modal-map" id="modalMap"></div>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';

  /* ── Globals ── */
  var springs = [];
  var travelData = [];
  var visitedSet = {};
  var activeType = 'all';
  var activeRegion = 'all';
  var mapInstance = null;
  var mapMarker = null;

  /* ── Cover gradients by type ── */
  var coverGradients = {
    '地热温泉': 'linear-gradient(135deg, #92400e 0%, #d97706 50%, #f59e0b 100%)',
    '野温泉': 'linear-gradient(135deg, #064e3b 0%, #065f46 40%, #d97706 100%)',
    '间歇泉': 'linear-gradient(135deg, #7c2d12 0%, #ea580c 50%, #fbbf24 100%)',
    '温泉小镇': 'linear-gradient(135deg, #1e3a5f 0%, #b45309 50%, #fde68a 100%)',
    '火山温泉': 'linear-gradient(135deg, #450a0a 0%, #dc2626 40%, #f97316 100%)',
    '海滨温泉': 'linear-gradient(135deg, #0c4a6e 0%, #0284c7 40%, #f59e0b 100%)',
    '地热奇观': 'linear-gradient(135deg, #581c87 0%, #d97706 50%, #fde68a 100%)'
  };

  /* ── Temp color ── */
  function tempColor(t) {
    if (t < 30) return 'var(--cool)';
    if (t <= 40) return 'var(--amber-l)';
    if (t <= 50) return 'var(--warm)';
    return 'var(--hot-red)';
  }

  /* ── Load JSON ── */
  function loadJSON(url, cb) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4) {
        if (xhr.status === 200) {
          try { cb(JSON.parse(xhr.responseText)); } catch(e) { cb([]); }
        } else { cb([]); }
      }
    };
    xhr.send();
  }

  /* ── Build visited set ── */
  function buildVisitedSet(travel) {
    visitedSet = {};
    for (var i = 0; i < travel.length; i++) {
      var item = travel[i];
      var name = (item.name || item.destination || '').toLowerCase();
      visitedSet[name] = true;
      if (item.tags) {
        for (var j = 0; j < item.tags.length; j++) {
          visitedSet[item.tags[j].toLowerCase()] = true;
        }
      }
    }
  }

  function isVisited(spring) {
    if (!spring.matchKeys) return false;
    for (var i = 0; i < spring.matchKeys.length; i++) {
      if (visitedSet[spring.matchKeys[i].toLowerCase()]) return true;
    }
    return false;
  }

  /* ── Animate number ── */
  function animateNum(el, target) {
    var start = 0;
    var duration = 800;
    var startTime = null;
    function step(ts) {
      if (!startTime) startTime = ts;
      var progress = Math.min((ts - startTime) / duration, 1);
      var val = Math.floor(progress * target);
      el.textContent = val;
      if (progress < 1) requestAnimationFrame(step);
      else el.textContent = target;
    }
    requestAnimationFrame(step);
  }

  /* ── Build stats ── */
  function buildStats() {
    var visited = 0;
    var countries = {};
    for (var i = 0; i < springs.length; i++) {
      if (isVisited(springs[i])) visited++;
      countries[springs[i].country] = true;
    }
    animateNum(document.getElementById('statTotal'), springs.length);
    animateNum(document.getElementById('statVisited'), visited);
    animateNum(document.getElementById('statCountries'), Object.keys(countries).length);
  }

  /* ── Build filters ── */
  function buildFilters() {
    var types = {};
    var regions = {};
    for (var i = 0; i < springs.length; i++) {
      types[springs[i].type] = (types[springs[i].type] || 0) + 1;
      regions[springs[i].region] = (regions[springs[i].region] || 0) + 1;
    }
    var typeRow = document.getElementById('typeFilters');
    var typeKeys = Object.keys(types);
    for (var t = 0; t < typeKeys.length; t++) {
      var btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.setAttribute('data-type', typeKeys[t]);
      btn.textContent = typeKeys[t] + ' ' + types[typeKeys[t]];
      typeRow.appendChild(btn);
    }
    var regionRow = document.getElementById('regionFilters');
    var regionKeys = Object.keys(regions);
    for (var r = 0; r < regionKeys.length; r++) {
      var btn2 = document.createElement('button');
      btn2.className = 'filter-btn';
      btn2.setAttribute('data-region', regionKeys[r]);
      btn2.textContent = regionKeys[r] + ' ' + regions[regionKeys[r]];
      regionRow.appendChild(btn2);
    }

    typeRow.addEventListener('click', function(e) {
      var target = e.target;
      if (!target.classList.contains('filter-btn')) return;
      var btns = typeRow.querySelectorAll('.filter-btn');
      for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
      target.classList.add('active');
      activeType = target.getAttribute('data-type');
      renderGrid();
    });

    regionRow.addEventListener('click', function(e) {
      var target = e.target;
      if (!target.classList.contains('filter-btn')) return;
      var btns = regionRow.querySelectorAll('.filter-btn');
      for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
      target.classList.add('active');
      activeRegion = target.getAttribute('data-region');
      renderGrid();
    });
  }

  /* ── Steam SVG for cards ── */
  function steamSVG() {
    return '<svg class="card-steam-svg" viewBox="0 0 80 80">'
      + '<path d="M25 65 Q25 50 32 42 Q38 35 35 22" fill="none" stroke="rgba(251,191,36,0.3)" stroke-width="1.5" stroke-linecap="round"/>'
      + '<path d="M40 68 Q40 52 44 44 Q48 36 44 24" fill="none" stroke="rgba(251,191,36,0.2)" stroke-width="1.5" stroke-linecap="round"/>'
      + '<path d="M55 65 Q55 50 52 42 Q48 35 52 22" fill="none" stroke="rgba(251,191,36,0.3)" stroke-width="1.5" stroke-linecap="round"/>'
      + '</svg>';
  }

  /* ── Render grid ── */
  function renderGrid() {
    var grid = document.getElementById('grid');
    var filtered = [];
    for (var i = 0; i < springs.length; i++) {
      var s = springs[i];
      if (activeType !== 'all' && s.type !== activeType) continue;
      if (activeRegion !== 'all' && s.region !== activeRegion) continue;
      filtered.push(s);
    }
    document.getElementById('cardCount').textContent = '共 ' + filtered.length + ' 处温泉';

    var html = '';
    for (var j = 0; j < filtered.length; j++) {
      var sp = filtered[j];
      var visited = isVisited(sp);
      var grad = coverGradients[sp.type] || coverGradients['地热温泉'];
      var tc = tempColor(sp.temperature);
      var altText = sp.altitude > 0 ? '海拔 ' + sp.altitude + 'm' : (sp.altitude < 0 ? '海拔 ' + sp.altitude + 'm' : '海平面');

      html += '<div class="card" data-idx="' + sp.id + '">'
        + '<div class="card-cover"><div class="card-cover-bg" style="background:' + grad + '">' + steamSVG() + '</div>'
        + (visited ? '<div class="card-visited">已探访</div>' : '')
        + '<div class="card-type-tag">' + sp.type + '</div>'
        + '</div>'
        + '<div class="card-body">'
        + '<div class="card-name">' + sp.name + '</div>'
        + '<div class="card-name-en">' + sp.nameEn + '</div>'
        + '<div class="card-meta">'
        + '<span class="card-temp" style="color:' + tc + '">'
        + '<svg class="card-temp-icon" viewBox="0 0 24 24" fill="none" stroke="' + tc + '" stroke-width="2"><path d="M12 2v14m0 0a5 5 0 1 1-4-2.5V6a4 4 0 0 1 8 0v7.5A5 5 0 0 1 12 16z"/></svg>'
        + sp.temperature + '°C</span>'
        + '<span class="card-country">' + sp.country + '</span>'
        + '<span class="card-season">' + sp.bestSeason + '</span>'
        + '</div>'
        + '<div class="card-altitude">' + altText + '</div>'
        + '</div></div>';
    }
    grid.innerHTML = html;

    /* Card click */
    var cards = grid.querySelectorAll('.card');
    for (var k = 0; k < cards.length; k++) {
      cards[k].addEventListener('click', function() {
        var id = parseInt(this.getAttribute('data-idx'), 10);
        for (var m = 0; m < springs.length; m++) {
          if (springs[m].id === id) { openModal(springs[m]); break; }
        }
      });
    }
  }

  /* ── Modal ── */
  function openModal(sp) {
    var mask = document.getElementById('modalMask');
    var visited = isVisited(sp);
    var grad = coverGradients[sp.type] || coverGradients['地热温泉'];
    var tc = tempColor(sp.temperature);

    document.getElementById('modalCoverBg').style.background = grad;
    document.getElementById('modalVisited').style.display = visited ? 'block' : 'none';
    document.getElementById('modalName').textContent = sp.name;
    document.getElementById('modalNameEn').textContent = sp.nameEn;
    document.getElementById('modalWiki').href = 'https://en.wikipedia.org/wiki/' + encodeURIComponent(sp.nameEn.replace(/ /g, '_'));
    document.getElementById('modalDesc').textContent = sp.description;

    /* Tags */
    var tagsHtml = '<span class="modal-tag">' + sp.type + '</span>'
      + '<span class="modal-tag">' + sp.region + '</span>';
    document.getElementById('modalTags').innerHTML = tagsHtml;

    /* Info grid */
    var altText = sp.altitude > 0 ? sp.altitude + ' m' : (sp.altitude < 0 ? sp.altitude + ' m' : '海平面');
    var infoHtml = '<div class="modal-info-item"><div class="modal-info-label">水温</div><div class="modal-info-value" style="color:' + tc + '">' + sp.temperature + '°C</div></div>'
      + '<div class="modal-info-item"><div class="modal-info-label">海拔</div><div class="modal-info-value">' + altText + '</div></div>'
      + '<div class="modal-info-item"><div class="modal-info-label">最佳季节</div><div class="modal-info-value">' + sp.bestSeason + '</div></div>'
      + '<div class="modal-info-item"><div class="modal-info-label">国家/地区</div><div class="modal-info-value">' + sp.country + '</div></div>';
    document.getElementById('modalInfo').innerHTML = infoHtml;

    /* Highlights */
    var hlHtml = '';
    if (sp.highlights) {
      for (var i = 0; i < sp.highlights.length; i++) {
        hlHtml += '<span class="modal-highlight">' + sp.highlights[i] + '</span>';
      }
    }
    document.getElementById('modalHighlights').innerHTML = hlHtml;

    mask.classList.add('show');
    document.body.style.overflow = 'hidden';

    /* AMap */
    setTimeout(function() {
      try {
        if (mapInstance) {
          mapInstance.destroy();
          mapInstance = null;
        }
        mapInstance = new AMap.Map('modalMap', {
          zoom: 6,
          center: [sp.lng, sp.lat],
          mapStyle: 'amap://styles/dark',
          viewMode: '2D'
        });
        mapMarker = new AMap.CircleMarker({
          center: [sp.lng, sp.lat],
          radius: 12,
          fillColor: '#f59e0b',
          fillOpacity: 0.6,
          strokeColor: '#fbbf24',
          strokeWeight: 2,
          strokeOpacity: 0.8
        });
        mapMarker.setMap(mapInstance);
      } catch(e) {
        document.getElementById('modalMap').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:12px;">地图加载中...</div>';
      }
    }, 200);
  }

  function closeModal() {
    var mask = document.getElementById('modalMask');
    mask.classList.remove('show');
    document.body.style.overflow = '';
    if (mapInstance) {
      try { mapInstance.destroy(); } catch(e) {}
      mapInstance = null;
    }
  }

  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalMask').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  /* ── Init ── */
  var loadCount = 0;
  function onLoaded() {
    loadCount++;
    if (loadCount < 2) return;

    buildVisitedSet(travelData);
    buildStats();
    buildFilters();
    renderGrid();

    setTimeout(function() {
      var overlay = document.getElementById('loadingOverlay');
      overlay.classList.add('fade-out');
      setTimeout(function() { overlay.style.display = 'none'; }, 600);
    }, 1200);
  }

  loadJSON('data/hotspring_global.json', function(data) {
    springs = data || [];
    onLoaded();
  });

  loadJSON('data/travel.json', function(data) {
    travelData = data || [];
    onLoaded();
  });

})();
</script>
</body>
</html>
