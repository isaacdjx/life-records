<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据编辑器</title>
    <link href="data/fonts/fonts_local.css" rel="stylesheet">
    <script src="https://webapi.amap.com/maps?v=2.0&key=f66cdc07203c3075a2a2ae1ea67eea8e"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, 'PingFang SC', sans-serif;
            background: #0a0e1a; color: rgba(255,255,255,0.9);
            overflow: hidden; height: 100vh;
        }

        .nav {
            position: fixed; top: 0; left: 0; right: 0; height: 48px;
            background: rgba(30,38,68,0.82); backdrop-filter: blur(20px) saturate(1.6);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; z-index: 100;
        }
        .nav-back {
            color: #9f7aea; text-decoration: none; font-size: 13px; font-weight: 500;
            display: flex; align-items: center; gap: 4px;
        }
        .nav-back:hover { color: #b794f4; }
        .nav-back svg { width: 16px; height: 16px; fill: currentColor; }
        .nav-title { font-size: 14px; font-weight: 700; }

        /* Mode Tabs */
        .mode-tabs {
            display: flex; gap: 2px; background: rgba(255,255,255,0.04); border-radius: 8px; padding: 2px;
            flex-wrap: wrap;
        }
        .mode-tab {
            padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 600;
            border: none; background: transparent; color: rgba(255,255,255,0.35);
            cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }
        .mode-tab:hover { color: rgba(255,255,255,0.6); }
        .mode-tab.active-travel { background: rgba(159,122,234,0.2); color: #b794f4; }
        .mode-tab.active-mountain { background: rgba(124,196,245,0.2); color: #7cc4f5; }
        .mode-tab.active-park { background: rgba(34,197,94,0.2); color: #22c55e; }
        .mode-tab.active-darksky { background: rgba(129,140,248,0.2); color: #818cf8; }
        .mode-tab.active-diving { background: rgba(14,165,233,0.2); color: #0ea5e9; }
        .mode-tab.active-hotspring { background: rgba(245,158,11,0.2); color: #f59e0b; }

        .nav-info { font-size: 12px; color: rgba(255,255,255,0.35); }
        .nav-actions { display: flex; gap: 6px; }
        .nav-btn {
            padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 500;
            border: 1px solid rgba(255,255,255,0.1); background: transparent;
            color: rgba(255,255,255,0.5); cursor: pointer; transition: all 0.2s;
        }
        .nav-btn:hover { border-color: #d4a85a; color: #d4a85a; }

        .main { display: flex; height: calc(100vh - 48px); margin-top: 48px; }

        .left {
            width: 45%; display: flex; flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        .input-header {
            padding: 10px 14px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .input-title { font-size: 13px; font-weight: 600; }
        .template-btn {
            padding: 3px 8px; border-radius: 4px; font-size: 11px;
            border: 1px solid rgba(159,122,234,0.3); background: rgba(159,122,234,0.08);
            color: #9f7aea; cursor: pointer; transition: all 0.15s;
        }
        .template-btn:hover { background: rgba(159,122,234,0.15); }
        .template-btn.mountain { border-color: rgba(124,196,245,0.3); background: rgba(124,196,245,0.08); color: #7cc4f5; }
        .template-btn.mountain:hover { background: rgba(124,196,245,0.15); }
        .template-btn.park { border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.08); color: #22c55e; }
        .template-btn.park:hover { background: rgba(34,197,94,0.15); }
        .template-btn.darksky { border-color: rgba(129,140,248,0.3); background: rgba(129,140,248,0.08); color: #818cf8; }
        .template-btn.darksky:hover { background: rgba(129,140,248,0.15); }
        .template-btn.diving { border-color: rgba(14,165,233,0.3); background: rgba(14,165,233,0.08); color: #0ea5e9; }
        .template-btn.diving:hover { background: rgba(14,165,233,0.15); }
        .template-btn.hotspring { border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.08); color: #f59e0b; }
        .template-btn.hotspring:hover { background: rgba(245,158,11,0.15); }

        #jsonInput {
            flex: 1; width: 100%; border: none; outline: none; resize: none;
            background: #0d1117; color: #c9d1d9;
            font-family: 'SF Mono', 'Fira Code', Menlo, monospace;
            font-size: 12.5px; line-height: 1.6; padding: 14px 16px;
            tab-size: 4;
        }
        #jsonInput::placeholder { color: rgba(255,255,255,0.15); }

        .validate-bar {
            padding: 10px 14px; border-top: 1px solid rgba(255,255,255,0.06);
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
            flex-shrink: 0;
        }
        .validate-status { font-size: 12px; flex: 1; }
        .validate-status.ok { color: #48bb78; }
        .validate-status.err { color: #fc8181; }
        .validate-status.empty { color: rgba(255,255,255,0.25); }
        .submit-btn {
            padding: 7px 20px; border-radius: 6px; font-size: 13px; font-weight: 600;
            border: none; cursor: pointer; transition: all 0.2s;
            background: #48bb78; color: #0a0e1a;
        }
        .submit-btn:hover { background: #68d391; }
        .submit-btn:disabled {
            background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.2);
            cursor: not-allowed;
        }

        .error-detail {
            max-height: 0; overflow: hidden; transition: max-height 0.3s;
            border-top: 1px solid rgba(252,129,129,0.15);
        }
        .error-detail.show { max-height: 160px; }
        .error-detail-inner {
            padding: 8px 14px; background: rgba(252,129,129,0.03);
            font-size: 11px; color: #fc8181; line-height: 1.6; overflow-y: auto; max-height: 160px;
        }

        .right { flex: 1; display: flex; flex-direction: column; }
        .map-wrap { flex: 1; position: relative; }
        #previewMap { width: 100%; height: 100%; }

        .existing-panel {
            height: 240px; border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column;
        }
        .existing-header {
            padding: 8px 14px; font-size: 12px; font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.4); flex-shrink: 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .existing-list { flex: 1; overflow-y: auto; background: #0d1117; }
        .existing-item {
            padding: 5px 14px; font-size: 12px; display: flex; align-items: center; gap: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.02); cursor: pointer;
            transition: background 0.1s;
        }
        .existing-item:hover { background: rgba(255,255,255,0.03); }
        .existing-item.new-entry { background: rgba(72,187,120,0.08); }
        .existing-emoji { width: 20px; text-align: center; font-size: 13px; }
        .existing-city { font-weight: 600; min-width: 50px; }
        .existing-spot { color: rgba(255,255,255,0.4); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .existing-coord {
            font-family: 'SF Mono', Menlo, monospace; font-size: 10px;
            color: rgba(255,255,255,0.2);
        }
        .existing-badge {
            font-size: 10px; padding: 1px 6px; border-radius: 8px;
        }
        .existing-badge.visited { background: rgba(159,122,234,0.12); color: #9f7aea; }
        .existing-badge.wanted { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.3); }
        .existing-badge.new { background: rgba(72,187,120,0.15); color: #48bb78; }
        .existing-badge.diff-f { background: rgba(72,187,120,0.12); color: #48bb78; }
        .existing-badge.diff-pd { background: rgba(66,153,225,0.12); color: #4299e1; }
        .existing-badge.diff-ad { background: rgba(237,137,54,0.12); color: #ed8936; }
        .existing-badge.diff-d { background: rgba(229,62,62,0.12); color: #e53e3e; }
        .existing-badge.diff-td { background: rgba(159,122,234,0.12); color: #9f7aea; }
        .existing-badge.diff-ban { background: rgba(113,128,150,0.12); color: #718096; }
        .existing-type {
            font-size: 10px; color: rgba(255,255,255,0.25);
        }

        .export-bar {
            padding: 8px 14px; border-top: 1px solid rgba(255,255,255,0.06);
            display: flex; gap: 6px; justify-content: flex-end; flex-shrink: 0;
        }
        .export-btn {
            padding: 5px 14px; border-radius: 6px; font-size: 12px; font-weight: 500;
            border: 1px solid rgba(212,168,90,0.3); background: rgba(212,168,90,0.1);
            color: #d4a85a; cursor: pointer; transition: all 0.15s;
        }
        .export-btn:hover { background: rgba(212,168,90,0.2); }
        .export-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px);
            padding: 10px 20px; border-radius: 8px; font-size: 13px;
            background: rgba(30,38,68,0.92); backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.9);
            z-index: 300; opacity: 0; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none; max-width: 400px; text-align: center;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            70% { transform: scale(2); opacity: 0; }
            100% { transform: scale(2); opacity: 0; }
        }

        @media (max-width: 900px) {
            .main { flex-direction: column; }
            .left { width: 100%; height: 50%; border-right: none; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="index.html" class="nav-back">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            首页
        </a>
        <div class="mode-tabs">
            <button class="mode-tab active-travel" data-mode="travel">旅行记录</button>
            <button class="mode-tab" data-mode="mountain">雪山图鉴</button>
            <button class="mode-tab" data-mode="park">国家公园</button>
            <button class="mode-tab" data-mode="darksky">暗夜星空</button>
            <button class="mode-tab" data-mode="diving">潜水图鉴</button>
            <button class="mode-tab" data-mode="hotspring">温泉图鉴</button>
        </div>
        <div class="nav-info" id="navInfo">加载中...</div>
        <div class="nav-actions">
            <button class="nav-btn" id="btnViewAll">查看完整 JSON</button>
        </div>
    </nav>

    <div class="main">
        <div class="left">
            <div class="input-header">
                <span class="input-title" id="inputTitle">输入新条目 (JSON)</span>
                <button class="template-btn" id="btnTemplate">插入模板</button>
            </div>
            <textarea id="jsonInput" placeholder=""></textarea>
            <div class="error-detail" id="errorDetail">
                <div class="error-detail-inner" id="errorContent"></div>
            </div>
            <div class="validate-bar">
                <div class="validate-status empty" id="validateStatus">等待输入...</div>
                <button class="submit-btn" id="btnSubmit" disabled>提交合并</button>
            </div>
        </div>
        <div class="right">
            <div class="map-wrap">
                <div id="previewMap"></div>
            </div>
            <div class="existing-panel">
                <div class="existing-header">
                    <span id="existingTitle">现有记录</span>
                    <span style="font-size:11px;color:rgba(255,255,255,0.25);">点击定位</span>
                </div>
                <div class="existing-list" id="existingList"></div>
                <div class="export-bar">
                    <button class="export-btn" id="btnCopy">复制完整 JSON</button>
                    <button class="export-btn" id="btnExport">导出文件</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    (function() {
        var map = null;
        var currentMode = 'travel';

        var categoryConfig = {
            '自然景观': { emoji: '🏔️', color: '#48bb78' },
            '世界遗产': { emoji: '🏛️', color: '#9f7aea' },
            '历史文化': { emoji: '🏯', color: '#ed8936' },
            '现代都市': { emoji: '🌃', color: '#4299e1' },
            '美食体验': { emoji: '🍜', color: '#fc8181' },
            '海岛海滩': { emoji: '🏖️', color: '#38b2ac' },
            '主题乐园': { emoji: '🎢', color: '#ed64a6' },
            '自驾公路': { emoji: '🚗', color: '#ecc94b' },
            '地质奇观': { emoji: '🌋', color: '#a0aec0' }
        };
        var validCategories = Object.keys(categoryConfig);
        var validTypes = ['极高峰','高峰','著名雪山','经典雪山','火山雪峰'];
        var validDiffs = ['F','F+','PD-','PD','PD+','AD-','AD','AD+','D-','D','D+','TD','TD+','ED','ABO','禁登'];

        // ---- Shared helpers for generic name-based modes ----
        function genericNameValidate(parsed, errors, data, cfg) {
            var entries = Array.isArray(parsed) ? parsed : [parsed];
            entries.forEach(function(entry, idx) {
                var p = entries.length > 1 ? '[' + idx + '] ' : '';
                cfg.requiredFields.forEach(function(field) {
                    var expectedType = cfg.requiredFieldTypes[field];
                    if (expectedType === 'string') {
                        if (!entry[field] || typeof entry[field] !== 'string') {
                            errors.push(p + '"' + field + '" 必须是非空字符串');
                        }
                    } else if (expectedType === 'number') {
                        if (typeof entry[field] !== 'number') {
                            errors.push(p + '"' + field + '" 必须是数字');
                        }
                    }
                });
                if (entry.name && typeof entry.name === 'string') {
                    var dup = null;
                    for (var i = 0; i < data.length; i++) {
                        if (data[i].name === entry.name) { dup = data[i]; break; }
                    }
                    if (dup) errors.push(p + '"' + entry.name + '" 已存在 (id=' + dup.id + ', 将更新)');
                }
                if (typeof entry.lat === 'number' && typeof entry.lng === 'number') {
                    if (entry.lat === 0 && entry.lng === 0) errors.push(p + '坐标为 (0, 0)，请设置正确坐标');
                    if (entry.lat < -90 || entry.lat > 90) errors.push(p + '纬度超范围');
                    if (entry.lng < -180 || entry.lng > 180) errors.push(p + '经度超范围');
                }
                if (cfg.validTypes && entry.type && typeof entry.type === 'string') {
                    if (cfg.validTypes.indexOf(entry.type) === -1) {
                        errors.push(p + '未知类型 "' + entry.type + '"，可选: ' + cfg.validTypes.join(', '));
                    }
                }
                if (cfg.extraValidation) {
                    cfg.extraValidation.call(cfg, entry, errors, p);
                }
            });
            var hardErrors = errors.filter(function(e){ return e.indexOf('已存在')===-1; });
            if (hardErrors.length === 0 && entries.length > 0) return entries;
            return null;
        }

        function genericNameSubmit(entries, data, newEntries) {
            var maxId = 0;
            data.forEach(function(item){ if (item.id > maxId) maxId = item.id; });
            var summary = [];
            entries.forEach(function(entry) {
                var existIdx = -1;
                data.forEach(function(item, i) { if (item.name === entry.name) existIdx = i; });
                if (existIdx >= 0) {
                    var existing = data[existIdx];
                    var keys = Object.keys(entry);
                    for (var k = 0; k < keys.length; k++) {
                        if (keys[k] !== 'id') existing[keys[k]] = entry[keys[k]];
                    }
                    summary.push(entry.name + '(更新 id=' + existing.id + ')');
                    newEntries.push(existing.name);
                } else {
                    maxId++;
                    entry.id = maxId;
                    if (!entry.highlights) entry.highlights = [];
                    if (!entry.matchKeys) entry.matchKeys = [];
                    if (entry.description === undefined) entry.description = '';
                    data.push(entry);
                    summary.push(entry.name + '(新增 id=' + maxId + ')');
                    newEntries.push(entry.name);
                }
            });
            return summary;
        }

        function genericDotMarkers(data, newEntries, mapRef, color) {
            var markers = [];
            data.forEach(function(item) {
                if (!item.lat || !item.lng) return;
                var isNew = newEntries.indexOf(item.name) !== -1;
                var sz = isNew ? 14 : 8;
                var dot = document.createElement('div');
                dot.style.cssText = 'width:' + sz + 'px;height:' + sz + 'px;border-radius:50%;background:' + color +
                    ';opacity:' + (isNew ? '1' : '0.5') +
                    (isNew ? ';border:2px solid #fff;box-shadow:0 0 8px ' + color : '') + ';';
                var marker = new AMap.Marker({
                    position: [item.lng, item.lat], content: dot,
                    offset: new AMap.Pixel(-sz/2, -sz/2)
                });
                mapRef.add(marker);
                markers.push(marker);
            });
            return markers;
        }

        function genericDotPreview(entries, mapRef, color, labelFn) {
            var markers = [];
            entries.forEach(function(item) {
                if (!item.lat || !item.lng) return;
                var wrapper = document.createElement('div');
                wrapper.style.cssText = 'position:relative;';
                var ring = document.createElement('div');
                ring.style.cssText = 'width:28px;height:28px;border-radius:50%;border:2px solid ' + color +
                    ';position:absolute;top:-7px;left:-7px;animation:pulse 2s ease-out infinite;';
                wrapper.appendChild(ring);
                var dot = document.createElement('div');
                dot.style.cssText = 'width:14px;height:14px;border-radius:50%;background:' + color +
                    ';border:2px solid #fff;box-shadow:0 0 12px ' + color + ';position:relative;z-index:1;';
                wrapper.appendChild(dot);
                var label = document.createElement('div');
                label.style.cssText = 'position:absolute;top:18px;left:50%;transform:translateX(-50%);font-size:11px;color:#fff;white-space:nowrap;font-weight:600;background:rgba(0,0,0,0.6);padding:2px 6px;border-radius:4px;pointer-events:none;';
                label.textContent = labelFn(item);
                wrapper.appendChild(label);
                var marker = new AMap.Marker({ position: [item.lng, item.lat], content: wrapper, offset: new AMap.Pixel(-7, -7) });
                mapRef.add(marker);
                markers.push(marker);
                mapRef.setZoomAndCenter(8, [item.lng, item.lat]);
            });
            return markers;
        }

        function genericNameList(data, newEntries, cfg) {
            var html = '';
            data.forEach(function(item) {
                var isNew = newEntries.indexOf(item.name) !== -1;
                var metric = cfg.listMetric ? cfg.listMetric(item) : '';
                var extra = cfg.listExtra ? cfg.listExtra(item) : '';
                html += '<div class="existing-item' + (isNew ? ' new-entry' : '') + '" data-lat="' + (item.lat || '') + '" data-lng="' + (item.lng || '') + '">' +
                    '<span class="existing-emoji">' + cfg.emoji + '</span>' +
                    '<span class="existing-city">' + esc(item.name) + '</span>' +
                    '<span class="existing-spot">' + esc(metric) + '</span>' +
                    '<span class="existing-type">' + esc(extra) + '</span>' +
                    (isNew ? '<span class="existing-badge new">新增</span>' : '') +
                '</div>';
            });
            return html;
        }

        // ---- Mode Configuration ----
        var modeConfig = {
            travel: {
                file: 'data/travel.json',
                label: '旅行记录',
                color: '#b794f4',
                emoji: '📍',
                listTitle: '现有记录',
                inputTitle: '输入新条目 (JSON)',
                placeholder: '粘贴或输入一个城市条目，例如：\n{\n    "city": "成都",\n    "visited": true,\n    "spots": [{\n        "title": "锦里古街",\n        "content": "成都的古街...",\n        "location": "四川省成都市武侯区",\n        "lat": 30.645,\n        "lng": 104.048,\n        "category": "历史文化",\n        "tags": ["古城", "美食"]\n    }]\n}',
                template: '{\n    "city": "",\n    "visited": true,\n    "date": "",\n    "spots": [\n        {\n            "title": "",\n            "content": "",\n            "location": "",\n            "lat": 0,\n            "lng": 0,\n            "category": "自然景观",\n            "tags": ["", ""]\n        }\n    ]\n}',
                validate: function(parsed, errors, data) {
                    var entries = Array.isArray(parsed) ? parsed : [parsed];
                    entries.forEach(function(e, idx) {
                        var p = entries.length > 1 ? '[' + idx + '] ' : '';
                        if (!e.city || typeof e.city !== 'string') errors.push(p + '"city" 必须是非空字符串');
                        else {
                            var dup = data.find(function(ex) { return ex.city === e.city; });
                            if (dup) errors.push(p + '"' + e.city + '" 已存在于 travel.json 中（将合并景点）');
                        }
                        if (typeof e.visited !== 'boolean') errors.push(p + '"visited" 必须是 true 或 false');
                        if (!Array.isArray(e.spots) || e.spots.length === 0) {
                            errors.push(p + '"spots" 必须是非空数组');
                        } else {
                            e.spots.forEach(function(spot, si) {
                                var sp = p + '景点' + (si + 1) + ': ';
                                if (!spot.title || typeof spot.title !== 'string') errors.push(sp + '"title" 缺失');
                                if (typeof spot.lat !== 'number' || typeof spot.lng !== 'number') errors.push(sp + '"lat"/"lng" 必须是数字');
                                else {
                                    if (spot.lat === 0 && spot.lng === 0) errors.push(sp + '坐标为 (0, 0)，请设置正确坐标');
                                    if (spot.lat < -90 || spot.lat > 90) errors.push(sp + '纬度超范围');
                                    if (spot.lng < -180 || spot.lng > 180) errors.push(sp + '经度超范围');
                                }
                                if (!spot.category) errors.push(sp + '"category" 缺失');

            };
        });

        // Per-mode data and new-entry tracking
        var modeData = { travel: [], mountain: [], park: [], darksky: [], diving: [], hotspring: [] };
        var modeNewEntries = { travel: [], mountain: [], park: [], darksky: [], diving: [], hotspring: [] };

        var allMarkers = [];
        var newMarkers = [];
        var parseTimer = null;
        var currentValid = null;

        init();

        function init() {
            map = new AMap.Map('previewMap', {
                zoom: 5, center: [104, 35],
                mapStyle: 'amap://styles/darkblue', resizeEnable: true
            });

            loadData('travel');

            document.getElementById('jsonInput').addEventListener('input', function() {
                clearTimeout(parseTimer);
                parseTimer = setTimeout(validateInput, 400);
            });
            document.getElementById('btnTemplate').addEventListener('click', insertTemplate);
            document.getElementById('btnSubmit').addEventListener('click', submitEntry);
            document.getElementById('btnExport').addEventListener('click', exportJSON);
            document.getElementById('btnCopy').addEventListener('click', copyJSON);
            document.getElementById('btnViewAll').addEventListener('click', viewFullJSON);

            var tabs = document.querySelectorAll('.mode-tab');
            for (var i = 0; i < tabs.length; i++) {
                (function(tab) {
                    tab.addEventListener('click', function() {
                        switchMode(tab.getAttribute('data-mode'));
                    });
                })(tabs[i]);
            }

            document.getElementById('jsonInput').addEventListener('keydown', function(e) {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    var s = this.selectionStart;
                    this.value = this.value.substring(0, s) + '    ' + this.value.substring(this.selectionEnd);
                    this.selectionStart = this.selectionEnd = s + 4;
                }
            });

            updatePlaceholder();
        }

        // ---- Mode Switching ----
        function switchMode(mode) {
            if (mode === currentMode) return;
            currentMode = mode;
            var tabs = document.querySelectorAll('.mode-tab');
            for (var i = 0; i < tabs.length; i++) {
                var tabMode = tabs[i].getAttribute('data-mode');
                tabs[i].className = 'mode-tab' + (tabMode === mode ? ' active-' + mode : '');
            }
            var tmpl = document.getElementById('btnTemplate');
            tmpl.className = 'template-btn' + (mode !== 'travel' ? ' ' + mode : '');
            document.getElementById('jsonInput').value = '';
            currentValid = null;
            document.getElementById('btnSubmit').disabled = true;
            document.getElementById('validateStatus').textContent = '等待输入...';
            document.getElementById('validateStatus').className = 'validate-status empty';
            document.getElementById('errorDetail').classList.remove('show');
            clearNewMarkers();
            updatePlaceholder();
            loadData(mode);
        }

        function loadData(mode) {
            var cfg = modeConfig[mode];
            fetch(cfg.file).then(function(r){ return r.json(); }).then(function(d) {
                modeData[mode] = d;
                renderExistingMarkers();
                renderExistingList();
                updateNav();
            });
        }

        function updatePlaceholder() {
            var el = document.getElementById('jsonInput');
            var titleEl = document.getElementById('inputTitle');
            var cfg = modeConfig[currentMode];
            titleEl.textContent = cfg.inputTitle;
            el.placeholder = cfg.placeholder;
        }

        // ---- Validation (unified dispatcher) ----
        function validateInput() {
            var text = document.getElementById('jsonInput').value.trim();
            var statusEl = document.getElementById('validateStatus');
            var submitBtn = document.getElementById('btnSubmit');
            var errorPanel = document.getElementById('errorDetail');
            var errorContent = document.getElementById('errorContent');

            clearNewMarkers();
            currentValid = null;
            submitBtn.disabled = true;

            if (!text) {
                statusEl.textContent = '等待输入...';
                statusEl.className = 'validate-status empty';
                errorPanel.classList.remove('show');
                return;
            }

            var parsed = null;
            var errors = [];

            try { parsed = JSON.parse(text); } catch(e) {
                var match = e.message.match(/position (\d+)/);
                var pos = match ? parseInt(match[1]) : -1;
                var line = pos >= 0 ? text.substring(0, pos).split('\n').length : '?';
                errors.push('JSON 语法错误 (行 ' + line + '): ' + e.message);
            }

            if (parsed && typeof parsed === 'object') {
                var cfg = modeConfig[currentMode];
                currentValid = cfg.validate(parsed, errors, modeData[currentMode]);
            } else if (parsed !== null) {
                errors.push('输入必须是 JSON 对象 {} 或数组 []');
                showErrors(errors, true);
                return;
            } else {
                showErrors(errors, true);
                return;
            }

            var hardErrors = errors.filter(function(e) {
                return e.indexOf('建议') === -1 && e.indexOf('已存在') === -1;
            });

            if (hardErrors.length === 0 && currentValid) {
                var cfg = modeConfig[currentMode];
                var label = cfg.getLabel(currentValid);
                statusEl.textContent = '✓ 验证通过 — ' + label;
                statusEl.className = 'validate-status ok';
                submitBtn.disabled = false;
                newMarkers = cfg.showPreview(currentValid, map);
                if (errors.length > 0) {
                    errorContent.innerHTML = errors.map(function(e) {
                        return '<div style="color:#ecc94b;">⚠ ' + esc(e) + '</div>';
                    }).join('');
                    errorPanel.classList.add('show');
                } else {
                    errorPanel.classList.remove('show');
                }
            } else {
                showErrors(errors, hardErrors.length > 0);
            }
        }

        function showErrors(errors, isFatal) {
            var statusEl = document.getElementById('validateStatus');
            var errorPanel = document.getElementById('errorDetail');
            var errorContent = document.getElementById('errorContent');
            if (isFatal) {
                var hardCount = errors.filter(function(e){ return e.indexOf('建议')===-1 && e.indexOf('已存在')===-1; }).length;
                statusEl.textContent = '✗ 有 ' + hardCount + ' 个错误需修复';
                statusEl.className = 'validate-status err';
            }
            errorContent.innerHTML = errors.map(function(e) {
                var isWarn = e.indexOf('建议') !== -1 || e.indexOf('已存在') !== -1;
                return '<div style="color:' + (isWarn ? '#ecc94b' : '#fc8181') + ';">' + (isWarn ? '⚠' : '✗') + ' ' + esc(e) + '</div>';
            }).join('');
            errorPanel.classList.add('show');
        }

        // ---- Submit (unified dispatcher) ----
        function submitEntry() {
            if (!currentValid || currentValid.length === 0) return;
            var cfg = modeConfig[currentMode];
            var summary = cfg.submit(currentValid, modeData[currentMode], modeNewEntries[currentMode]);
            showToast('已合并: ' + summary.join(', ') + ' → 请导出保存');
            resetInput();
        }

        function resetInput() {
            document.getElementById('jsonInput').value = '';
            currentValid = null;
            document.getElementById('btnSubmit').disabled = true;
            document.getElementById('validateStatus').textContent = '等待输入...';
            document.getElementById('validateStatus').className = 'validate-status empty';
            document.getElementById('errorDetail').classList.remove('show');
            clearNewMarkers();
            renderExistingMarkers();
            renderExistingList();
            updateNav();
        }

        // ---- Markers (unified dispatcher) ----
        function renderExistingMarkers() {
            allMarkers.forEach(function(m) { map.remove(m); });
            allMarkers = [];
            var cfg = modeConfig[currentMode];
            allMarkers = cfg.renderMarkers(modeData[currentMode], modeNewEntries[currentMode], map);
        }

        function clearNewMarkers() {
            newMarkers.forEach(function(m) { map.remove(m); });
            newMarkers = [];
        }

        // ---- Existing List (unified dispatcher) ----
        function renderExistingList() {
            var cfg = modeConfig[currentMode];
            var html = cfg.renderList(modeData[currentMode], modeNewEntries[currentMode]);
            document.getElementById('existingList').innerHTML = html;

            var items = document.querySelectorAll('.existing-item');
            for (var i = 0; i < items.length; i++) {
                (function(item) {
                    item.addEventListener('click', function() {
                        var lat = parseFloat(this.getAttribute('data-lat'));
                        var lng = parseFloat(this.getAttribute('data-lng'));
                        if (lat && lng) map.setZoomAndCenter(13, [lng, lat]);
                    });
                })(items[i]);
            }
        }

        // ---- Nav (unified dispatcher) ----
        function updateNav() {
            var cfg = modeConfig[currentMode];
            var navData = cfg.getNavInfo(modeData[currentMode], modeNewEntries[currentMode]);
            document.getElementById('navInfo').textContent = navData.info;
            document.getElementById('existingTitle').textContent = navData.title;
        }

        // ---- Template (unified dispatcher) ----
        function insertTemplate() {
            var el = document.getElementById('jsonInput');
            var cfg = modeConfig[currentMode];
            if (typeof cfg.template === 'string') {
                el.value = cfg.template;
            } else {
                el.value = JSON.stringify(cfg.template, null, 4);
            }
            el.focus();
            validateInput();
        }

        // ---- Export (unified dispatcher) ----
        function exportJSON() {
            var cfg = modeConfig[currentMode];
            var data = cfg.formatExport(modeData[currentMode]);
            var parts = cfg.file.split('/');
            var filename = parts[parts.length - 1];
            var blob = new Blob([data], { type: 'application/json' });
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            a.click();
            URL.revokeObjectURL(a.href);
            showToast('已导出 ' + filename);
        }

        function copyJSON() {
            var cfg = modeConfig[currentMode];
            var data = cfg.formatExport(modeData[currentMode]);
            navigator.clipboard.writeText(data).then(function() {
                showToast('已复制完整 JSON 到剪贴板');
            });
        }

        function viewFullJSON() {
            var cfg = modeConfig[currentMode];
            var data = cfg.formatExport(modeData[currentMode]);
            document.getElementById('jsonInput').value = data;
        }

        // ---- Kept Helpers ----
        function formatTravelJSON(arr) {
            var lines = ['['];
            arr.forEach(function(entry, i) {
                var spotsStr = entry.spots.map(function(s) { return JSON.stringify(s); }).join(', ');
                lines.push('    {"city": ' + JSON.stringify(entry.city) +
                    ', "visited": ' + entry.visited +
                    ', "spots": [' + spotsStr + ']}' + (i < arr.length - 1 ? ',' : ''));
            });
            lines.push(']');
            return lines.join('\n');
        }

        function getMtDiffColor(d) {
            if (!d) return '#888';
            if (d === '禁登') return '#718096';
            if (d.indexOf('F') === 0) return '#48bb78';
            if (d.indexOf('PD') === 0) return '#4299e1';
            if (d.indexOf('AD') === 0) return '#ed8936';
            if (d.indexOf('TD') === 0 || d.indexOf('ED') === 0 || d === 'ABO') return '#9f7aea';
            if (d.indexOf('D') === 0) return '#e53e3e';
            return '#888';
        }

        function getMtDiffClass(d) {
            if (!d) return '';
            if (d === '禁登') return 'diff-ban';
            if (d.indexOf('F') === 0) return 'diff-f';
            if (d.indexOf('PD') === 0) return 'diff-pd';
            if (d.indexOf('AD') === 0) return 'diff-ad';
            if (d.indexOf('TD') === 0 || d.indexOf('ED') === 0 || d === 'ABO') return 'diff-td';
            if (d.indexOf('D') === 0) return 'diff-d';
            return '';
        }

        function showToast(msg) {
            var el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast show';
            setTimeout(function() { el.classList.remove('show'); }, 2500);
        }

        function esc(s) {
            return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
    })();
    </script>
</body>
</html>
