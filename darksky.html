<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>暗夜星空 · Dark Sky Atlas</title>
    <link href="data/fonts/fonts_local.css" rel="stylesheet">
    <script src="https://webapi.amap.com/maps?v=2.0&key=f66cdc07203c3075a2a2ae1ea67eea8e"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --dark: #080c18;
            --card: rgba(14, 18, 32, 0.85);
            --indigo: #818cf8;
            --indigo-deep: #6366f1;
            --indigo-darker: #4338ca;
            --indigo-glow: rgba(129, 140, 248, 0.4);
            --indigo-faint: rgba(129, 140, 248, 0.12);
            --star-gold: #fbbf24;
            --star-gold-soft: rgba(251, 191, 36, 0.6);
            --star-gold-faint: rgba(251, 191, 36, 0.15);
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            background: var(--dark);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ===== Loading Screen ===== */
        #loadingScreen {
            position: fixed; inset: 0;
            background: var(--dark);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s, visibility 0.8s;
        }
        #loadingScreen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .loading-constellation {
            width: 120px; height: 120px;
            margin-bottom: 28px;
            position: relative;
        }
        .loading-constellation svg {
            width: 100%; height: 100%;
        }
        .constellation-line {
            stroke: var(--indigo);
            stroke-width: 1.5;
            stroke-linecap: round;
            fill: none;
            stroke-dasharray: 200;
            stroke-dashoffset: 200;
            animation: drawLine 2s ease forwards;
            opacity: 0.7;
        }
        .constellation-line:nth-child(2) { animation-delay: 0.3s; }
        .constellation-line:nth-child(3) { animation-delay: 0.6s; }
        .constellation-line:nth-child(4) { animation-delay: 0.9s; }
        .constellation-line:nth-child(5) { animation-delay: 1.2s; }
        .constellation-star {
            fill: var(--star-gold);
            opacity: 0;
            animation: starAppear 0.4s ease forwards;
        }
        .constellation-star:nth-child(6) { animation-delay: 0.2s; }
        .constellation-star:nth-child(7) { animation-delay: 0.5s; }
        .constellation-star:nth-child(8) { animation-delay: 0.8s; }
        .constellation-star:nth-child(9) { animation-delay: 1.1s; }
        .constellation-star:nth-child(10) { animation-delay: 1.4s; }
        .constellation-star:nth-child(11) { animation-delay: 1.7s; }

        @keyframes drawLine {
            to { stroke-dashoffset: 0; }
        }
        @keyframes starAppear {
            0% { opacity: 0; transform: scale(0); }
            60% { opacity: 1; transform: scale(1.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        .loading-text {
            font-family: 'Cinzel', serif;
            font-size: 13px;
            color: rgba(129, 140, 248, 0.6);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* ===== Stars Canvas ===== */
        #starsCanvas {
            position: fixed; inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ===== Nav Bar ===== */
        .nav-bar {
            position: fixed; top: 0; left: 0; right: 0; height: 52px;
            background: rgba(8, 12, 24, 0.88);
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            border-bottom: 1px solid rgba(129, 140, 248, 0.12);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 100;
            animation: slideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .nav-back {
            color: var(--indigo); text-decoration: none; font-size: 14px; font-weight: 500;
            display: flex; align-items: center; gap: 6px;
            transition: color 0.2s;
            min-width: 70px;
        }
        .nav-back:hover { color: #a5b4fc; }
        .nav-back svg { width: 16px; height: 16px; fill: currentColor; }
        .nav-title-wrap {
            position: absolute; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 10px;
        }
        .nav-title {
            font-family: 'Cinzel', 'Noto Serif SC', serif;
            font-size: 16px; font-weight: 700; letter-spacing: 2px;
            background: linear-gradient(135deg, #e0e7ff 0%, var(--indigo) 40%, #a5b4fc 60%, #e0e7ff 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .nav-title-star {
            font-size: 14px;
            color: var(--star-gold);
            animation: twinkleIcon 2s ease-in-out infinite;
        }
        @keyframes twinkleIcon {
            0%, 100% { opacity: 0.6; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        .nav-counter {
            font-size: 12px; color: var(--indigo); font-weight: 600;
            background: var(--indigo-faint); padding: 4px 12px;
            border-radius: 20px; border: 1px solid rgba(129, 140, 248, 0.2);
            min-width: 70px; text-align: center;
        }

        /* ===== Hero Section ===== */
        .hero {
            padding-top: 52px;
            position: relative;
            overflow: hidden;
        }
        .hero-inner {
            position: relative;
            z-index: 1;
            padding: 48px 24px 40px;
            text-align: center;
            background: linear-gradient(180deg,
                rgba(8,12,24,0) 0%,
                rgba(14,18,42,0.4) 40%,
                rgba(8,12,24,0.9) 100%);
        }
        .hero-count {
            font-family: 'Cinzel', serif;
            font-size: 72px; font-weight: 900;
            background: linear-gradient(180deg, #e0e7ff 0%, var(--indigo) 60%, var(--indigo-darker) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 8px;
            text-shadow: none;
            animation: fadeUp 0.8s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .hero-label {
            font-size: 14px;
            color: rgba(165, 180, 252, 0.6);
            letter-spacing: 6px;
            text-transform: uppercase;
            font-family: 'Cinzel', serif;
            margin-bottom: 28px;
            animation: fadeUp 0.8s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .hero-stats {
            display: flex; justify-content: center; gap: 40px; flex-wrap: wrap;
            animation: fadeUp 0.8s 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .hero-stat {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .hero-stat-value {
            font-family: 'Cinzel', serif;
            font-size: 24px; font-weight: 800;
            color: #e0e7ff;
        }
        .hero-stat-value.gold { color: var(--star-gold); }
        .hero-stat-label {
            font-size: 11px; color: rgba(165, 180, 252, 0.5);
            letter-spacing: 2px; text-transform: uppercase;
        }
        .hero-divider {
            width: 1px; height: 40px;
            background: rgba(129, 140, 248, 0.2);
            align-self: center;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== Filter Bar ===== */
        .filter-section {
            padding: 0 20px 20px;
            max-width: 1200px; margin: 0 auto;
            position: relative; z-index: 1;
        }
        .filter-group {
            margin-bottom: 10px;
            animation: fadeUp 0.6s 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .filter-group-label {
            font-size: 11px; color: rgba(165, 180, 252, 0.4);
            margin-bottom: 6px; font-weight: 600;
            letter-spacing: 1px;
        }
        .filter-tabs {
            display: flex; gap: 8px; flex-wrap: wrap;
        }
        .filter-tab {
            padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 500;
            background: rgba(129, 140, 248, 0.06);
            border: 1px solid rgba(129, 140, 248, 0.14);
            color: rgba(200, 210, 254, 0.65); cursor: pointer;
            transition: all 0.2s;
        }
        .filter-tab:hover {
            background: rgba(129, 140, 248, 0.12);
            color: rgba(200, 210, 254, 0.9);
        }
        .filter-tab.active {
            background: rgba(129, 140, 248, 0.2);
            border-color: rgba(129, 140, 248, 0.5);
            color: #c7d2fe;
        }

        /* ===== Card Grid ===== */
        .grid-section {
            padding: 0 20px 60px;
            max-width: 1200px; margin: 0 auto;
            position: relative; z-index: 1;
            animation: fadeUp 0.6s 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .grid-count {
            font-size: 12px; color: rgba(165, 180, 252, 0.4);
            margin-bottom: 16px;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        /* ===== Card ===== */
        .sky-card {
            background: var(--card);
            border: 1px solid rgba(129, 140, 248, 0.1);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        .sky-card:hover {
            transform: translateY(-4px);
            border-color: rgba(129, 140, 248, 0.35);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), 0 0 30px var(--indigo-glow);
        }
        .sky-card.visited {
            border-color: rgba(129, 140, 248, 0.25);
        }
        .sky-card.visited::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, var(--indigo-deeper, #4338ca), var(--indigo), var(--star-gold));
            z-index: 2;
        }

        .card-cover {
            height: 120px;
            background: linear-gradient(135deg, #0c1029, #131940, #0e1433);
            position: relative;
            overflow: hidden;
        }
        .card-cover-dots {
            position: absolute; inset: 0;
        }
        .card-visited-badge {
            position: absolute; top: 10px; right: 10px;
            background: rgba(99, 102, 241, 0.7);
            backdrop-filter: blur(8px);
            color: #e0e7ff;
            font-size: 10px; font-weight: 700;
            padding: 3px 10px;
            border-radius: 10px;
            letter-spacing: 1px;
            border: 1px solid rgba(165, 180, 252, 0.3);
            z-index: 2;
        }
        .card-type-tag {
            position: absolute; bottom: 10px; left: 12px;
            font-size: 10px; font-weight: 600;
            padding: 3px 10px;
            border-radius: 10px;
            background: rgba(8, 12, 24, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(129, 140, 248, 0.2);
            color: var(--indigo);
            letter-spacing: 0.5px;
            z-index: 2;
        }

        .card-body {
            padding: 16px;
        }
        .card-name {
            font-size: 16px; font-weight: 700;
            margin-bottom: 2px;
            color: #e0e7ff;
        }
        .card-name-en {
            font-family: 'Cinzel', serif;
            font-size: 11px; font-weight: 500;
            color: rgba(165, 180, 252, 0.4);
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        /* Bortle indicator */
        .card-bortle {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 12px;
        }
        .bortle-dots {
            display: flex; gap: 3px;
        }
        .bortle-dot {
            width: 8px; height: 8px; border-radius: 50%;
            transition: all 0.3s;
        }
        .bortle-dot.filled {
            box-shadow: 0 0 6px currentColor;
        }
        .bortle-dot.empty {
            background: rgba(255, 255, 255, 0.08);
        }
        .bortle-label {
            font-size: 11px; font-weight: 600;
            letter-spacing: 0.5px;
        }
        .bortle-value {
            font-size: 10px; color: rgba(165, 180, 252, 0.4);
            margin-left: auto;
        }

        .card-meta {
            display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
        }
        .card-meta-item {
            font-size: 11px; color: rgba(200, 210, 254, 0.5);
            display: flex; align-items: center; gap: 4px;
        }
        .card-meta-item svg {
            width: 12px; height: 12px;
            fill: rgba(200, 210, 254, 0.35);
        }

        /* ===== Modal ===== */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(4, 6, 14, 0.8);
            z-index: 1000;
            display: none;
            align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .modal-overlay.show { display: flex; opacity: 1; }

        .modal-card {
            background: rgba(14, 18, 36, 0.96);
            backdrop-filter: blur(30px) saturate(1.8);
            -webkit-backdrop-filter: blur(30px) saturate(1.8);
            border-radius: 20px;
            width: 460px; max-width: 92vw; max-height: 85vh;
            overflow-y: auto;
            border: 1px solid rgba(129, 140, 248, 0.18);
            box-shadow:
                0 25px 80px rgba(0, 0, 0, 0.6),
                0 0 60px rgba(99, 102, 241, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            transform: translateY(30px) scale(0.94);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-overlay.show .modal-card {
            transform: translateY(0) scale(1);
        }

        .modal-card::-webkit-scrollbar { width: 4px; }
        .modal-card::-webkit-scrollbar-track { background: transparent; }
        .modal-card::-webkit-scrollbar-thumb { background: rgba(129, 140, 248, 0.15); border-radius: 4px; }

        /* Modal cover */
        .modal-cover {
            height: 160px;
            background: linear-gradient(135deg, #0c1029, #151d48, #0e1433);
            position: relative; overflow: hidden;
        }
        .modal-cover-gradient {
            position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
            background: linear-gradient(transparent, rgba(14, 18, 36, 0.96));
        }
        .modal-cover canvas {
            position: absolute; inset: 0; width: 100%; height: 100%;
        }

        /* Modal header */
        .modal-header {
            padding: 0 24px 16px;
            margin-top: -36px;
            position: relative; z-index: 2;
            display: flex; align-items: flex-start; gap: 14px;
        }
        .modal-icon {
            width: 52px; height: 52px; border-radius: 14px;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(129, 140, 248, 0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; flex-shrink: 0;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
        }
        .modal-info { flex: 1; min-width: 0; padding-top: 6px; }
        .modal-name {
            font-size: 20px; font-weight: 800;
            color: #e0e7ff;
            margin-bottom: 2px;
        }
        .modal-name-en {
            font-family: 'Cinzel', serif;
            font-size: 12px; color: rgba(165, 180, 252, 0.45);
            letter-spacing: 0.5px;
        }
        .modal-close {
            width: 36px; height: 36px; border-radius: 50%;
            border: 1px solid rgba(129, 140, 248, 0.25);
            background: rgba(8, 12, 24, 0.7);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 15px; color: var(--indigo);
            flex-shrink: 0; margin-top: 6px;
            transition: all 0.3s;
        }
        .modal-close:hover {
            background: rgba(99, 102, 241, 0.15);
            color: #e0e7ff;
            box-shadow: 0 0 16px rgba(99, 102, 241, 0.3);
        }

        .modal-content { padding: 0 24px 24px; }

        /* Bortle scale bar */
        .modal-bortle {
            margin-bottom: 20px;
        }
        .modal-bortle-label {
            font-size: 12px; color: rgba(165, 180, 252, 0.5);
            margin-bottom: 8px; display: flex; justify-content: space-between;
        }
        .modal-bortle-track {
            height: 8px; border-radius: 4px;
            background: linear-gradient(90deg,
                #312e81 0%, #4338ca 22%, #6366f1 44%,
                #818cf8 55%, #a5b4fc 72%, #c7d2fe 100%);
            position: relative;
            overflow: visible;
        }
        .modal-bortle-marker {
            position: absolute; top: -6px;
            width: 20px; height: 20px; border-radius: 50%;
            border: 3px solid #e0e7ff;
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.6), 0 2px 8px rgba(0,0,0,0.4);
            transform: translateX(-50%);
            transition: left 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-bortle-labels {
            display: flex; justify-content: space-between;
            margin-top: 6px; font-size: 10px;
            color: rgba(165, 180, 252, 0.35);
        }

        /* Modal tags */
        .modal-tags {
            display: flex; gap: 6px; flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .modal-tag {
            padding: 4px 12px;
            background: rgba(129, 140, 248, 0.08);
            border: 1px solid rgba(129, 140, 248, 0.15);
            border-radius: 8px;
            font-size: 11px; color: rgba(165, 180, 252, 0.7);
            font-weight: 500; transition: all 0.2s;
        }
        .modal-tag:hover {
            background: rgba(129, 140, 248, 0.15);
            border-color: rgba(129, 140, 248, 0.3);
            color: #c7d2fe;
        }
        .modal-tag.gold {
            background: var(--star-gold-faint);
            border-color: rgba(251, 191, 36, 0.2);
            color: var(--star-gold);
        }

        /* Info grid */
        .modal-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px; margin-bottom: 16px;
        }
        .modal-grid-item {
            background: rgba(129, 140, 248, 0.04);
            border: 1px solid rgba(129, 140, 248, 0.08);
            border-radius: 10px;
            padding: 10px 12px;
        }
        .modal-grid-label {
            font-size: 10px; color: rgba(165, 180, 252, 0.4);
            margin-bottom: 4px; letter-spacing: 0.5px;
        }
        .modal-grid-value {
            font-size: 14px; font-weight: 700;
            color: #e0e7ff;
        }

        /* Description */
        .modal-desc {
            font-size: 13px; color: rgba(200, 210, 254, 0.65);
            line-height: 1.8; margin-bottom: 16px;
        }

        /* Highlights */
        .modal-highlights {
            display: flex; gap: 6px; flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .modal-highlight {
            padding: 3px 10px;
            background: rgba(251, 191, 36, 0.06);
            border: 1px solid rgba(251, 191, 36, 0.12);
            border-radius: 6px;
            font-size: 11px; color: rgba(251, 191, 36, 0.7);
        }

        /* Wiki link */
        .modal-wiki-link{display:inline-flex;align-items:center;gap:4px;margin-top:14px;padding:6px 14px;
            border-radius:8px;background:rgba(129,140,248,0.06);border:1px solid rgba(129,140,248,0.1);
            color:#818cf8;font-size:11px;font-weight:600;text-decoration:none;transition:all .2s;}
        .modal-wiki-link:hover{background:rgba(129,140,248,0.12);border-color:rgba(129,140,248,0.2);}

        /* Minimap */
        .modal-minimap {
            height: 140px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(129, 140, 248, 0.12);
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .card-grid {
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 12px;
            }
            .hero-count { font-size: 56px; }
            .hero-stats { gap: 24px; }
            .hero-stat-value { font-size: 20px; }
        }
        @media (max-width: 480px) {
            .nav-bar { padding: 0 14px; }
            .nav-title { font-size: 14px; letter-spacing: 1px; }
            .nav-back { font-size: 13px; min-width: 50px; }
            .nav-counter { font-size: 11px; padding: 3px 10px; min-width: 50px; }
            .card-grid {
                grid-template-columns: 1fr;
            }
            .hero-count { font-size: 48px; }
            .hero-inner { padding: 36px 16px 28px; }
            .hero-stats { gap: 16px; }
            .hero-divider { height: 28px; }
            .hero-stat-value { font-size: 18px; }
            .hero-stat-label { font-size: 10px; letter-spacing: 1px; }
            .filter-section { padding: 0 14px 16px; }
            .grid-section { padding: 0 14px 40px; }
            .modal-card { max-width: 96vw; max-height: 90vh; border-radius: 16px; }
            .modal-cover { height: 120px; }
            .modal-header { padding: 0 16px 12px; margin-top: -28px; gap: 10px; }
            .modal-icon { width: 44px; height: 44px; font-size: 20px; border-radius: 10px; }
            .modal-name { font-size: 17px; }
            .modal-content { padding: 0 16px 20px; }
            .modal-minimap { height: 110px; }
            .modal-close { width: 38px; height: 38px; font-size: 18px; }
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loadingScreen">
        <div class="loading-constellation">
            <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <!-- Constellation lines (Cassiopeia-like W shape) -->
                <line class="constellation-line" x1="15" y1="55" x2="35" y2="30"/>
                <line class="constellation-line" x1="35" y1="30" x2="55" y2="65"/>
                <line class="constellation-line" x1="55" y1="65" x2="75" y2="35"/>
                <line class="constellation-line" x1="75" y1="35" x2="100" y2="60"/>
                <line class="constellation-line" x1="60" y1="85" x2="60" y2="65"/>
                <!-- Stars at vertices -->
                <circle class="constellation-star" cx="15" cy="55" r="3"/>
                <circle class="constellation-star" cx="35" cy="30" r="4"/>
                <circle class="constellation-star" cx="55" cy="65" r="3.5"/>
                <circle class="constellation-star" cx="75" cy="35" r="3"/>
                <circle class="constellation-star" cx="100" cy="60" r="4"/>
                <circle class="constellation-star" cx="60" cy="85" r="2.5"/>
            </svg>
        </div>
        <div class="loading-text">Dark Sky Atlas</div>
    </div>

    <!-- Stars Canvas -->
    <canvas id="starsCanvas"></canvas>

    <!-- Nav Bar -->
    <nav class="nav-bar">
        <a href="index.html" class="nav-back">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            首页
        </a>
        <div class="nav-title-wrap">
            <span class="nav-title-star">&#9733;</span>
            <span class="nav-title">暗夜星空</span>
            <span class="nav-title-star">&#9733;</span>
        </div>
        <span class="nav-counter" id="navCounter">--</span>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-inner">
            <div class="hero-count" id="heroCount">--</div>
            <div class="hero-label">Dark Sky Destinations</div>
            <div class="hero-stats">
                <div class="hero-stat">
                    <div class="hero-stat-value" id="statTotal">--</div>
                    <div class="hero-stat-label">暗夜目的地</div>
                </div>
                <div class="hero-divider"></div>
                <div class="hero-stat">
                    <div class="hero-stat-value gold" id="statVisited">0</div>
                    <div class="hero-stat-label">已到访</div>
                </div>
                <div class="hero-divider"></div>
                <div class="hero-stat">
                    <div class="hero-stat-value" id="statBortle">--</div>
                    <div class="hero-stat-label">平均波特尔等级</div>
                </div>
            </div>
        </div>
    </section>

    <!-- Filters -->
    <div class="filter-section">
        <div class="filter-group">
            <div class="filter-group-label">类型</div>
            <div class="filter-tabs" id="filterType"></div>
        </div>
        <div class="filter-group">
            <div class="filter-group-label">地区</div>
            <div class="filter-tabs" id="filterRegion"></div>
        </div>
    </div>

    <!-- Card Grid -->
    <div class="grid-section">
        <div class="grid-count" id="gridCount"></div>
        <div class="card-grid" id="cardGrid"></div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card" id="modalCard"></div>
    </div>

    <script>
    (function() {
        // ===== Twinkling Stars Background =====
        var starsCanvas = document.getElementById('starsCanvas');
        var starsCtx = starsCanvas.getContext('2d');
        var stars = [];
        var STAR_COUNT = 200;

        function initStars() {
            starsCanvas.width = window.innerWidth;
            starsCanvas.height = window.innerHeight;
            stars = [];
            for (var i = 0; i < STAR_COUNT; i++) {
                stars.push({
                    x: Math.random() * starsCanvas.width,
                    y: Math.random() * starsCanvas.height,
                    r: Math.random() * 1.5 + 0.3,
                    alpha: Math.random(),
                    speed: Math.random() * 0.008 + 0.002,
                    dir: Math.random() > 0.5 ? 1 : -1
                });
            }
        }

        function drawStars() {
            starsCtx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);
            for (var i = 0; i < stars.length; i++) {
                var s = stars[i];
                s.alpha += s.speed * s.dir;
                if (s.alpha >= 1) { s.alpha = 1; s.dir = -1; }
                if (s.alpha <= 0.05) { s.alpha = 0.05; s.dir = 1; }
                starsCtx.beginPath();
                starsCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                starsCtx.fillStyle = 'rgba(255,255,255,' + s.alpha + ')';
                starsCtx.fill();
            }
            requestAnimationFrame(drawStars);
        }

        initStars();
        drawStars();
        window.addEventListener('resize', initStars);

        // ===== Data =====
        var allData = [];
        var filteredData = [];
        var activeType = '全部';
        var activeRegion = '全部';
        var miniMap = null;

        function getBortleColor(b) {
            if (b <= 2) return '#312e81';
            if (b <= 3) return '#4338ca';
            if (b <= 4) return '#6366f1';
            if (b <= 5) return '#818cf8';
            if (b <= 6) return '#a5b4fc';
            return '#c7d2fe';
        }
        function getBortleLabel(b) {
            if (b <= 2) return '极佳';
            if (b <= 3) return '优秀';
            if (b <= 4) return '良好';
            if (b <= 5) return '一般';
            return '较差';
        }

        function loadData() {
            var loaded = 0;
            var darkskyData = [];
            var travelData = [];

            fetch('data/darksky_global.json')
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    darkskyData = d;
                    loaded++;
                    if (loaded === 2) processData(darkskyData, travelData);
                })
                .catch(function() {
                    loaded++;
                    if (loaded === 2) processData(darkskyData, travelData);
                });

            fetch('data/travel.json')
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    travelData = d;
                    loaded++;
                    if (loaded === 2) processData(darkskyData, travelData);
                })
                .catch(function() {
                    loaded++;
                    if (loaded === 2) processData(darkskyData, travelData);
                });
        }

        function processData(data, travelData) {
            // Build spots for visited matching
            var spots = [];
            travelData.forEach(function(c) {
                (c.spots || []).forEach(function(s) {
                    spots.push({ title: s.title, location: s.location || '', city: c.city });
                });
            });

            data.forEach(function(d) {
                d.visited = false;
                var keys = d.matchKeys || [];
                for (var i = 0; i < spots.length; i++) {
                    var hay = spots[i].title + '|' + spots[i].location + '|' + spots[i].city;
                    for (var j = 0; j < keys.length; j++) {
                        if (hay.indexOf(keys[j]) !== -1) { d.visited = true; break; }
                    }
                    if (d.visited) break;
                }
            });

            allData = data;
            filteredData = data.slice();

            // Stats
            var total = data.length;
            var visited = data.filter(function(d) { return d.visited; }).length;
            var bortleSum = 0;
            data.forEach(function(d) { bortleSum += d.bortle; });
            var avgBortle = total > 0 ? (bortleSum / total).toFixed(1) : '--';

            document.getElementById('heroCount').textContent = total;
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statVisited').textContent = visited;
            document.getElementById('statBortle').textContent = avgBortle;
            document.getElementById('navCounter').textContent = total + ' 处';

            buildFilters(data);
            renderCards();
            hideLoading();
        }

        function buildFilters(data) {
            var types = {};
            var regions = {};
            data.forEach(function(d) {
                types[d.type] = (types[d.type] || 0) + 1;
                regions[d.region] = (regions[d.region] || 0) + 1;
            });

            var typeHtml = '<span class="filter-tab active" data-val="全部">全部 ' + data.length + '</span>';
            var typeOrder = ['国际暗夜公园', '天文台区域', '暗夜保护区', '观星胜地', '暗夜社区'];
            typeOrder.forEach(function(t) {
                if (types[t]) {
                    typeHtml += '<span class="filter-tab" data-val="' + t + '">' + t + ' ' + types[t] + '</span>';
                }
            });
            // Any remaining types not in order
            Object.keys(types).forEach(function(t) {
                if (typeOrder.indexOf(t) === -1) {
                    typeHtml += '<span class="filter-tab" data-val="' + t + '">' + t + ' ' + types[t] + '</span>';
                }
            });
            document.getElementById('filterType').innerHTML = typeHtml;

            var regionHtml = '<span class="filter-tab active" data-val="全部">全部</span>';
            Object.keys(regions).forEach(function(r) {
                regionHtml += '<span class="filter-tab" data-val="' + r + '">' + r + ' ' + regions[r] + '</span>';
            });
            document.getElementById('filterRegion').innerHTML = regionHtml;

            // Filter click handlers
            document.getElementById('filterType').addEventListener('click', function(e) {
                var tab = e.target.closest('.filter-tab');
                if (!tab) return;
                activeType = tab.getAttribute('data-val');
                var tabs = this.querySelectorAll('.filter-tab');
                for (var i = 0; i < tabs.length; i++) {
                    tabs[i].classList.toggle('active', tabs[i].getAttribute('data-val') === activeType);
                }
                applyFilters();
            });

            document.getElementById('filterRegion').addEventListener('click', function(e) {
                var tab = e.target.closest('.filter-tab');
                if (!tab) return;
                activeRegion = tab.getAttribute('data-val');
                var tabs = this.querySelectorAll('.filter-tab');
                for (var i = 0; i < tabs.length; i++) {
                    tabs[i].classList.toggle('active', tabs[i].getAttribute('data-val') === activeRegion);
                }
                applyFilters();
            });
        }

        function applyFilters() {
            filteredData = allData.filter(function(d) {
                var typeOk = activeType === '全部' || d.type === activeType;
                var regionOk = activeRegion === '全部' || d.region === activeRegion;
                return typeOk && regionOk;
            });
            renderCards();
        }

        function renderCards() {
            var grid = document.getElementById('cardGrid');
            document.getElementById('gridCount').textContent = '共 ' + filteredData.length + ' 处暗夜目的地';

            var html = '';
            filteredData.forEach(function(d) {
                var bColor = getBortleColor(d.bortle);
                var bLabel = getBortleLabel(d.bortle);

                html += '<div class="sky-card' + (d.visited ? ' visited' : '') + '" data-id="' + d.id + '">';

                // Cover with star dots
                html += '<div class="card-cover">';
                html += '<canvas class="card-cover-dots" data-bortle="' + d.bortle + '"></canvas>';
                if (d.visited) {
                    html += '<div class="card-visited-badge">&#9733; 已到访</div>';
                }
                html += '<div class="card-type-tag">' + d.type + '</div>';
                html += '</div>';

                // Body
                html += '<div class="card-body">';
                html += '<div class="card-name">' + d.name + '</div>';
                html += '<div class="card-name-en">' + d.nameEn + '</div>';

                // Bortle indicator (dots)
                html += '<div class="card-bortle">';
                html += '<div class="bortle-dots">';
                for (var b = 1; b <= 9; b++) {
                    if (b <= d.bortle) {
                        html += '<div class="bortle-dot filled" style="background:' + bColor + ';color:' + bColor + '"></div>';
                    } else {
                        html += '<div class="bortle-dot empty"></div>';
                    }
                }
                html += '</div>';
                html += '<span class="bortle-label" style="color:' + bColor + '">' + bLabel + '</span>';
                html += '<span class="bortle-value">Bortle ' + d.bortle + '</span>';
                html += '</div>';

                // Meta
                html += '<div class="card-meta">';
                html += '<span class="card-meta-item"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>' + d.country + '</span>';
                html += '<span class="card-meta-item"><svg viewBox="0 0 24 24"><path d="M14 6l-1-2H5v17h2v-7h5l1 2h7V6z"/></svg>' + d.altitude + 'm</span>';
                html += '<span class="card-meta-item"><svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>' + d.bestSeason + '</span>';
                html += '</div>';

                html += '</div>'; // card-body
                html += '</div>'; // sky-card
            });

            grid.innerHTML = html;

            // Draw card cover canvases
            var canvases = grid.querySelectorAll('.card-cover-dots');
            for (var i = 0; i < canvases.length; i++) {
                drawCardCover(canvases[i]);
            }

            // Card click handlers
            var cards = grid.querySelectorAll('.sky-card');
            for (var j = 0; j < cards.length; j++) {
                cards[j].addEventListener('click', function() {
                    var id = parseInt(this.getAttribute('data-id'));
                    for (var k = 0; k < allData.length; k++) {
                        if (allData[k].id === id) {
                            showModal(allData[k]);
                            break;
                        }
                    }
                });
            }
        }

        function drawCardCover(canvas) {
            var rect = canvas.parentElement.getBoundingClientRect();
            var w = rect.width || 300;
            var h = rect.height || 120;
            canvas.width = w;
            canvas.height = h;
            var ctx = canvas.getContext('2d');
            var bortle = parseInt(canvas.getAttribute('data-bortle')) || 3;

            // More stars for lower bortle
            var count = Math.max(10, 60 - bortle * 5);
            for (var i = 0; i < count; i++) {
                var x = Math.random() * w;
                var y = Math.random() * h;
                var r = Math.random() * 1.2 + 0.3;
                var alpha = Math.random() * 0.6 + 0.15;
                // Some brighter "stars" in gold
                if (Math.random() < 0.12) {
                    ctx.fillStyle = 'rgba(251, 191, 36, ' + (alpha * 1.2) + ')';
                    r += 0.3;
                } else {
                    ctx.fillStyle = 'rgba(200, 210, 254, ' + alpha + ')';
                }
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ===== Modal =====
        function showModal(d) {
            if (miniMap) { miniMap.destroy(); miniMap = null; }

            var bColor = getBortleColor(d.bortle);
            var bLabel = getBortleLabel(d.bortle);
            var bortlePercent = ((d.bortle - 1) / 8 * 100);

            var html = '';

            // Cover
            html += '<div class="modal-cover">';
            html += '<canvas id="modalCoverCanvas"></canvas>';
            html += '<div class="modal-cover-gradient"></div>';
            html += '</div>';

            // Header
            html += '<div class="modal-header">';
            html += '<div class="modal-icon">&#9733;</div>';
            html += '<div class="modal-info">';
            html += '<div class="modal-name">' + d.name + '</div>';
            html += '<div class="modal-name-en">' + d.nameEn + '</div>';
            html += '</div>';
            html += '<button class="modal-close" id="modalClose">&#10005;</button>';
            html += '</div>';

            // Content
            html += '<div class="modal-content">';

            // Bortle scale
            html += '<div class="modal-bortle">';
            html += '<div class="modal-bortle-label"><span>波特尔暗空等级 (Bortle Scale)</span><span style="font-weight:700;color:' + bColor + '">Class ' + d.bortle + ' · ' + bLabel + '</span></div>';
            html += '<div class="modal-bortle-track"><div class="modal-bortle-marker" id="bortleMarker" style="left:' + bortlePercent + '%;background:' + bColor + '"></div></div>';
            html += '<div class="modal-bortle-labels"><span>1 极暗</span><span>5</span><span>9 极亮</span></div>';
            html += '</div>';

            // Tags
            html += '<div class="modal-tags">';
            html += '<span class="modal-tag">' + d.type + '</span>';
            html += '<span class="modal-tag">' + d.country + '</span>';
            html += '<span class="modal-tag">' + d.region + '</span>';
            html += '<span class="modal-tag gold">' + d.bestSeason + '</span>';
            if (d.visited) {
                html += '<span class="modal-tag" style="background:rgba(99,102,241,0.15);border-color:rgba(129,140,248,0.3);color:#a5b4fc">&#9733; 已到访</span>';
            }
            html += '</div>';

            // Info grid
            html += '<div class="modal-grid">';
            html += '<div class="modal-grid-item"><div class="modal-grid-label">海拔</div><div class="modal-grid-value">' + d.altitude + ' m</div></div>';
            html += '<div class="modal-grid-item"><div class="modal-grid-label">波特尔等级</div><div class="modal-grid-value" style="color:' + bColor + '">Class ' + d.bortle + '</div></div>';
            html += '<div class="modal-grid-item"><div class="modal-grid-label">最佳季节</div><div class="modal-grid-value">' + d.bestSeason + '</div></div>';
            html += '<div class="modal-grid-item"><div class="modal-grid-label">国家</div><div class="modal-grid-value">' + d.country + '</div></div>';
            html += '</div>';

            // Description
            html += '<div class="modal-desc">' + d.description + '</div>';

            // Highlights
            if (d.highlights && d.highlights.length) {
                html += '<div class="modal-highlights">';
                d.highlights.forEach(function(h) {
                    html += '<span class="modal-highlight">&#9733; ' + h + '</span>';
                });
                html += '</div>';
            }

            // Minimap
            html += '<a class="modal-wiki-link" href="https://en.wikipedia.org/wiki/'+encodeURIComponent(d.nameEn.replace(/ /g,'_'))+'" target="_blank" rel="noopener">📖 Wikipedia</a>';
            html += '<div class="modal-minimap" id="modalMinimap"></div>';

            html += '</div>'; // modal-content
            document.getElementById('modalCard').innerHTML = html;

            // Show overlay
            var overlay = document.getElementById('modalOverlay');
            overlay.style.display = 'flex';
            requestAnimationFrame(function() {
                requestAnimationFrame(function() {
                    overlay.classList.add('show');
                });
            });

            // Draw modal cover constellation dots
            setTimeout(function() {
                var cvs = document.getElementById('modalCoverCanvas');
                if (cvs) {
                    var rect = cvs.parentElement.getBoundingClientRect();
                    cvs.width = rect.width;
                    cvs.height = rect.height;
                    var ctx = cvs.getContext('2d');
                    var count = 80;
                    for (var i = 0; i < count; i++) {
                        var x = Math.random() * cvs.width;
                        var y = Math.random() * cvs.height;
                        var r = Math.random() * 1.8 + 0.3;
                        var alpha = Math.random() * 0.7 + 0.1;
                        if (Math.random() < 0.15) {
                            ctx.fillStyle = 'rgba(251, 191, 36, ' + (alpha * 1.3) + ')';
                            r += 0.5;
                        } else {
                            ctx.fillStyle = 'rgba(200, 210, 254, ' + alpha + ')';
                        }
                        ctx.beginPath();
                        ctx.arc(x, y, r, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    // Draw a few "constellation lines"
                    ctx.strokeStyle = 'rgba(129, 140, 248, 0.12)';
                    ctx.lineWidth = 0.8;
                    for (var l = 0; l < 4; l++) {
                        ctx.beginPath();
                        ctx.moveTo(Math.random() * cvs.width, Math.random() * cvs.height);
                        ctx.lineTo(Math.random() * cvs.width, Math.random() * cvs.height);
                        ctx.stroke();
                    }
                }
            }, 50);

            // Close handlers
            setTimeout(function() {
                var closeBtn = document.getElementById('modalClose');
                if (closeBtn) {
                    closeBtn.addEventListener('click', closeModal);
                }
            }, 50);

            // Minimap
            setTimeout(function() {
                var el = document.getElementById('modalMinimap');
                if (!el) return;

                miniMap = new AMap.Map(el, {
                    zoom: 5,
                    center: [d.lng, d.lat],
                    mapStyle: 'amap://styles/darkblue',
                    resizeEnable: true,
                    dragEnable: false,
                    zoomEnable: false,
                    scrollWheel: false,
                    doubleClickZoom: false
                });

                // Indigo circle marker
                var markerEl = document.createElement('div');
                markerEl.style.cssText = 'width:18px;height:18px;border-radius:50%;' +
                    'background:' + bColor + ';' +
                    'border:3px solid rgba(224,231,255,0.6);' +
                    'box-shadow:0 0 20px ' + bColor + ', 0 0 40px rgba(99,102,241,0.3);';

                miniMap.add(new AMap.Marker({
                    position: [d.lng, d.lat],
                    content: markerEl,
                    offset: new AMap.Pixel(-9, -9)
                }));
            }, 200);
        }

        function closeModal() {
            var overlay = document.getElementById('modalOverlay');
            overlay.classList.remove('show');
            setTimeout(function() {
                overlay.style.display = 'none';
                if (miniMap) { miniMap.destroy(); miniMap = null; }
            }, 400);
        }

        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        function hideLoading() {
            setTimeout(function() {
                document.getElementById('loadingScreen').classList.add('hidden');
            }, 1800);
        }

        loadData();
    })();
    </script>
</body>
</html>
