<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>潜水图鉴 · Diving Atlas</title>
    <link href="data/fonts/fonts_local.css" rel="stylesheet">
    <script src="https://webapi.amap.com/maps?v=2.0&key=f66cdc07203c3075a2a2ae1ea67eea8e"></script>
    <style>
        :root {
            --dark: #080c18;
            --card: rgba(14, 18, 32, 0.85);
            --ocean: #0ea5e9;
            --ocean-bright: #38bdf8;
            --ocean-deep: #0284c7;
            --teal: #06b6d4;
            --teal-bright: #22d3ee;
            --teal-faint: rgba(6, 182, 212, 0.15);
            --ocean-faint: rgba(14, 165, 233, 0.12);
            --ocean-glow: rgba(14, 165, 233, 0.4);
            --sand: #d4a85a;
            --sand-faint: rgba(212, 168, 90, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            background: var(--dark);
            color: rgba(255,255,255,0.88);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== Loading ===== */
        .loading {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: var(--dark);
            transition: opacity 0.6s;
        }
        .loading.hide { opacity: 0; pointer-events: none; }
        .load-icon svg {
            width: 72px; height: 72px;
            filter: drop-shadow(0 0 16px rgba(14,165,233,0.3));
        }
        .load-icon svg path, .load-icon svg line, .load-icon svg circle {
            stroke: var(--ocean);
            stroke-width: 1.8;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 300;
            stroke-dashoffset: 300;
            animation: draw 2s ease forwards;
        }
        .load-icon svg .fish-body { animation-delay: 0.3s; }
        .load-icon svg .fish-tail { animation-delay: 0.6s; }
        .load-icon svg .fish-eye { animation-delay: 0.9s; stroke-dasharray: 20; stroke-dashoffset: 20; }
        .load-icon svg .wave1 { animation-delay: 0.2s; stroke: var(--teal); }
        .load-icon svg .wave2 { animation-delay: 0.5s; stroke: var(--teal); opacity: 0.6; }
        .load-text {
            margin-top: 14px;
            font-family: 'Cinzel', serif;
            font-size: 10px;
            letter-spacing: 4px;
            color: rgba(14,165,233,0.4);
            animation: breathe 2s ease-in-out infinite;
        }
        @keyframes draw { to { stroke-dashoffset: 0; } }
        @keyframes breathe { 0%,100%{opacity:.4} 50%{opacity:1} }
        @keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
        @keyframes waveMove { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

        /* ===== Nav ===== */
        .nav {
            position: fixed; top: 0; left: 0; right: 0; height: 52px; z-index: 100;
            background: linear-gradient(180deg, rgba(8,12,24,0.96), rgba(8,12,24,0.75));
            backdrop-filter: blur(24px) saturate(1.8);
            -webkit-backdrop-filter: blur(24px) saturate(1.8);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
        }
        .nav::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(14,165,233,0.12) 30%, rgba(6,182,212,0.12) 70%, transparent);
        }
        .nav-back {
            color: rgba(255,255,255,0.45); text-decoration: none; font-size: 13px;
            display: flex; align-items: center; gap: 4px; transition: color 0.2s;
        }
        .nav-back:hover { color: var(--ocean); }
        .nav-back svg { width: 16px; height: 16px; fill: currentColor; }
        .nav-title {
            font-family: 'Cinzel', 'Noto Sans SC', serif;
            font-size: 15px; font-weight: 700; letter-spacing: 4px;
            background: linear-gradient(135deg, #fff 0%, var(--ocean-bright) 40%, var(--teal) 60%, #fff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s linear infinite;
        }
        .nav-badge {
            background: linear-gradient(135deg, rgba(14,165,233,0.1), rgba(6,182,212,0.04));
            color: var(--ocean); padding: 3px 12px; border-radius: 20px;
            font-size: 11px; font-weight: 600;
            border: 1px solid rgba(14,165,233,0.12);
        }

        /* ===== Hero ===== */
        .hero {
            position: relative; width: 100%; height: 200px; margin-top: 52px;
            overflow: hidden;
            background: linear-gradient(135deg, #060d1a, #081828 50%, #0a1428);
            display: flex; align-items: center; justify-content: center;
        }
        .hero-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(8,12,24,0.3) 0%, rgba(8,12,24,0.1) 40%, rgba(8,12,24,0.7) 85%, var(--dark) 100%);
        }
        .hero-waves {
            position: absolute; bottom: 0; left: 0; width: 200%; height: 60px; opacity: 0.05;
            animation: waveMove 8s linear infinite;
        }
        .hero-waves svg { width: 100%; height: 100%; }
        .hero-content { position: relative; z-index: 2; text-align: center; }
        .hero-num {
            font-family: 'Cinzel', serif; font-size: 52px; font-weight: 700; line-height: 1;
            background: linear-gradient(180deg, rgba(255,255,255,0.95), var(--ocean));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            filter: drop-shadow(0 2px 12px rgba(14,165,233,0.2));
        }
        .hero-label {
            font-size: 12px; color: rgba(255,255,255,0.3);
            letter-spacing: 3px; margin-top: 4px;
        }
        .hero-stats {
            display: flex; gap: 24px; margin-top: 16px; justify-content: center;
        }
        .hero-stat { text-align: center; }
        .hero-stat-num {
            font-family: 'Cinzel', serif; font-size: 22px; font-weight: 700; color: var(--ocean);
        }
        .hero-stat-num.gold { color: var(--sand); }
        .hero-stat-num.teal { color: var(--teal); }
        .hero-stat-label {
            font-size: 10px; color: rgba(255,255,255,0.25);
            letter-spacing: 1px; margin-top: 2px;
        }

        /* ===== Filter ===== */
        .filter-wrap {
            position: sticky; top: 52px; z-index: 50;
            background: linear-gradient(180deg, var(--dark), rgba(8,12,24,0.95) 80%, rgba(8,12,24,0));
            padding: 12px 20px 16px;
        }
        .filter-bar {
            display: flex; gap: 4px; flex-wrap: wrap; padding: 8px 10px;
            background: linear-gradient(135deg, rgba(14,18,32,0.9), rgba(18,22,40,0.85));
            backdrop-filter: blur(16px); border-radius: 14px;
            border: 1px solid rgba(14,165,233,0.06);
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
        }
        .f-group { display: flex; align-items: center; gap: 3px; flex-wrap: wrap; }
        .f-sep {
            width: 1px; height: 22px;
            background: linear-gradient(180deg, transparent, rgba(14,165,233,0.1), transparent);
            margin: 0 6px; flex-shrink: 0;
        }
        .f-tab {
            padding: 4px 12px; border-radius: 6px; font-size: 11px; cursor: pointer;
            background: transparent; border: 1px solid transparent;
            color: rgba(255,255,255,0.32); transition: all 0.2s; white-space: nowrap;
        }
        .f-tab:hover { color: rgba(255,255,255,0.65); background: rgba(255,255,255,0.03); }
        .f-tab.active {
            font-weight: 600;
            background: var(--ocean-faint);
            border-color: rgba(14,165,233,0.2);
            color: var(--ocean);
            box-shadow: 0 0 10px rgba(14,165,233,0.06);
        }

        /* ===== Grid ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px; padding: 0 20px 40px;
            max-width: 1400px; margin: 0 auto;
            position: relative; z-index: 2;
        }
        .grid-empty {
            grid-column: 1 / -1; text-align: center;
            padding: 60px 0; color: rgba(255,255,255,0.2); font-size: 14px;
        }

        /* ===== Card ===== */
        .card {
            position: relative; border-radius: 16px; overflow: hidden; cursor: pointer;
            background: var(--card);
            border: 1px solid rgba(14,165,233,0.05);
            transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
            animation: fadeUp 0.4s ease both;
            --glow: rgba(14,165,233,0.12);
        }
        .card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: rgba(14,165,233,0.18);
            box-shadow: 0 16px 48px rgba(0,0,0,0.3), 0 0 24px var(--glow);
        }
        .card.visited { border-color: rgba(14,165,233,0.15); }
        .card.visited::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, var(--ocean-deep), var(--ocean), var(--teal-bright));
            z-index: 2;
        }
        .card-cover {
            width: 100%; height: 130px; position: relative; overflow: hidden;
        }
        .card-cover-ph {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .card-cover-ph svg { width: 56px; height: 56px; opacity: 0.06; }
        .card-cover-grad {
            position: absolute; bottom: 0; left: 0; right: 0; height: 50px;
            background: linear-gradient(transparent, var(--card));
        }
        .card-badge {
            position: absolute; top: 10px; right: 12px; z-index: 2;
            padding: 2px 8px; border-radius: 6px;
            font-size: 10px; font-weight: 600;
            backdrop-filter: blur(8px);
            background: rgba(14,165,233,0.25);
            color: var(--teal-bright);
            border: 1px solid rgba(14,165,233,0.3);
        }
        .card-type-tag {
            position: absolute; bottom: 10px; left: 12px; z-index: 2;
            font-size: 10px; font-weight: 600;
            padding: 2px 8px; border-radius: 6px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(14,165,233,0.15);
        }
        .card-level-tag {
            position: absolute; bottom: 10px; right: 12px; z-index: 2;
            font-size: 10px; font-weight: 600;
            padding: 2px 8px; border-radius: 6px;
            backdrop-filter: blur(8px);
            background: rgba(8,12,24,0.6);
            border: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.5);
        }
        .card-body { padding: 14px 16px 16px; }
        .card-name { font-size: 16px; font-weight: 700; line-height: 1.3; color: #e0f2fe; }
        .card-name-en {
            font-family: 'Cinzel', serif; font-size: 10px;
            color: rgba(255,255,255,0.2); margin-top: 2px;
            letter-spacing: 0.5px; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
        }
        .card-indicators {
            display: flex; gap: 12px; margin-top: 10px;
        }
        .card-ind {
            display: flex; align-items: center; gap: 4px;
            font-size: 11px; color: rgba(255,255,255,0.35);
        }
        .card-ind svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 1.8; }
        .card-ind-val { font-weight: 600; }
        .card-meta {
            display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; align-items: center;
        }
        .card-meta-item {
            font-size: 10px; color: rgba(255,255,255,0.25);
            display: flex; align-items: center; gap: 3px;
        }
        .card-highlights {
            display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px;
        }
        .card-hl {
            padding: 1px 6px; border-radius: 4px; font-size: 9px;
            background: rgba(14,165,233,0.06);
            border: 1px solid rgba(14,165,233,0.06);
            color: rgba(14,165,233,0.5);
        }

        /* ===== Type colors ===== */
        /* generated per type in JS */

        /* ===== Modal ===== */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center;
            padding: 20px; opacity: 0; transition: opacity 0.3s;
        }
        .modal-overlay.open { display: flex; opacity: 1; }

        .modal-ring-wrap { position: relative; width: 100%; max-width: 540px; }
        .modal-ring-wrap::before {
            content: ''; position: absolute; inset: -3px; border-radius: 23px; padding: 3px;
            background: conic-gradient(from var(--ring-angle, 0deg), transparent 0%, var(--ocean) 10%, transparent 22%, transparent 50%, var(--teal) 60%, transparent 72%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            animation: modalRing 3s linear infinite;
            opacity: 0; transition: opacity 0.5s 0.3s; pointer-events: none;
        }
        .modal-overlay.open .modal-ring-wrap::before { opacity: 1; }
        .modal-ring-wrap::after {
            content: ''; position: absolute; inset: -6px; border-radius: 26px; padding: 6px;
            background: conic-gradient(from var(--ring-angle, 0deg), transparent 0%, var(--ocean) 10%, transparent 22%, transparent 50%, var(--teal) 60%, transparent 72%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            animation: modalRing 3s linear infinite;
            opacity: 0; transition: opacity 0.5s 0.5s; filter: blur(8px); pointer-events: none;
        }
        .modal-overlay.open .modal-ring-wrap::after { opacity: 0.4; }
        @property --ring-angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
        @keyframes modalRing { to { --ring-angle: 360deg; } }

        .modal {
            width: 100%; max-height: calc(100vh - 40px);
            background: linear-gradient(180deg, rgba(12,16,30,0.98), rgba(10,14,26,0.98));
            border: 1px solid rgba(14,165,233,0.08); border-radius: 20px;
            overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 40px rgba(14,165,233,0.05);
            display: flex; flex-direction: column;
            transform: scale(0.95); transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
        }
        .modal-overlay.open .modal { transform: scale(1); }
        .modal-scroll {
            flex: 1; overflow-y: auto;
            scrollbar-width: thin; scrollbar-color: rgba(14,165,233,0.12) transparent;
        }
        .modal-scroll::-webkit-scrollbar { width: 3px; }
        .modal-scroll::-webkit-scrollbar-thumb { background: rgba(14,165,233,0.12); border-radius: 2px; }

        .modal-cover {
            width: 100%; height: 200px; position: relative; overflow: hidden;
        }
        .modal-cover-ph {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-cover-ph svg { width: 80px; height: 80px; opacity: 0.06; }
        .modal-cover-grad {
            position: absolute; bottom: 0; left: 0; right: 0; height: 100px;
            background: linear-gradient(transparent, rgba(12,16,30,0.98));
        }
        .modal-close {
            position: absolute; top: 12px; right: 12px;
            width: 34px; height: 34px; border-radius: 10px;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.5); font-size: 18px;
            cursor: pointer; z-index: 2;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .modal-close:hover { color: #fff; background: rgba(255,255,255,0.1); }

        .modal-body { padding: 0 20px 24px; }
        .modal-name {
            font-size: 24px; font-weight: 700; line-height: 1.3;
            margin-top: 14px; color: #e0f2fe;
        }
        .modal-name-en {
            font-family: 'Cinzel', serif; font-size: 12px;
            color: rgba(255,255,255,0.22); margin-top: 2px; letter-spacing: 1px;
        }
        .modal-tags {
            display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0 16px;
        }
        .modal-tag {
            padding: 4px 12px; border-radius: 8px; font-size: 12px; font-weight: 500;
            border: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.02);
            transition: background 0.2s;
        }
        .modal-tag:hover { background: rgba(255,255,255,0.05); }
        .modal-tag-type { border-color: rgba(14,165,233,0.15); }
        .modal-tag-level { color: rgba(255,255,255,0.4); }

        .modal-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 8px; margin-bottom: 16px;
        }
        .modal-cell {
            background: linear-gradient(135deg, rgba(14,165,233,0.03), rgba(6,182,212,0.01));
            border-radius: 10px; padding: 11px 14px;
            border: 1px solid rgba(14,165,233,0.03);
            transition: all 0.2s;
        }
        .modal-cell:hover {
            border-color: rgba(14,165,233,0.08);
            background: rgba(14,165,233,0.05);
        }
        .modal-cell-label {
            font-size: 10px; color: rgba(255,255,255,0.22);
            text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 3px;
        }
        .modal-cell-value { font-size: 13px; font-weight: 600; }

        .modal-desc {
            font-size: 13px; line-height: 1.8; color: rgba(255,255,255,0.55); margin: 16px 0;
        }
        .modal-sec {
            font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.35);
            margin: 18px 0 8px;
            display: flex; align-items: center; gap: 8px; letter-spacing: 1px;
        }
        .modal-sec::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(90deg, rgba(14,165,233,0.08), transparent);
        }
        .modal-hl-tags { display: flex; flex-wrap: wrap; gap: 5px; }
        .modal-hl {
            padding: 3px 10px; border-radius: 6px; font-size: 11px;
            background: rgba(14,165,233,0.06);
            border: 1px solid rgba(14,165,233,0.08);
            color: rgba(14,165,233,0.7);
        }

        .modal-wiki-link{display:inline-flex;align-items:center;gap:4px;margin-top:14px;padding:6px 14px;
            border-radius:8px;background:rgba(14,165,233,0.06);border:1px solid rgba(14,165,233,0.1);
            color:#0ea5e9;font-size:11px;font-weight:600;text-decoration:none;transition:all .2s;}
        .modal-wiki-link:hover{background:rgba(14,165,233,0.12);border-color:rgba(14,165,233,0.2);}

        .modal-minimap {
            height: 200px; border-radius: 12px; overflow: hidden;
            margin-top: 18px;
            border: 1px solid rgba(14,165,233,0.06);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }

        /* ===== Responsive ===== */
        @media (max-width: 640px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 10px; padding: 0 12px 30px;
            }
            .card-cover { height: 110px; }
            .hero { height: 170px; }
            .hero-num { font-size: 36px; }
            .modal { max-width: 100%; border-radius: 16px; }
            .modal-cover { height: 160px; }
            .modal-grid { grid-template-columns: 1fr 1fr; }
            .filter-bar { padding: 6px 8px; }
            .f-tab { padding: 3px 8px; font-size: 10px; }
        }
    </style>
</head>
<body>

    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="load-icon">
            <svg viewBox="0 0 80 80">
                <!-- Wave lines -->
                <path class="wave1" d="M8 28 Q16 20 24 28 Q32 36 40 28 Q48 20 56 28 Q64 36 72 28"/>
                <path class="wave2" d="M8 36 Q16 28 24 36 Q32 44 40 36 Q48 28 56 36 Q64 44 72 36"/>
                <!-- Fish body -->
                <path class="fish-body" d="M22 56 Q30 48 42 52 Q50 54 54 58 Q50 62 42 64 Q30 68 22 60 Z"/>
                <!-- Fish tail -->
                <path class="fish-tail" d="M54 58 L64 50 L62 58 L64 66 Z"/>
                <!-- Fish eye -->
                <circle class="fish-eye" cx="34" cy="57" r="2"/>
            </svg>
        </div>
        <div class="load-text">DIVING ATLAS</div>
    </div>

    <!-- Nav -->
    <nav class="nav">
        <a class="nav-back" href="index.html">
            <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>首页
        </a>
        <span class="nav-title">潜水图鉴</span>
        <span class="nav-badge" id="navBadge">0</span>
    </nav>

    <!-- Hero -->
    <div class="hero">
        <div class="hero-waves">
            <svg viewBox="0 0 1200 60" preserveAspectRatio="none">
                <path d="M0 30 Q75 10 150 30 Q225 50 300 30 Q375 10 450 30 Q525 50 600 30 Q675 10 750 30 Q825 50 900 30 Q975 10 1050 30 Q1125 50 1200 30 L1200 60 L0 60 Z" fill="rgba(14,165,233,0.15)"/>
                <path d="M0 35 Q75 15 150 35 Q225 55 300 35 Q375 15 450 35 Q525 55 600 35 Q675 15 750 35 Q825 55 900 35 Q975 15 1050 35 Q1125 55 1200 35 L1200 60 L0 60 Z" fill="rgba(6,182,212,0.08)"/>
            </svg>
        </div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="hero-num" id="heroNum">0</div>
            <div class="hero-label">WORLD DIVING DESTINATIONS</div>
            <div class="hero-stats" id="heroStats"></div>
        </div>
    </div>

    <!-- Filters -->
    <div class="filter-wrap">
        <div class="filter-bar" id="filterBar"></div>
    </div>

    <!-- Card Grid -->
    <div class="grid" id="grid"></div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-ring-wrap">
            <div class="modal">
                <div class="modal-scroll" id="modalScroll"></div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        var allData = [], travelData = [];
        var modalMap = null;
        var activeType = 'all', activeRegion = 'all', activeLevel = 'all';

        /* ---- Wave SVG placeholder for cards ---- */
        var waveSvg = '<svg viewBox="0 0 60 60"><path d="M5 25 Q12 18 20 25 Q28 32 35 25 Q42 18 50 25 Q55 20 58 23" fill="none" stroke="rgba(14,165,233,0.12)" stroke-width="1.2"/><path d="M5 32 Q12 25 20 32 Q28 39 35 32 Q42 25 50 32 Q55 27 58 30" fill="none" stroke="rgba(6,182,212,0.08)" stroke-width="1.2"/><path d="M18 42 Q24 36 32 40 Q38 42 42 46 Q38 50 32 52 Q24 54 18 48 Z" fill="none" stroke="rgba(14,165,233,0.1)" stroke-width="1"/><path d="M42 46 L50 40 L48 46 L50 52 Z" fill="none" stroke="rgba(14,165,233,0.1)" stroke-width="1"/></svg>';
        var bigWaveSvg = '<svg viewBox="0 0 80 80"><path d="M5 28 Q15 18 25 28 Q35 38 45 28 Q55 18 65 28 Q72 22 78 26" fill="none" stroke="rgba(14,165,233,0.1)" stroke-width="1.5"/><path d="M5 36 Q15 26 25 36 Q35 46 45 36 Q55 26 65 36 Q72 30 78 34" fill="none" stroke="rgba(6,182,212,0.07)" stroke-width="1.5"/><path d="M20 50 Q28 42 38 48 Q46 52 50 56 Q46 60 38 62 Q28 64 20 58 Z" fill="none" stroke="rgba(14,165,233,0.08)" stroke-width="1.5"/><path d="M50 56 L60 48 L58 56 L60 64 Z" fill="none" stroke="rgba(14,165,233,0.08)" stroke-width="1.5"/></svg>';

        /* ---- Type / Level color helpers ---- */
        var typeColors = {
            '珊瑚礁': '#0ea5e9',
            '沉船潜点': '#a78bfa',
            '洞穴潜水': '#f59e0b',
            '峭壁潜水': '#22c55e',
            '远洋大物': '#ef4444',
            '海洋保护区': '#06b6d4',
            '冰潜': '#94a3b8'
        };
        var levelColors = {
            '初级': '#4ade80',
            '进阶': '#38bdf8',
            '高级': '#f59e0b',
            '专业': '#ef4444'
        };

        function typeColor(t) { return typeColors[t] || '#0ea5e9'; }
        function levelColor(l) { return levelColors[l] || '#94a3b8'; }

        /* ---- Cover gradient per type ---- */
        function coverGradient(t) {
            switch (t) {
                case '珊瑚礁': return 'linear-gradient(135deg, #061422, #0c2840, #082238)';
                case '沉船潜点': return 'linear-gradient(135deg, #0e0a1e, #1a1040, #120c2a)';
                case '洞穴潜水': return 'linear-gradient(135deg, #1a1408, #2a2010, #1c1608)';
                case '峭壁潜水': return 'linear-gradient(135deg, #061a0e, #0c2a18, #081c10)';
                case '远洋大物': return 'linear-gradient(135deg, #1a0808, #2a1010, #1c0a0a)';
                case '海洋保护区': return 'linear-gradient(135deg, #061a22, #0a2a38, #081e2c)';
                case '冰潜': return 'linear-gradient(135deg, #101420, #1a2030, #141828)';
                default: return 'linear-gradient(135deg, #061422, #0c2840, #082238)';
            }
        }

        /* ---- Load data ---- */
        var loaded = 0;
        function tryInit() {
            loaded++;
            if (loaded === 2) init();
        }

        fetch('data/diving_global.json')
            .then(function(r) { return r.json(); })
            .then(function(d) { allData = d; tryInit(); })
            .catch(function() { tryInit(); });

        fetch('data/travel.json')
            .then(function(r) { return r.json(); })
            .then(function(d) { travelData = d; tryInit(); })
            .catch(function() { tryInit(); });

        function init() {
            matchVisited();
            renderHero();
            renderFilters();
            applyFilters();
            bindEvents();
            setTimeout(function() {
                document.getElementById('loading').classList.add('hide');
            }, 600);
        }

        /* ---- Visited matching ---- */
        function matchVisited() {
            var spots = [];
            travelData.forEach(function(c) {
                (c.spots || []).forEach(function(s) {
                    spots.push({ title: s.title, location: s.location || '', city: c.city });
                });
            });
            allData.forEach(function(d) {
                d.visited = false;
                var keys = d.matchKeys || [];
                for (var i = 0; i < spots.length; i++) {
                    var hay = spots[i].title + '|' + spots[i].location + '|' + spots[i].city;
                    for (var j = 0; j < keys.length; j++) {
                        if (hay.indexOf(keys[j]) !== -1) { d.visited = true; break; }
                    }
                    if (d.visited) break;
                }
            });
            var vc = allData.filter(function(d) { return d.visited; }).length;
            document.getElementById('navBadge').textContent = vc + '/' + allData.length;
        }

        /* ---- Hero ---- */
        function renderHero() {
            var total = allData.length;
            var visited = allData.filter(function(d) { return d.visited; }).length;
            var types = {};
            allData.forEach(function(d) { types[d.type] = true; });
            document.getElementById('heroNum').textContent = total;
            var html = '';
            html += '<div class="hero-stat"><div class="hero-stat-num">' + total + '</div><div class="hero-stat-label">潜点</div></div>';
            html += '<div class="hero-stat"><div class="hero-stat-num gold">' + visited + '</div><div class="hero-stat-label">已潜</div></div>';
            html += '<div class="hero-stat"><div class="hero-stat-num teal">' + Object.keys(types).length + '</div><div class="hero-stat-label">类型</div></div>';
            document.getElementById('heroStats').innerHTML = html;
        }

        /* ---- Filters ---- */
        function renderFilters() {
            var html = '';
            // Type
            html += '<div class="f-group">';
            var typeList = [
                { k: 'all', l: '全部' }, { k: '珊瑚礁', l: '珊瑚礁' },
                { k: '沉船潜点', l: '沉船' }, { k: '洞穴潜水', l: '洞穴' },
                { k: '峭壁潜水', l: '峭壁' }, { k: '远洋大物', l: '大物' },
                { k: '海洋保护区', l: '保护区' }, { k: '冰潜', l: '冰潜' }
            ];
            typeList.forEach(function(t) {
                html += '<span class="f-tab' + (activeType === t.k ? ' active' : '') + '" data-g="type" data-f="' + t.k + '">' + t.l + '</span>';
            });
            html += '</div><div class="f-sep"></div>';

            // Region
            html += '<div class="f-group">';
            var regionList = [
                { k: 'all', l: '全球' }, { k: '东南亚', l: '东南亚' },
                { k: '大洋洲', l: '大洋洲' }, { k: '加勒比/美洲', l: '美洲' },
                { k: '印度洋', l: '印度洋' }, { k: '红海/中东', l: '红海' },
                { k: '东亚', l: '东亚' }, { k: '欧洲', l: '欧洲' },
                { k: '极地', l: '极地' }
            ];
            regionList.forEach(function(r) {
                html += '<span class="f-tab' + (activeRegion === r.k ? ' active' : '') + '" data-g="region" data-f="' + r.k + '">' + r.l + '</span>';
            });
            html += '</div><div class="f-sep"></div>';

            // Level
            html += '<div class="f-group">';
            var levelList = [
                { k: 'all', l: '全级别' }, { k: '初级', l: '初级' },
                { k: '进阶', l: '进阶' }, { k: '高级', l: '高级' },
                { k: '专业', l: '专业' }
            ];
            levelList.forEach(function(l) {
                html += '<span class="f-tab' + (activeLevel === l.k ? ' active' : '') + '" data-g="level" data-f="' + l.k + '">' + l.l + '</span>';
            });
            html += '</div>';

            document.getElementById('filterBar').innerHTML = html;
        }

        function applyFilters() {
            var filtered = allData.filter(function(d) {
                if (activeType !== 'all' && d.type !== activeType) return false;
                if (activeRegion !== 'all' && d.region !== activeRegion) return false;
                if (activeLevel !== 'all' && d.level !== activeLevel) return false;
                return true;
            });
            // Sort: visited first, then by id
            filtered.sort(function(a, b) {
                if (a.visited !== b.visited) return a.visited ? -1 : 1;
                return a.id - b.id;
            });

            var html = '';
            if (filtered.length === 0) {
                html = '<div class="grid-empty">没有匹配的潜点</div>';
            }
            filtered.forEach(function(d, i) {
                var tc = typeColor(d.type);
                var lc = levelColor(d.level);
                var glowColor = d.visited ? 'rgba(14,165,233,0.2)' : 'rgba(14,165,233,0.12)';

                html += '<div class="card' + (d.visited ? ' visited' : '') + '" data-id="' + d.id + '" style="animation-delay:' + (i * 0.03) + 's;--glow:' + glowColor + ';">';

                // Cover
                html += '<div class="card-cover" style="background:' + coverGradient(d.type) + '">';
                html += '<div class="card-cover-ph">' + waveSvg + '</div>';
                html += '<div class="card-cover-grad"></div>';
                if (d.visited) {
                    html += '<div class="card-badge">&#9733; 已潜</div>';
                }
                html += '<div class="card-type-tag" style="color:' + tc + ';background:rgba(8,12,24,0.7);border-color:' + tc + '30;">' + d.type + '</div>';
                html += '<div class="card-level-tag" style="color:' + lc + ';border-color:' + lc + '25;">' + d.level + '</div>';
                html += '</div>';

                // Body
                html += '<div class="card-body">';
                html += '<div class="card-name">' + d.name + '</div>';
                html += '<div class="card-name-en">' + d.nameEn + '</div>';

                // Depth & Visibility indicators
                html += '<div class="card-indicators">';
                // Depth icon (arrow down)
                html += '<div class="card-ind"><svg viewBox="0 0 16 16"><path d="M8 2v10M4 9l4 4 4-4"/></svg><span class="card-ind-val">' + d.depth + 'm</span><span>深度</span></div>';
                // Visibility icon (eye)
                html += '<div class="card-ind"><svg viewBox="0 0 16 16"><path d="M1 8s3-5 7-5 7 5 7 5-3 5-7 5-7-5-7-5z"/><circle cx="8" cy="8" r="2"/></svg><span class="card-ind-val">' + d.visibility + 'm</span><span>能见度</span></div>';
                html += '</div>';

                // Meta
                html += '<div class="card-meta">';
                html += '<span class="card-meta-item">' + d.country + '</span>';
                html += '<span class="card-meta-item">· ' + d.bestSeason + '</span>';
                html += '</div>';

                // Highlights
                if (d.highlights && d.highlights.length > 0) {
                    html += '<div class="card-highlights">';
                    d.highlights.slice(0, 3).forEach(function(h) {
                        html += '<span class="card-hl">' + h + '</span>';
                    });
                    html += '</div>';
                }

                html += '</div>'; // card-body
                html += '</div>'; // card
            });

            document.getElementById('grid').innerHTML = html;
        }

        /* ---- Modal ---- */
        function openModal(d) {
            var tc = typeColor(d.type);
            var lc = levelColor(d.level);

            var html = '';
            html += '<button class="modal-close" id="modalClose">&times;</button>';

            // Cover
            html += '<div class="modal-cover" style="background:' + coverGradient(d.type) + '">';
            html += '<div class="modal-cover-ph">' + bigWaveSvg + '</div>';
            html += '<div class="modal-cover-grad"></div>';
            html += '</div>';

            // Body
            html += '<div class="modal-body">';
            html += '<div class="modal-name">' + d.name;
            if (d.visited) {
                html += ' <span style="color:var(--teal-bright);font-size:18px;filter:drop-shadow(0 0 4px rgba(14,165,233,0.4));animation:float 3s ease-in-out infinite;display:inline-block;">&#9733;</span>';
            }
            html += '</div>';
            html += '<div class="modal-name-en">' + d.nameEn + '</div>';

            // Tags
            html += '<div class="modal-tags">';
            html += '<span class="modal-tag modal-tag-type" style="color:' + tc + ';">' + d.type + '</span>';
            html += '<span class="modal-tag modal-tag-level" style="color:' + lc + ';border-color:' + lc + '20;">' + d.level + '</span>';
            html += '<span class="modal-tag" style="color:rgba(255,255,255,0.35);">' + d.country + '</span>';
            html += '<span class="modal-tag" style="color:rgba(255,255,255,0.3);">' + d.region + '</span>';
            if (d.visited) {
                html += '<span class="modal-tag" style="color:var(--teal-bright);border-color:rgba(14,165,233,0.15);background:rgba(14,165,233,0.06);">已到访</span>';
            }
            html += '</div>';

            // Info grid
            html += '<div class="modal-grid">';
            html += mcell('深度', d.depth + ' m');
            html += mcell('能见度', d.visibility + ' m');
            html += mcell('等级', d.level);
            html += mcell('最佳季节', d.bestSeason);
            html += mcell('国家', d.country);
            html += mcell('类型', d.type);
            html += '</div>';

            // Description
            if (d.description) {
                html += '<div class="modal-desc">' + d.description + '</div>';
            }

            // Highlights
            if (d.highlights && d.highlights.length > 0) {
                html += '<div class="modal-sec">潜水亮点</div>';
                html += '<div class="modal-hl-tags">';
                d.highlights.forEach(function(h) {
                    html += '<span class="modal-hl">' + h + '</span>';
                });
                html += '</div>';
            }

            // Minimap
            html += '<a class="modal-wiki-link" href="https://en.wikipedia.org/wiki/'+encodeURIComponent(d.nameEn.replace(/ /g,'_'))+'" target="_blank" rel="noopener">📖 Wikipedia</a>';
            html += '<div class="modal-minimap" id="modalMinimap"></div>';
            html += '</div>'; // modal-body

            document.getElementById('modalScroll').innerHTML = html;

            var overlay = document.getElementById('modalOverlay');
            overlay.classList.add('open');
            overlay.style.display = 'flex';
            requestAnimationFrame(function() { overlay.style.opacity = '1'; });

            document.getElementById('modalClose').addEventListener('click', closeModal);
            overlay.addEventListener('click', function handler(e) {
                if (e.target === overlay || e.target.classList.contains('modal-ring-wrap')) {
                    closeModal();
                    overlay.removeEventListener('click', handler);
                }
            });

            // Minimap
            setTimeout(function() {
                if (modalMap) { modalMap.destroy(); modalMap = null; }
                var el = document.getElementById('modalMinimap');
                if (!el) return;
                modalMap = new AMap.Map('modalMinimap', {
                    zoom: 5,
                    center: [d.lng, d.lat],
                    mapStyle: 'amap://styles/darkblue',
                    pitch: 30,
                    viewMode: '3D'
                });
                // Ocean blue circle marker
                new AMap.CircleMarker({
                    center: [d.lng, d.lat],
                    radius: 12,
                    fillColor: '#0ea5e9',
                    fillOpacity: 0.35,
                    strokeColor: '#0ea5e9',
                    strokeWeight: 2,
                    strokeOpacity: 0.8
                }).setMap(modalMap);
                // Inner dot
                new AMap.CircleMarker({
                    center: [d.lng, d.lat],
                    radius: 4,
                    fillColor: '#38bdf8',
                    fillOpacity: 0.9,
                    strokeColor: '#fff',
                    strokeWeight: 1,
                    strokeOpacity: 0.6
                }).setMap(modalMap);
                // Label
                new AMap.Text({
                    text: d.name,
                    position: [d.lng, d.lat],
                    offset: new AMap.Pixel(16, -8),
                    style: {
                        'font-size': '11px',
                        color: '#fff',
                        background: 'rgba(10,14,26,0.8)',
                        padding: '3px 8px',
                        'border-radius': '6px',
                        border: '1px solid rgba(14,165,233,0.12)'
                    }
                }).setMap(modalMap);
            }, 200);
        }

        function closeModal() {
            var overlay = document.getElementById('modalOverlay');
            overlay.style.opacity = '0';
            setTimeout(function() {
                overlay.classList.remove('open');
                overlay.style.display = 'none';
            }, 300);
            if (modalMap) { modalMap.destroy(); modalMap = null; }
        }

        function mcell(label, value) {
            return '<div class="modal-cell"><div class="modal-cell-label">' + label + '</div><div class="modal-cell-value">' + value + '</div></div>';
        }

        /* ---- Events ---- */
        function bindEvents() {
            // Filter clicks
            document.getElementById('filterBar').addEventListener('click', function(e) {
                var tab = e.target.closest('.f-tab');
                if (!tab) return;
                var group = tab.getAttribute('data-g');
                var val = tab.getAttribute('data-f');
                if (group === 'type') activeType = val;
                if (group === 'region') activeRegion = val;
                if (group === 'level') activeLevel = val;
                renderFilters();
                applyFilters();
            });

            // Card clicks
            document.getElementById('grid').addEventListener('click', function(e) {
                var card = e.target.closest('.card');
                if (!card) return;
                var id = parseInt(card.getAttribute('data-id'));
                var item = null;
                for (var i = 0; i < allData.length; i++) {
                    if (allData[i].id === id) { item = allData[i]; break; }
                }
                if (item) openModal(item);
            });

            // ESC
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeModal();
            });
        }
    })();
    </script>
</body>
</html>
