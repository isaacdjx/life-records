<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雪山图鉴</title>
    <link href="data/fonts/fonts_local.css" rel="stylesheet">
    <script src="https://webapi.amap.com/maps?v=2.0&key=f66cdc07203c3075a2a2ae1ea67eea8e"></script>
    <style>
        :root{
            --ice:#7cc4f5;--ice-bright:#a8dcfa;--ice-faint:rgba(124,196,245,0.18);
            --gold:#d4a85a;--gold-bright:#f6c977;--gold-faint:rgba(212,168,90,0.18);
            --green:#48bb78;--green-faint:rgba(72,187,120,0.15);
            --dark:#080c18;--card:rgba(14,18,32,0.85);
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Noto Sans SC',-apple-system,'PingFang SC',sans-serif;
            background:var(--dark);color:rgba(255,255,255,0.88);min-height:100vh;overflow-x:hidden;}

        .loading{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;
            align-items:center;justify-content:center;background:var(--dark);transition:opacity .6s;}
        .loading.hide{opacity:0;pointer-events:none;}
        .load-mount svg{width:64px;height:64px;filter:drop-shadow(0 0 16px rgba(124,196,245,0.3));}
        .load-mount svg path{stroke:var(--ice);stroke-width:2;fill:none;stroke-dasharray:200;stroke-dashoffset:200;animation:draw 1.5s ease forwards;}
        .load-text{margin-top:10px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;color:rgba(124,196,245,0.4);animation:breathe 2s ease-in-out infinite;}
        @keyframes draw{to{stroke-dashoffset:0}}
        @keyframes breathe{0%,100%{opacity:.4}50%{opacity:1}}
        @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
        @keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--glow)}70%{box-shadow:0 0 0 6px transparent}}

        #snowCanvas{position:fixed;inset:0;z-index:1;pointer-events:none;}

        .nav{position:fixed;top:0;left:0;right:0;height:52px;z-index:100;
            background:linear-gradient(180deg,rgba(8,12,24,0.96),rgba(8,12,24,0.75));
            backdrop-filter:blur(24px) saturate(1.8);
            display:flex;align-items:center;justify-content:space-between;padding:0 20px;}
        .nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
            background:linear-gradient(90deg,transparent,rgba(124,196,245,0.12) 30%,rgba(124,196,245,0.12) 70%,transparent);}
        .nav-back{color:rgba(255,255,255,0.45);text-decoration:none;font-size:13px;display:flex;align-items:center;gap:4px;transition:color .2s;}
        .nav-back:hover{color:var(--ice);}
        .nav-back svg{width:16px;height:16px;fill:currentColor;}
        .nav-title{font-family:'Cinzel','Noto Sans SC',serif;font-size:15px;font-weight:700;letter-spacing:4px;
            background:linear-gradient(135deg,#fff 0%,var(--ice-bright) 40%,var(--ice) 60%,#fff 100%);
            background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
            background-clip:text;animation:shimmer 4s linear infinite;}
        .nav-right{display:flex;align-items:center;gap:10px;}
        .nav-badge{background:linear-gradient(135deg,rgba(124,196,245,0.1),rgba(124,196,245,0.04));
            color:var(--ice);padding:3px 12px;border-radius:20px;font-size:11px;font-weight:600;
            border:1px solid rgba(124,196,245,0.12);}
        .nav-btn{background:none;border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.4);
            padding:5px 14px;border-radius:8px;font-size:11px;cursor:pointer;transition:all .25s;letter-spacing:1px;}
        .nav-btn:hover{border-color:rgba(124,196,245,0.3);color:var(--ice);background:rgba(124,196,245,0.05);}
        .nav-btn.active{background:rgba(124,196,245,0.1);border-color:rgba(124,196,245,0.3);color:var(--ice);}

        .hero{position:relative;width:100%;height:240px;margin-top:52px;overflow:hidden;
            background:linear-gradient(135deg,#0a1020,#0e1830 50%,#0a1428);display:flex;align-items:center;justify-content:center;}
        .hero-map{position:absolute;inset:0;opacity:0.45;}
        .hero-overlay{position:absolute;inset:0;
            background:linear-gradient(180deg,rgba(8,12,24,0.3) 0%,rgba(8,12,24,0.1) 40%,rgba(8,12,24,0.7) 85%,var(--dark) 100%);}
        .hero-content{position:relative;z-index:2;text-align:center;}
        .hero-elev{font-family:'Cinzel',serif;font-size:52px;font-weight:700;line-height:1;
            background:linear-gradient(180deg,rgba(255,255,255,0.95),var(--ice));
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
            filter:drop-shadow(0 2px 12px rgba(124,196,245,0.2));}
        .hero-label{font-size:12px;color:rgba(255,255,255,0.3);letter-spacing:3px;margin-top:4px;}
        .hero-stats{display:flex;gap:24px;margin-top:16px;justify-content:center;}
        .hero-stat{text-align:center;}
        .hero-stat-num{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--ice);}
        .hero-stat-num.gold{color:var(--gold);}
        .hero-stat-num.green{color:var(--green);}
        .hero-stat-label{font-size:10px;color:rgba(255,255,255,0.25);letter-spacing:1px;margin-top:2px;}

        .filter-wrap{position:sticky;top:52px;z-index:50;
            background:linear-gradient(180deg,var(--dark),rgba(8,12,24,0.95) 80%,rgba(8,12,24,0));
            padding:12px 20px 16px;transition:all .3s;}
        .filter-bar{display:flex;gap:4px;flex-wrap:wrap;padding:8px 10px;
            background:linear-gradient(135deg,rgba(14,18,32,0.9),rgba(18,22,40,0.85));
            backdrop-filter:blur(16px);border-radius:14px;border:1px solid rgba(124,196,245,0.06);
            box-shadow:0 4px 24px rgba(0,0,0,0.2);
            transition:all .35s cubic-bezier(0.16,1,0.3,1);max-height:300px;overflow:hidden;}
        .filter-bar.collapsed{max-height:0;padding:0 10px;border-color:transparent;opacity:0;pointer-events:none;}
        .f-group{display:flex;align-items:center;gap:3px;flex-wrap:wrap;}
        .f-sep{width:1px;height:22px;background:linear-gradient(180deg,transparent,rgba(124,196,245,0.1),transparent);margin:0 6px;flex-shrink:0;}
        .f-tab{padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer;
            background:transparent;border:1px solid transparent;color:rgba(255,255,255,0.32);
            transition:all .2s;white-space:nowrap;}
        .f-tab:hover{color:rgba(255,255,255,0.65);background:rgba(255,255,255,0.03);}
        .f-tab.active{font-weight:600;background:var(--ice-faint);border-color:rgba(124,196,245,0.2);color:var(--ice);box-shadow:0 0 10px rgba(124,196,245,0.06);}
        .f-tab.g-f{color:#48bb78;} .f-tab.g-f.active{border-color:rgba(72,187,120,0.3);background:rgba(72,187,120,0.1);}
        .f-tab.g-pd{color:#4299e1;} .f-tab.g-pd.active{border-color:rgba(66,153,225,0.3);background:rgba(66,153,225,0.1);}
        .f-tab.g-ad{color:#ed8936;} .f-tab.g-ad.active{border-color:rgba(237,137,54,0.3);background:rgba(237,137,54,0.1);}
        .f-tab.g-d{color:#e53e3e;} .f-tab.g-d.active{border-color:rgba(229,62,62,0.3);background:rgba(229,62,62,0.1);}
        .f-tab.g-td{color:#9f7aea;} .f-tab.g-td.active{border-color:rgba(159,122,234,0.3);background:rgba(159,122,234,0.1);}
        .f-tab.g-ban{color:#718096;} .f-tab.g-ban.active{border-color:rgba(113,128,150,0.3);background:rgba(113,128,150,0.1);}

        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;
            padding:0 20px 40px;max-width:1400px;margin:0 auto;position:relative;z-index:2;}
        .grid-empty{grid-column:1/-1;text-align:center;padding:60px 0;color:rgba(255,255,255,0.2);font-size:14px;}

        .card{position:relative;border-radius:16px;overflow:hidden;cursor:pointer;
            background:var(--card);border:1px solid rgba(124,196,245,0.05);
            transition:all .35s cubic-bezier(0.16,1,0.3,1);animation:fadeUp .4s ease both;--glow:rgba(124,196,245,0.15);}
        .card:hover{transform:translateY(-6px) scale(1.02);border-color:rgba(124,196,245,0.12);
            box-shadow:0 16px 48px rgba(0,0,0,0.3),0 0 24px var(--glow);}
        .card-cover{width:100%;height:160px;position:relative;overflow:hidden;
            background:linear-gradient(135deg,rgba(12,16,30,1),rgba(16,22,44,1));}
        .card-cover img{width:100%;height:100%;object-fit:cover;transition:transform .4s;}
        .card:hover .card-cover img{transform:scale(1.08);}
        .card-cover-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
        .card-cover-ph svg{width:56px;height:56px;opacity:0.06;}
        .card-cover-grad{position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(transparent,var(--card));}
        .card-elev{position:absolute;top:10px;right:12px;font-family:'Cinzel',serif;font-size:20px;
            font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,0.6);z-index:2;}
        .card-elev small{font-size:11px;opacity:0.5;}

        .card-badge{position:absolute;top:10px;left:12px;z-index:2;padding:2px 8px;border-radius:6px;
            font-size:10px;font-weight:600;backdrop-filter:blur(8px);}
        .card-badge-visited{background:rgba(212,168,90,0.2);color:var(--gold);border:1px solid rgba(212,168,90,0.25);}
        .card-badge-seen{background:rgba(72,187,120,0.15);color:var(--green);border:1px solid rgba(72,187,120,0.2);}

        .card-body{padding:14px 16px 16px;}
        .card-name{font-size:16px;font-weight:700;line-height:1.3;}
        .card-name-en{font-family:'Cinzel',serif;font-size:10px;color:rgba(255,255,255,0.2);margin-top:2px;
            letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;}
        .card-tag{padding:2px 8px;border-radius:5px;font-size:10px;
            border:1px solid rgba(255,255,255,0.05);background:rgba(255,255,255,0.02);color:rgba(255,255,255,0.35);}
        .card-tag-type{color:var(--ice);border-color:rgba(124,196,245,0.12);}
        .card-tag-diff{font-weight:700;}
        .card-range{font-size:10px;color:rgba(255,255,255,0.18);margin-top:8px;}
        .card-diff-bar{height:3px;border-radius:1.5px;background:rgba(255,255,255,0.04);margin-top:10px;overflow:hidden;}
        .card-diff-fill{height:100%;border-radius:1.5px;}

        /* MODAL */
        .modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);
            display:none;align-items:center;justify-content:center;padding:20px;opacity:0;transition:opacity .3s;}
        .modal-overlay.open{display:flex;opacity:1;}
        .modal-ring-wrap{position:relative;width:100%;max-width:540px;}
        .modal-ring-wrap::before{content:'';position:absolute;inset:-3px;border-radius:23px;padding:3px;
            background:conic-gradient(from var(--ring-angle,0deg),transparent 0%,var(--ring-color,#7cc4f5) 10%,transparent 22%,transparent 50%,var(--ring-color,#7cc4f5) 60%,transparent 72%);
            -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
            -webkit-mask-composite:xor;mask-composite:exclude;
            animation:modalRingRotate 3s linear infinite;opacity:0;
            transition:opacity .5s .3s;pointer-events:none;}
        .modal-overlay.open .modal-ring-wrap::before{opacity:1;}
        .modal-ring-wrap::after{content:'';position:absolute;inset:-6px;border-radius:26px;padding:6px;
            background:conic-gradient(from var(--ring-angle,0deg),transparent 0%,var(--ring-color,#7cc4f5) 10%,transparent 22%,transparent 50%,var(--ring-color,#7cc4f5) 60%,transparent 72%);
            -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
            -webkit-mask-composite:xor;mask-composite:exclude;
            animation:modalRingRotate 3s linear infinite;opacity:0;
            transition:opacity .5s .5s;filter:blur(8px);pointer-events:none;}
        .modal-overlay.open .modal-ring-wrap::after{opacity:0.4;}
        .modal{width:100%;max-height:calc(100vh - 40px);
            background:linear-gradient(180deg,rgba(12,16,30,0.98),rgba(10,14,26,0.98));
            border:1px solid rgba(124,196,245,0.08);border-radius:20px;overflow:hidden;
            box-shadow:0 24px 80px rgba(0,0,0,0.5),0 0 40px rgba(124,196,245,0.05);
            display:flex;flex-direction:column;transform:scale(0.95);transition:transform .3s cubic-bezier(0.16,1,0.3,1);}
        .modal-overlay.open .modal{transform:scale(1);}
        .modal-scroll{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(124,196,245,0.12) transparent;}
        .modal-scroll::-webkit-scrollbar{width:3px;} .modal-scroll::-webkit-scrollbar-thumb{background:rgba(124,196,245,0.12);border-radius:2px;}

        .modal-cover{width:100%;height:240px;position:relative;overflow:hidden;
            background:linear-gradient(135deg,rgba(12,16,30,1),rgba(18,24,48,1));}
        .modal-cover img{width:100%;height:100%;object-fit:cover;}
        .modal-cover-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
        .modal-cover-ph svg{width:80px;height:80px;opacity:0.06;}
        .modal-cover-grad{position:absolute;bottom:0;left:0;right:0;height:100px;
            background:linear-gradient(transparent,rgba(12,16,30,0.98));}
        .modal-cover-elev{position:absolute;bottom:14px;left:20px;z-index:2;
            font-family:'Cinzel',serif;font-size:44px;font-weight:700;line-height:1;
            background:linear-gradient(180deg,#fff,var(--ice));-webkit-background-clip:text;-webkit-text-fill-color:transparent;
            background-clip:text;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.5));}
        .modal-cover-elev small{font-size:18px;-webkit-text-fill-color:rgba(124,196,245,0.4);}
        .modal-close{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:10px;
            background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);
            color:rgba(255,255,255,0.5);font-size:18px;cursor:pointer;z-index:2;
            display:flex;align-items:center;justify-content:center;transition:all .2s;}
        .modal-close:hover{color:#fff;background:rgba(255,255,255,0.1);}

        .modal-body{padding:0 20px 24px;}
        .modal-name{font-size:24px;font-weight:700;line-height:1.3;margin-top:14px;}
        .modal-name-en{font-family:'Cinzel',serif;font-size:12px;color:rgba(255,255,255,0.22);margin-top:2px;letter-spacing:1px;}
        .modal-diff-bar{height:4px;border-radius:2px;background:rgba(255,255,255,0.04);margin:12px 0 0;overflow:hidden;}
        .modal-diff-fill{height:100%;border-radius:2px;}
        .modal-tags{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0 16px;}
        .modal-tag{padding:4px 12px;border-radius:8px;font-size:12px;font-weight:500;
            border:1px solid rgba(255,255,255,0.05);background:rgba(255,255,255,0.02);transition:background .2s;}
        .modal-tag:hover{background:rgba(255,255,255,0.05);}
        .modal-tag-type{color:var(--ice);border-color:rgba(124,196,245,0.12);}
        .modal-tag-diff{font-weight:700;}

        .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
        .modal-cell{background:linear-gradient(135deg,rgba(124,196,245,0.03),rgba(124,196,245,0.01));
            border-radius:10px;padding:11px 14px;border:1px solid rgba(124,196,245,0.03);transition:all .2s;}
        .modal-cell:hover{border-color:rgba(124,196,245,0.08);background:rgba(124,196,245,0.05);}
        .modal-cell-label{font-size:10px;color:rgba(255,255,255,0.22);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:3px;}
        .modal-cell-value{font-size:13px;font-weight:600;}

        .modal-sec{font-size:12px;font-weight:600;color:rgba(255,255,255,0.35);margin:18px 0 8px;
            display:flex;align-items:center;gap:8px;letter-spacing:1px;}
        .modal-sec::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(124,196,245,0.08),transparent);}

        /* VIEWPOINT LIST */
        .modal-vp{display:flex;flex-direction:column;gap:5px;}
        .modal-vp-item{background:linear-gradient(135deg,rgba(124,196,245,0.03),rgba(124,196,245,0.01));
            border:1px solid rgba(124,196,245,0.03);border-radius:10px;overflow:hidden;transition:all .2s;}
        .modal-vp-item:hover{border-color:rgba(124,196,245,0.1);}
        .modal-vp-item.vp-visited{border-color:rgba(72,187,120,0.12);background:linear-gradient(135deg,rgba(72,187,120,0.04),rgba(72,187,120,0.01));}
        .modal-vp-header{display:flex;justify-content:space-between;align-items:center;
            padding:10px 14px;cursor:pointer;transition:background .2s;}
        .modal-vp-header:hover{background:rgba(124,196,245,0.05);}
        .modal-vp-name{display:flex;align-items:center;gap:8px;font-size:12px;}
        .modal-vp-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.2);box-shadow:0 0 4px rgba(255,255,255,0.1);flex-shrink:0;}
        .modal-vp-dot.visited{background:var(--green);box-shadow:0 0 6px rgba(72,187,120,0.4);}
        .modal-vp-badge{font-size:9px;padding:1px 6px;border-radius:4px;font-weight:600;}
        .modal-vp-badge-visited{background:rgba(72,187,120,0.12);color:var(--green);border:1px solid rgba(72,187,120,0.15);}
        .modal-vp-right{display:flex;align-items:center;gap:8px;}
        .modal-vp-coord{color:rgba(255,255,255,0.18);font-family:monospace;font-size:10px;}
        .modal-vp-arrow{color:rgba(255,255,255,0.15);font-size:12px;transition:transform .2s;}
        .modal-vp-item.expanded .modal-vp-arrow{transform:rotate(90deg);}

        /* VIEWPOINT DETAIL (expandable) */
        .modal-vp-detail{max-height:0;overflow:hidden;transition:max-height .3s ease;}
        .modal-vp-item.expanded .modal-vp-detail{max-height:400px;}
        .modal-vp-detail-inner{padding:0 14px 14px;border-top:1px solid rgba(124,196,245,0.04);}
        .vp-info-row{display:flex;align-items:flex-start;gap:8px;margin-top:10px;font-size:12px;}
        .vp-info-icon{flex-shrink:0;width:18px;text-align:center;color:rgba(255,255,255,0.3);font-size:11px;margin-top:1px;}
        .vp-info-text{color:rgba(255,255,255,0.6);line-height:1.5;}
        .vp-info-label{color:rgba(255,255,255,0.25);font-size:10px;margin-bottom:2px;}
        .vp-dist{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;
            background:rgba(124,196,245,0.06);border:1px solid rgba(124,196,245,0.08);
            font-size:11px;color:var(--ice);font-family:'Cinzel',serif;margin-top:8px;}
        .vp-minimap{height:140px;border-radius:8px;overflow:hidden;margin-top:10px;
            border:1px solid rgba(124,196,245,0.06);}
        .vp-no-route{color:rgba(255,255,255,0.2);font-size:11px;font-style:italic;margin-top:8px;}

        .modal-wiki-link{display:inline-flex;align-items:center;gap:4px;margin-top:14px;padding:6px 14px;
            border-radius:8px;background:rgba(124,196,245,0.06);border:1px solid rgba(124,196,245,0.1);
            color:var(--ice);font-size:11px;font-weight:600;text-decoration:none;transition:all .2s;}
        .modal-wiki-link:hover{background:rgba(124,196,245,0.12);border-color:rgba(124,196,245,0.2);}
        .modal-minimap{height:200px;border-radius:12px;overflow:hidden;margin-top:18px;
            border:1px solid rgba(124,196,245,0.06);box-shadow:0 4px 16px rgba(0,0,0,0.15);}

        @property --ring-angle{syntax:'<angle>';initial-value:0deg;inherits:false;}
        @keyframes modalRingRotate{to{--ring-angle:360deg;}}

        @media(max-width:640px){
            .grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;padding:0 12px 30px;}
            .card-cover{height:120px;}
            .hero{height:180px;}
            .hero-elev{font-size:36px;}
            .modal{max-width:100%;border-radius:16px;}
            .modal-cover{height:180px;}
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="load-mount"><svg viewBox="0 0 80 80"><path d="M40 10 L10 65 L30 50 L40 60 L50 50 L70 65 Z"/><path d="M25 35 L35 22 L40 28"/></svg></div>
        <div class="load-text">LOADING</div>
    </div>

    <nav class="nav">
        <a class="nav-back" href="index.html">
            <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>首页
        </a>
        <span class="nav-title">雪 山 图 鉴</span>
        <div class="nav-right">
            <a class="nav-link" href="mountain_map.html" style="text-decoration:none;color:rgba(255,255,255,0.4);font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid rgba(124,196,245,0.08);transition:all .2s;display:flex;align-items:center;gap:3px;">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
                地图
            </a>
            <span class="nav-badge" id="navBadge">0</span>
            <button class="nav-btn" id="toggleFilter">筛选</button>
        </div>
    </nav>

    <canvas id="snowCanvas"></canvas>

    <div class="hero">
        <div class="hero-map" id="heroMap"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="hero-elev" id="heroElev">178</div>
            <div class="hero-label">PEAKS WORLDWIDE</div>
            <div class="hero-stats" id="heroStats"></div>
        </div>
    </div>

    <div class="filter-wrap">
        <div class="filter-bar" id="filterBar"></div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-ring-wrap">
            <div class="modal">
                <div class="modal-scroll" id="modalScroll"></div>
            </div>
        </div>
    </div>

    <script>
    (function(){
        var heroMap, modalMap = null;
        var vpMiniMaps = {};
        var allData = [], travelData = [];
        var activeType='all', activeDiff='all', activeRange='all', activeRegion='all';
        var filterVisible = true;

        // Snow
        var snowCanvas = document.getElementById('snowCanvas');
        var snowCtx = snowCanvas.getContext('2d');
        var flakes = [];
        function initSnow(){
            resizeSnow();
            for(var i=0;i<50;i++) flakes.push({x:Math.random()*snowCanvas.width,y:Math.random()*snowCanvas.height,
                r:Math.random()*2+0.5,vx:Math.random()*0.5-0.25,vy:Math.random()*0.7+0.2,o:Math.random()*0.3+0.08});
            animSnow();
        }
        function resizeSnow(){snowCanvas.width=window.innerWidth;snowCanvas.height=window.innerHeight;}
        function animSnow(){
            snowCtx.clearRect(0,0,snowCanvas.width,snowCanvas.height);
            for(var i=0;i<flakes.length;i++){var f=flakes[i];snowCtx.beginPath();snowCtx.arc(f.x,f.y,f.r,0,Math.PI*2);
                snowCtx.fillStyle='rgba(200,220,255,'+f.o+')';snowCtx.fill();
                f.x+=f.vx+Math.sin(Date.now()*0.001+i)*0.12;f.y+=f.vy;
                if(f.y>snowCanvas.height+5){f.y=-5;f.x=Math.random()*snowCanvas.width;}}
            requestAnimationFrame(animSnow);
        }
        window.addEventListener('resize',resizeSnow);

        Promise.all([
            fetch('data/mountains_global.json').then(function(r){return r.json();}),
            fetch('data/travel.json').then(function(r){return r.json();})
        ]).then(function(res){
            allData=res[0]; travelData=res[1]; init();
        });

        function init(){
            matchVisited();
            initHeroMap();
            initSnow();
            renderFilters();
            renderHero();
            applyFilters();
            bindEvents();
            setTimeout(function(){document.getElementById('loading').classList.add('hide');},400);
        }

        function matchVisited(){
            var spots=[];
            travelData.forEach(function(c){(c.spots||[]).forEach(function(s){
                spots.push({title:s.title,location:s.location||'',city:c.city});
            });});

            allData.forEach(function(m){
                m.visited=false; m.seen=false;
                // Match mountain itself
                var mKeys=m.matchKeys||[];
                for(var i=0;i<spots.length;i++){
                    var hay=spots[i].title+'|'+spots[i].location+'|'+spots[i].city;
                    for(var j=0;j<mKeys.length;j++){
                        if(hay.indexOf(mKeys[j])!==-1){m.visited=true;break;}
                    }
                    if(m.visited) break;
                }

                // Match viewpoints
                var vps=m.viewpoints||[];
                vps.forEach(function(v){
                    v.visited=false;
                    var vKeys=v.matchKeys||[v.name];
                    for(var i=0;i<spots.length;i++){
                        var hay=spots[i].title+'|'+spots[i].location+'|'+spots[i].city;
                        for(var j=0;j<vKeys.length;j++){
                            if(hay.indexOf(vKeys[j])!==-1){v.visited=true;break;}
                        }
                        if(v.visited) break;
                        // Reverse match: spot title in viewpoint name
                        if(v.name.indexOf(spots[i].title)!==-1 && spots[i].title.length>=2){
                            v.visited=true;break;
                        }
                    }
                    if(v.visited) m.seen=true;
                });
            });

            var vc=allData.filter(function(m){return m.visited;}).length;
            var sc=allData.filter(function(m){return m.seen&&!m.visited;}).length;
            document.getElementById('navBadge').textContent=vc+'/'+allData.length;
        }

        function initHeroMap(){
            heroMap=new AMap.Map('heroMap',{zoom:3,center:[90,30],mapStyle:'amap://styles/darkblue',
                pitch:50,viewMode:'3D',rotation:-20,zooms:[2,18],dragEnable:false,zoomEnable:false,
                rotateEnable:false,pitchEnable:false,keyboardEnable:false});
        }

        function renderHero(){
            var total=allData.length;
            var visited=allData.filter(function(m){return m.visited;}).length;
            var seen=allData.filter(function(m){return m.seen&&!m.visited;}).length;
            var e8k=allData.filter(function(m){return m.elevation>=8000;}).length;
            var ranges={};allData.forEach(function(m){ranges[m.range]=true;});
            document.getElementById('heroElev').textContent=total;
            var html='';
            html+='<div class="hero-stat"><div class="hero-stat-num gold">'+visited+'</div><div class="hero-stat-label">到过</div></div>';
            html+='<div class="hero-stat"><div class="hero-stat-num green">'+seen+'</div><div class="hero-stat-label">看过</div></div>';
            html+='<div class="hero-stat"><div class="hero-stat-num">'+e8k+'</div><div class="hero-stat-label">8000m+</div></div>';
            html+='<div class="hero-stat"><div class="hero-stat-num">'+Object.keys(ranges).length+'</div><div class="hero-stat-label">山脉</div></div>';
            document.getElementById('heroStats').innerHTML=html;
        }

        function renderFilters(){
            var html='';
            html+='<div class="f-group">';
            [{k:'all',l:'全部'},{k:'极高峰',l:'极高峰'},{k:'高峰',l:'高峰'},{k:'著名雪山',l:'著名'},{k:'经典雪山',l:'经典'},{k:'火山雪峰',l:'火山'}].forEach(function(t){
                html+='<span class="f-tab'+(activeType===t.k?' active':'')+'" data-g="type" data-f="'+t.k+'">'+t.l+'</span>';
            });
            html+='</div><div class="f-sep"></div>';

            html+='<div class="f-group">';
            [{k:'all',l:'全部',c:''},{k:'f',l:'F',c:'g-f'},{k:'pd',l:'PD',c:'g-pd'},{k:'ad',l:'AD',c:'g-ad'},
             {k:'d',l:'D',c:'g-d'},{k:'td',l:'TD+',c:'g-td'},{k:'ban',l:'禁登',c:'g-ban'}].forEach(function(d){
                html+='<span class="f-tab'+(activeDiff===d.k?' active':'')+(d.c?' '+d.c:'')+'" data-g="diff" data-f="'+d.k+'">'+d.l+'</span>';
            });
            html+='</div><div class="f-sep"></div>';

            var rc={};allData.forEach(function(m){rc[m.range]=(rc[m.range]||0)+1;});
            var topR=Object.keys(rc).sort(function(a,b){return rc[b]-rc[a];}).slice(0,8);
            html+='<div class="f-group"><span class="f-tab'+(activeRange==='all'?' active':'')+'" data-g="range" data-f="all">全部</span>';
            topR.forEach(function(r){html+='<span class="f-tab'+(activeRange==='rng_'+r?' active':'')+'" data-g="range" data-f="rng_'+r+'">'+r.replace('山脉','').replace('高原','')+'</span>';});
            html+='</div><div class="f-sep"></div>';

            var cc={};allData.forEach(function(m){m.country.split('/').forEach(function(c){cc[c]=(cc[c]||0)+1;});});
            var topC=Object.keys(cc).sort(function(a,b){return cc[b]-cc[a];}).slice(0,8);
            html+='<div class="f-group"><span class="f-tab'+(activeRegion==='all'?' active':'')+'" data-g="region" data-f="all">全部</span>';
            topC.forEach(function(c){html+='<span class="f-tab'+(activeRegion==='c_'+c?' active':'')+'" data-g="region" data-f="c_'+c+'">'+c+'</span>';});
            html+='</div>';
            document.getElementById('filterBar').innerHTML=html;
        }

        function applyFilters(){
            var filtered=allData.filter(function(m){
                if(activeType!=='all'&&m.type!==activeType) return false;
                if(activeDiff!=='all'&&getDiffGroup(m.difficulty)!==activeDiff) return false;
                if(activeRange!=='all'&&m.range!==activeRange.replace('rng_','')) return false;
                if(activeRegion!=='all'){
                    if(activeRegion.indexOf('r_')===0){if(m.region!==activeRegion.substring(2))return false;}
                    else if(activeRegion.indexOf('c_')===0){if(m.country.indexOf(activeRegion.substring(2))===-1)return false;}
                }
                return true;
            });
            filtered.sort(function(a,b){
                if(a.visited!==b.visited) return a.visited?-1:1;
                if(a.seen!==b.seen) return a.seen?-1:1;
                return b.elevation-a.elevation;
            });

            var html='';
            if(filtered.length===0) html='<div class="grid-empty">没有匹配的雪山</div>';
            filtered.forEach(function(m,i){
                var color=getDiffColor(m.difficulty);
                var glowColor=m.visited?'rgba(212,168,90,0.15)':(m.seen?'rgba(72,187,120,0.12)':color+'22');
                var mtHasImg={1:1,2:1,19:1,30:1,42:1,50:1,76:1,78:1,85:1,91:1};
                html+='<div class="card" data-id="'+m.id+'" style="animation-delay:'+(i*0.03)+'s;--glow:'+glowColor+';">';
                html+='<div class="card-cover">';
                if(mtHasImg[m.id]) html+='<img src="data/mountain_images/'+m.id+'.webp" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;" loading="lazy">';
                html+='<div class="card-cover-ph"><svg viewBox="0 0 60 60"><polygon points="30,6 6,52 54,52" fill="none" stroke="rgba(124,196,245,0.1)" stroke-width="1.5" stroke-linejoin="round"/></svg></div>';
                html+='<div class="card-cover-grad"></div>';
                html+='<div class="card-elev">'+m.elevation+'<small>m</small></div>';
                if(m.visited) html+='<div class="card-badge card-badge-visited">★ 到过</div>';
                else if(m.seen) html+='<div class="card-badge card-badge-seen">👁 看过</div>';
                html+='</div>';
                html+='<div class="card-body">';
                html+='<div class="card-name">'+m.name+'</div>';
                html+='<div class="card-name-en">'+m.nameEn+'</div>';
                html+='<div class="card-tags">';
                html+='<span class="card-tag card-tag-type">'+m.type+'</span>';
                if(m.difficulty) html+='<span class="card-tag card-tag-diff" style="color:'+color+';border-color:'+color+'18;">'+m.difficulty+'</span>';
                html+='<span class="card-tag">'+m.country.split('/')[0]+'</span>';
                html+='</div>';
                html+='<div class="card-range">'+m.range+'</div>';
                if(m.difficulty&&m.difficulty!=='禁登'){
                    html+='<div class="card-diff-bar"><div class="card-diff-fill" style="width:'+getDiffValue(m.difficulty)+'%;background:linear-gradient(90deg,'+color+','+color+'66);box-shadow:0 0 6px '+color+'44;"></div></div>';
                }
                html+='</div></div>';
            });
            document.getElementById('grid').innerHTML=html;
        }

        // ---- Modal ----
        function openModal(m){
            // Destroy any leftover vp minimaps
            Object.keys(vpMiniMaps).forEach(function(k){vpMiniMaps[k].destroy();});
            vpMiniMaps={};

            var html='';
            html+='<button class="modal-close" id="modalClose">&times;</button>';
            html+='<div class="modal-cover">';
            var mtHasImg2={1:1,2:1,19:1,30:1,42:1,50:1,76:1,78:1,85:1,91:1};
            if(mtHasImg2[m.id]) html+='<img src="data/mountain_images/'+m.id+'.webp" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;">';
            html+='<div class="modal-cover-ph"><svg viewBox="0 0 80 80"><polygon points="40,8 8,68 72,68" fill="none" stroke="rgba(124,196,245,0.12)" stroke-width="2" stroke-linejoin="round"/></svg></div>';
            html+='<div class="modal-cover-grad"></div>';
            html+='<div class="modal-cover-elev">'+m.elevation+'<small>m</small></div>';
            html+='</div>';

            html+='<div class="modal-body">';
            html+='<div class="modal-name">'+m.name;
            if(m.visited) html+=' <span style="color:var(--gold);font-size:18px;filter:drop-shadow(0 0 4px rgba(212,168,90,0.4));animation:float 3s ease-in-out infinite;display:inline-block;">★</span>';
            else if(m.seen) html+=' <span style="color:var(--green);font-size:16px;filter:drop-shadow(0 0 4px rgba(72,187,120,0.3));">👁</span>';
            html+='</div>';
            html+='<div class="modal-name-en">'+m.nameEn+'</div>';

            if(m.difficulty&&m.difficulty!=='禁登'){
                var dc=getDiffColor(m.difficulty);
                html+='<div class="modal-diff-bar"><div class="modal-diff-fill" style="width:'+getDiffValue(m.difficulty)+'%;background:linear-gradient(90deg,'+dc+','+dc+'88);box-shadow:0 0 8px '+dc+'44;"></div></div>';
            }

            html+='<div class="modal-tags">';
            html+='<span class="modal-tag modal-tag-type">'+m.type+'</span>';
            if(m.difficulty){
                var dc2=getDiffColor(m.difficulty);
                html+='<span class="modal-tag modal-tag-diff" style="color:'+dc2+';border-color:'+dc2+'18;background:'+dc2+'0a;">'+m.difficulty+(m.difficulty!=='禁登'?' · '+getDiffLabel(m.difficulty):'')+'</span>';
            }
            html+='<span class="modal-tag" style="color:rgba(255,255,255,0.35)">'+m.region+'</span>';
            if(m.visited) html+='<span class="modal-tag" style="color:var(--gold);border-color:rgba(212,168,90,0.12);background:rgba(212,168,90,0.05)">到过</span>';
            else if(m.seen) html+='<span class="modal-tag" style="color:var(--green);border-color:rgba(72,187,120,0.12);background:rgba(72,187,120,0.05)">看过</span>';
            html+='</div>';

            html+='<div class="modal-grid">';
            html+=mcell('国家',m.country)+mcell('山脉',m.range);
            if(m.firstAscent) html+=mcell('首登',m.firstAscent+'年');
            else if(m.difficulty==='禁登') html+=mcell('状态','<span style="color:#718096">禁止攀登</span>');
            html+=mcell('坐标','<span style="font-family:monospace;font-size:11px;color:rgba(255,255,255,0.45)">'+m.lat.toFixed(3)+'° '+m.lng.toFixed(3)+'°</span>');
            html+='</div>';

            // Viewpoints
            var vps=m.viewpoints||[];
            if(vps.length>0){
                var visitedVps=vps.filter(function(v){return v.visited;}).length;
                html+='<div class="modal-sec">观赏点 ('+vps.length+')'+(visitedVps>0?' · <span style="color:var(--green)">'+visitedVps+' 到过</span>':'')+'</div>';
                html+='<div class="modal-vp">';
                vps.forEach(function(v,i){
                    var dist=calcDistance(m.lat,m.lng,v.lat,v.lng);
                    html+='<div class="modal-vp-item'+(v.visited?' vp-visited':'')+'" data-vp="'+i+'">';
                    html+='<div class="modal-vp-header">';
                    html+='<span class="modal-vp-name">';
                    html+='<span class="modal-vp-dot'+(v.visited?' visited':'')+'"></span>';
                    html+=v.name;
                    if(v.visited) html+=' <span class="modal-vp-badge modal-vp-badge-visited">到过</span>';
                    html+='</span>';
                    html+='<span class="modal-vp-right">';
                    html+='<span class="modal-vp-coord">'+dist+'km</span>';
                    html+='<span class="modal-vp-arrow">›</span>';
                    html+='</span>';
                    html+='</div>';
                    // Expandable detail
                    html+='<div class="modal-vp-detail">';
                    html+='<div class="modal-vp-detail-inner">';
                    html+='<div class="vp-dist">📐 距山峰 '+dist+' km</div>';
                    if(v.route){
                        html+='<div class="vp-info-row"><span class="vp-info-icon">🚗</span>';
                        html+='<div><div class="vp-info-label">到达路线</div><div class="vp-info-text">'+v.route+'</div></div></div>';
                    } else {
                        html+='<div class="vp-no-route">暂无路线数据</div>';
                    }
                    html+='<div class="vp-info-row"><span class="vp-info-icon">📍</span>';
                    html+='<div><div class="vp-info-label">坐标</div><div class="vp-info-text" style="font-family:monospace;font-size:11px;">'+v.lat.toFixed(4)+'°, '+v.lng.toFixed(4)+'°</div></div></div>';
                    html+='<div class="vp-minimap" id="vpMap_'+i+'"></div>';
                    html+='</div></div>';
                    html+='</div>';
                });
                html+='</div>';
            }

            // Main minimap
            html+='<a class="modal-wiki-link" href="https://en.wikipedia.org/wiki/'+encodeURIComponent(m.nameEn.replace(/ /g,'_'))+'" target="_blank" rel="noopener">📖 Wikipedia</a>';
            html+='<div class="modal-minimap" id="modalMinimap"></div>';
            html+='</div>';

            document.getElementById('modalScroll').innerHTML=html;
            var overlay=document.getElementById('modalOverlay');
            var ringWrap=overlay.querySelector('.modal-ring-wrap');
            if(ringWrap) ringWrap.style.setProperty('--ring-color',getElevColor(m.elevation));
            overlay.classList.add('open');
            overlay.style.display='flex';
            requestAnimationFrame(function(){overlay.style.opacity='1';});

            document.getElementById('modalClose').addEventListener('click',closeModal);
            overlay.addEventListener('click',function(e){if(e.target===overlay||e.target.classList.contains('modal-ring-wrap')) closeModal();});

            // VP header click → expand/collapse + init minimap
            var vpItems=document.querySelectorAll('.modal-vp-item');
            vpItems.forEach(function(el){
                el.querySelector('.modal-vp-header').addEventListener('click',function(){
                    var wasExpanded=el.classList.contains('expanded');
                    // Collapse all
                    vpItems.forEach(function(item){item.classList.remove('expanded');});
                    if(!wasExpanded){
                        el.classList.add('expanded');
                        var idx=parseInt(el.getAttribute('data-vp'));
                        var v=vps[idx];
                        initVpMinimap(idx,m,v);
                    }
                });
            });

            // Main minimap
            setTimeout(function(){
                if(modalMap){modalMap.destroy();modalMap=null;}
                var el=document.getElementById('modalMinimap');
                if(!el) return;
                modalMap=new AMap.Map('modalMinimap',{
                    zoom:vps.length>0?7:9,center:[m.lng,m.lat],
                    mapStyle:'amap://styles/darkblue',pitch:35,viewMode:'3D'
                });
                var dc3=getDiffColor(m.difficulty);
                var pkSvg='<svg width="18" height="18" viewBox="0 0 24 24" style="filter:drop-shadow(0 0 6px '+dc3+');"><polygon points="12,2 2,22 22,22" fill="'+dc3+'" fill-opacity="0.8" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/></svg>';
                new AMap.Marker({position:[m.lng,m.lat],content:pkSvg,offset:new AMap.Pixel(-9,-9)}).setMap(modalMap);
                new AMap.Text({text:m.name+' '+m.elevation+'m',position:[m.lng,m.lat],offset:new AMap.Pixel(12,-9),
                    style:{'font-size':'11px',color:'#fff',background:'rgba(10,14,26,0.8)',padding:'3px 8px','border-radius':'6px',border:'1px solid rgba(124,196,245,0.12)'}}).setMap(modalMap);

                vps.forEach(function(v){
                    var vpColor=v.visited?'#48bb78':'#f6c977';
                    new AMap.Marker({position:[v.lng,v.lat],
                        content:'<div style="width:7px;height:7px;border-radius:50%;background:'+vpColor+';border:1.5px solid #fff;box-shadow:0 0 6px '+vpColor+';"></div>',
                        offset:new AMap.Pixel(-3.5,-3.5)}).setMap(modalMap);
                    new AMap.Text({text:v.name+(v.visited?' ✓':''),position:[v.lng,v.lat],offset:new AMap.Pixel(7,-7),
                        style:{'font-size':'10px',color:vpColor,background:'none',border:'none','text-shadow':'0 1px 4px rgba(0,0,0,0.8)'}}).setMap(modalMap);
                });
                if(vps.length>0){
                    var bounds=new AMap.Bounds([m.lng,m.lat],[m.lng,m.lat]);
                    vps.forEach(function(v){bounds.extend(new AMap.LngLat(v.lng,v.lat));});
                    modalMap.setBounds(bounds,false,[50,50,50,50]);
                }
            },200);
        }

        function initVpMinimap(idx,m,v){
            var mapId='vpMap_'+idx;
            if(vpMiniMaps[mapId]){vpMiniMaps[mapId].destroy();delete vpMiniMaps[mapId];}
            setTimeout(function(){
                var el=document.getElementById(mapId);
                if(!el) return;
                var vpMap=new AMap.Map(mapId,{
                    zoom:10,center:[(m.lng+v.lng)/2,(m.lat+v.lat)/2],
                    mapStyle:'amap://styles/darkblue'
                });
                vpMiniMaps[mapId]=vpMap;

                // Peak marker
                var dc=getDiffColor(m.difficulty);
                new AMap.Marker({position:[m.lng,m.lat],
                    content:'<svg width="14" height="14" viewBox="0 0 24 24" style="filter:drop-shadow(0 0 4px '+dc+');"><polygon points="12,2 2,22 22,22" fill="'+dc+'" fill-opacity="0.8" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/></svg>',
                    offset:new AMap.Pixel(-7,-7)}).setMap(vpMap);

                // Viewpoint marker
                var vpColor=v.visited?'#48bb78':'#f6c977';
                new AMap.Marker({position:[v.lng,v.lat],
                    content:'<div style="width:8px;height:8px;border-radius:50%;background:'+vpColor+';border:1.5px solid #fff;box-shadow:0 0 8px '+vpColor+';"></div>',
                    offset:new AMap.Pixel(-4,-4)}).setMap(vpMap);

                // Connection line
                new AMap.Polyline({
                    path:[[m.lng,m.lat],[v.lng,v.lat]],
                    strokeColor:vpColor,strokeWeight:2,strokeStyle:'dashed',
                    strokeDasharray:[6,4],strokeOpacity:0.6,lineJoin:'round'
                }).setMap(vpMap);

                // Labels
                new AMap.Text({text:m.name,position:[m.lng,m.lat],offset:new AMap.Pixel(10,-8),
                    style:{'font-size':'10px',color:'#fff',background:'rgba(10,14,26,0.7)',padding:'2px 6px','border-radius':'4px',border:'1px solid rgba(124,196,245,0.1)'}}).setMap(vpMap);
                new AMap.Text({text:v.name,position:[v.lng,v.lat],offset:new AMap.Pixel(8,-8),
                    style:{'font-size':'10px',color:vpColor,background:'none',border:'none','text-shadow':'0 1px 3px rgba(0,0,0,0.8)'}}).setMap(vpMap);

                // Fit bounds
                var bounds=new AMap.Bounds(
                    [Math.min(m.lng,v.lng),Math.min(m.lat,v.lat)],
                    [Math.max(m.lng,v.lng),Math.max(m.lat,v.lat)]);
                vpMap.setBounds(bounds,false,[30,30,30,30]);
            },150);
        }

        function closeModal(){
            var overlay=document.getElementById('modalOverlay');
            overlay.style.opacity='0';
            setTimeout(function(){overlay.classList.remove('open');overlay.style.display='none';},300);
            if(modalMap){modalMap.destroy();modalMap=null;}
            Object.keys(vpMiniMaps).forEach(function(k){vpMiniMaps[k].destroy();});
            vpMiniMaps={};
        }

        function mcell(label,value){
            return '<div class="modal-cell"><div class="modal-cell-label">'+label+'</div><div class="modal-cell-value">'+value+'</div></div>';
        }

        // ---- Distance ----
        function calcDistance(lat1,lng1,lat2,lng2){
            var R=6371;
            var dLat=(lat2-lat1)*Math.PI/180;
            var dLng=(lng2-lng1)*Math.PI/180;
            var a=Math.sin(dLat/2)*Math.sin(dLat/2)+
                Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
                Math.sin(dLng/2)*Math.sin(dLng/2);
            var c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
            return Math.round(R*c);
        }

        // ---- Difficulty ----
        function getElevColor(elev){
            if(elev>=8000)return '#ef4444';
            if(elev>=7000)return '#f97316';
            if(elev>=6000)return '#eab308';
            if(elev>=5000)return '#22c55e';
            if(elev>=4000)return '#38bdf8';
            return '#a78bfa';
        }

        function getDiffColor(d){
            if(!d)return '#888';if(d==='禁登')return '#718096';
            if(d.indexOf('F')===0)return '#48bb78';if(d.indexOf('PD')===0)return '#4299e1';
            if(d.indexOf('AD')===0)return '#ed8936';
            if(d.indexOf('TD')===0||d.indexOf('ED')===0||d==='ABO')return '#9f7aea';
            if(d.indexOf('D')===0)return '#e53e3e';return '#888';
        }
        function getDiffGroup(d){
            if(!d)return 'unknown';if(d==='禁登')return 'ban';
            if(d.indexOf('F')===0)return 'f';if(d.indexOf('PD')===0)return 'pd';
            if(d.indexOf('AD')===0)return 'ad';
            if(d.indexOf('TD')===0||d.indexOf('ED')===0||d==='ABO')return 'td';
            if(d.indexOf('D')===0)return 'd';return 'unknown';
        }
        function getDiffLabel(d){
            if(!d)return '';if(d==='禁登')return '禁止攀登';
            if(d.indexOf('F')===0)return '入门';if(d.indexOf('PD')===0)return '初级';
            if(d.indexOf('AD')===0)return '中级';
            if(d.indexOf('TD')===0||d.indexOf('ED')===0)return '极难';
            if(d.indexOf('D')===0)return '高级';return '';
        }
        function getDiffValue(d){
            if(!d)return 0;
            var m={'F':10,'F+':15,'PD-':22,'PD':30,'PD+':38,'AD-':45,'AD':55,'AD+':62,'D':72,'D+':80,'TD':88,'TD+':92,'ED':96,'ABO':100};
            return m[d]||50;
        }

        // ---- Events ----
        function bindEvents(){
            document.getElementById('filterBar').addEventListener('click',function(e){
                var tab=e.target.closest('.f-tab');if(!tab)return;
                var g=tab.getAttribute('data-g'),v=tab.getAttribute('data-f');
                if(g==='type')activeType=v;else if(g==='diff')activeDiff=v;
                else if(g==='range')activeRange=v;else if(g==='region')activeRegion=v;
                this.querySelectorAll('.f-tab[data-g="'+g+'"]').forEach(function(t){t.classList.remove('active');});
                tab.classList.add('active');
                applyFilters();
            });
            document.getElementById('toggleFilter').addEventListener('click',function(){
                filterVisible=!filterVisible;
                document.getElementById('filterBar').classList.toggle('collapsed',!filterVisible);
                this.classList.toggle('active',filterVisible);
            });
            document.getElementById('grid').addEventListener('click',function(e){
                var card=e.target.closest('.card');if(!card)return;
                var id=parseInt(card.getAttribute('data-id'));
                var m=null;allData.forEach(function(d){if(d.id===id)m=d;});
                if(m) openModal(m);
            });
            document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
        }
    })();
    </script>
</body>
</html>
